<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Track Charging Simulator</title>
<style>
  :root { --bg:#0f1115; --panel:#171a21; --line:#2a2f3a; --txt:#e6e8ec; --mut:#9aa3b2;
          --car:#22c55e; --trl:#3b82f6; --ok:#22c55e; --bad:#ef4444; --accent:#6366f1;
          /* Session activity row accents (match Track sub-panels) */
          --drive:#eab308;
          /* At-track accents (overridden live from color pickers on each track) */
          --at-track:#a78bfa;         /* Onsite default (violet) */
          --at-track-portable:#3b82f6; /* Portable default (blue) */
          --at-track-none:#f59e0b;     /* None default (amber) — also Wait / No charging */
          --wait:var(--at-track-none);
          --offsite:#22c55e;          /* .track-offsite */ }
  * { box-sizing: border-box; }
  html { color-scheme: dark; }
  body { margin:0; font:14px/1.4 -apple-system,Segoe UI,Roboto,sans-serif;
         background:var(--bg); color:var(--txt); }
  header { padding:10px 16px; border-bottom:1px solid var(--line); }
  /* Title + export/import always share one line; description sits below */
  .header-top { display:flex; flex-wrap:nowrap; align-items:center; justify-content:space-between;
                gap:10px; }
  header h1 { margin:0; font-size:16px; font-weight:650; flex:1 1 auto; min-width:0;
              white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .header-actions { display:flex; flex-wrap:nowrap; gap:6px; align-items:center; flex:0 0 auto; }
  .header-actions button, .modal-actions button { padding:5px 10px; border:1px solid var(--line);
           background:#0c0e12; color:var(--txt); border-radius:6px; cursor:pointer; font-size:12.5px; }
  .header-actions button:hover, .modal-actions button:hover { border-color:#4b5563; }
  .modal { position:fixed; inset:0; background:rgba(0,0,0,.55); display:flex; align-items:center;
           justify-content:center; z-index:100; padding:16px; }
  .modal.hidden { display:none; }
  .modal-card { background:var(--panel); border:1px solid var(--line); border-radius:10px;
                padding:14px 16px; width:min(440px, 100%); max-height:min(80vh, 640px);
                display:flex; flex-direction:column; gap:10px; }
  .modal-card h2 { margin:0; font-size:14px; }
  .modal-card .modal-desc { margin:0; font-size:12px; color:var(--mut); }
  .modal-body { overflow:auto; flex:1 1 auto; display:flex; flex-direction:column; gap:10px; }
  .modal-group { border:1px solid var(--line); border-radius:8px; padding:8px 10px; }
  .modal-group h3 { margin:0 0 6px; font-size:11px; text-transform:uppercase; letter-spacing:.04em;
                    color:var(--mut); }
  .modal-check { display:flex; align-items:center; gap:8px; font-size:13px; padding:3px 0;
                 cursor:pointer; }
  .modal-check input { margin:0; }
  .modal-toolbar { display:flex; gap:8px; flex-wrap:wrap; }
  .modal-toolbar button { font-size:12px; padding:3px 8px; }
  .modal-actions { display:flex; justify-content:flex-end; gap:8px; padding-top:4px; }
  .modal-actions .primary { border-color:var(--accent); color:#c7c9ff; }
  #inputs { display:flex; flex-direction:column; gap:12px; padding:12px 16px;
            border-bottom:1px solid var(--line); background:var(--bg); }
  .section-row { display:flex; flex-direction:column; gap:10px;
                 padding:14px 16px; background:var(--panel);
                 border:1px solid var(--line); border-radius:10px; }
  .section-row[data-section="car"] { border-left:3px solid var(--car); }
  .section-row[data-section="track"] { border-left:3px solid var(--accent); }
  /* Nested panels inside Track (Onsite / Portable / Offsite Charging) */
  .track-panel {
    margin-top:8px; padding:10px 12px; border:1px solid var(--line); border-radius:8px;
  }
  /* At-track: tab strip with radio per option; only one panel body visible */
  .track-source-choice {
    margin-top:10px;
  }
  .track-source-choice-label {
    margin:0 0 8px; font-size:10px; font-weight:650; text-transform:uppercase;
    letter-spacing:.05em; color:var(--mut);
  }
  .track-source-tabs {
    display:flex; flex-wrap:wrap; gap:4px; align-items:stretch;
    margin:0; padding:0;
  }
  .track-source-tab {
    display:inline-flex; align-items:center; gap:7px;
    margin:0; padding:7px 12px 8px;
    border:1px solid var(--line); border-bottom:none;
    border-radius:8px 8px 0 0;
    background:rgba(0,0,0,.18); color:var(--mut);
    font-size:12px; font-weight:650; letter-spacing:.02em;
    cursor:pointer; user-select:none;
    transition: background .12s ease, color .12s ease, border-color .12s ease;
  }
  .track-source-tab > label.at-track-radio-label {
    display:inline-flex; align-items:center; gap:7px;
    margin:0; cursor:pointer; color:inherit;
  }
  .track-source-tab input[type="radio"] {
    margin:0; width:0.95rem; height:0.95rem; flex:0 0 auto;
    accent-color:var(--accent); cursor:pointer;
  }
  .track-source-tab .track-source-tab-label {
    white-space:nowrap;
  }
  .track-source-tab:hover {
    color:var(--txt); background:rgba(255,255,255,.04);
  }
  .track-source-tab.is-selected {
    color:var(--txt); background:var(--panel);
    border-color:var(--line); z-index:1;
    box-shadow:0 1px 0 var(--panel); /* cover shared panel top border */
  }
  .track-source-tab[data-source="none"].is-selected {
    border-top:2px solid var(--at-track-none); padding-top:6px;
    color:var(--at-track-none);
  }
  .track-source-tab[data-source="onsite"].is-selected {
    border-top:2px solid var(--at-track); padding-top:6px;
    color:var(--at-track);
  }
  .track-source-tab[data-source="portable"].is-selected {
    border-top:2px solid var(--at-track-portable); padding-top:6px;
    color:var(--at-track-portable);
  }
  .track-source-tab[data-source="none"].is-selected input { accent-color:var(--at-track-none); }
  .track-source-tab[data-source="onsite"].is-selected input { accent-color:var(--at-track); }
  .track-source-tab[data-source="portable"].is-selected input { accent-color:var(--at-track-portable); }
  /* Per-mode color swatches on at-track tabs */
  .track-source-tab input[type="color"].at-track-color {
    width:1.15rem; height:1.15rem; padding:0; margin:0;
    border:1px solid var(--line); border-radius:3px;
    background:transparent; cursor:pointer; flex:0 0 auto;
  }
  .track-source-tab input[type="color"].at-track-color::-webkit-color-swatch-wrapper {
    padding:1px;
  }
  .track-source-tab input[type="color"].at-track-color::-webkit-color-swatch {
    border:none; border-radius:2px;
  }
  .track-source-panels {
    border:1px solid var(--line); border-radius:0 8px 8px 8px;
    background:var(--panel); padding:0; min-width:0;
  }
  .track-source-option { display:none; margin:0; padding:0; }
  .track-source-option.is-selected { display:block; }
  .track-source-option .track-panel {
    margin:0; border:none; border-radius:0; background:transparent; min-width:0;
  }
  /* Panel accent when selected (left bar on content) — colors from CSS vars / pickers */
  .track-source-option[data-source="none"] .track-panel {
    border-left:3px solid var(--at-track-none);
    background:color-mix(in srgb, var(--at-track-none) 12%, transparent);
  }
  .track-source-option[data-source="onsite"] .track-panel {
    border-left:3px solid var(--at-track);
    background:color-mix(in srgb, var(--at-track) 10%, transparent);
  }
  .track-source-option[data-source="portable"] .track-panel {
    border-left:3px solid var(--at-track-portable);
    background:color-mix(in srgb, var(--at-track-portable) 10%, transparent);
  }
  .track-panel.track-none .track-panel-body {
    font-size:11.5px; color:var(--at-track-none); line-height:1.35; opacity:.9;
  }
  .track-panel.track-offsite {
    border-left:3px solid #22c55e; background:rgba(34,197,94,.04);
  }
  .track-panel .section-head {
    padding-bottom:6px; margin-bottom:6px; border-bottom:1px dashed var(--line);
  }
  .track-panel .section-head .grp-title { font-size:11px; font-weight:600; color:var(--mut); }
  .track-panel .section-head select { flex:0 1 180px; width:180px; max-width:240px; font-size:12px; }
  .track-panel .panel-title {
    margin:0 0 8px; font-size:12px; font-weight:650; text-transform:uppercase;
    letter-spacing:.04em; color:var(--txt);
  }
  .track-panel .panel-enable {
    display:flex; align-items:center; gap:8px; margin:0 0 8px; cursor:pointer;
    font-size:12px; font-weight:650; text-transform:uppercase; letter-spacing:.04em;
    color:var(--txt); user-select:none;
  }
  .track-panel .panel-enable input { margin:0; width:auto; accent-color:var(--accent); cursor:pointer; }
  /* Disabled panels: mute accent + grey body (radios stay outside / clickable) */
  .track-panel.is-off {
    border-left-color: #3a4150 !important;
    background: rgba(0,0,0,.14) !important;
  }
  .track-panel.is-off .track-panel-body {
    opacity:.38; filter:grayscale(.65); pointer-events:none;
  }
  .track-panel.is-off .section-head {
    opacity:.38; filter:grayscale(.65); pointer-events:none;
  }
  .track-panel.is-off > .panel-title {
    color:#5c6370; opacity:.72;
  }
  .track-panel.is-off > .panel-enable {
    color:#5c6370; opacity:.72; pointer-events:auto; filter:none;
  }
  .track-panel.is-off > .panel-enable input { opacity:.7; }
  .track-panel .subgrp:first-of-type { margin-top:0; padding-top:0; border-top:none; }
  /* EV / TRACK: profile select + ⋯ menu */
  .section-head { display:flex; flex-wrap:nowrap; gap:6px; align-items:center; min-width:0;
                  padding-bottom:8px; border-bottom:1px solid var(--line); margin-bottom:2px; }
  .section-head .grp-title { flex:0 0 auto; font-size:16px; text-transform:uppercase;
                             letter-spacing:.04em; color:var(--txt); font-weight:700; white-space:nowrap; }
  .section-head select { flex:0 1 200px; width:200px; min-width:120px; max-width:280px;
                         padding:4px 6px; background:#0c0e12; color:var(--txt);
                         border:1px solid var(--line); border-radius:6px; font-size:12.5px; }
  .section-head button, #reset, .btn { flex:0 0 auto; white-space:nowrap; padding:4px 8px;
           border:1px solid var(--line); background:#0c0e12; color:var(--txt);
           border-radius:6px; cursor:pointer; font-size:12px; }
  .section-head button:hover, #reset:hover, .btn:hover { border-color:#4b5563; }
  .section-head button:disabled { opacity:.4; cursor:not-allowed; }
  .section-head .dirty-actions {
    flex:0 0 auto; display:none; align-items:center; gap:6px;
  }
  .section-head .dirty-actions.is-dirty { display:inline-flex; }
  .section-head .dirty-save,
  .section-head .dirty-reset {
    display:inline-flex; align-items:center; justify-content:center;
    padding:5px 14px; font-size:12.5px; font-weight:700; letter-spacing:.02em;
    border-radius:7px; border:1px solid transparent; cursor:pointer;
    color:#0b1020; background:linear-gradient(180deg, #a5b4fc 0%, #6366f1 100%);
    box-shadow:0 0 0 2px rgba(99,102,241,.45), 0 4px 14px rgba(99,102,241,.55);
    animation: savePulse 1.6s ease-in-out infinite;
  }
  .section-head .dirty-save:hover,
  .section-head .dirty-reset:hover {
    background:linear-gradient(180deg, #c7d2fe 0%, #818cf8 100%);
    box-shadow:0 0 0 3px rgba(99,102,241,.55), 0 6px 18px rgba(99,102,241,.65);
  }
  .section-head .dirty-save:active,
  .section-head .dirty-reset:active { transform:translateY(1px); }
  @keyframes savePulse {
    0%, 100% { box-shadow:0 0 0 2px rgba(99,102,241,.45), 0 4px 14px rgba(99,102,241,.5); }
    50% { box-shadow:0 0 0 4px rgba(99,102,241,.65), 0 6px 20px rgba(99,102,241,.75); }
  }
  .menu-wrap { position:relative; flex:0 0 auto; }
  .menu-wrap > .menu-btn { width:2rem; padding:4px 0; font-size:16px; line-height:1;
                           letter-spacing:0.05em; text-align:center; }
  .menu-dropdown {
    position:absolute; top:calc(100% + 4px); left:0; z-index:40;
    min-width:9.5rem; padding:4px 0; margin:0;
    background:var(--panel); border:1px solid var(--line); border-radius:8px;
    box-shadow:0 8px 24px rgba(0,0,0,.45);
  }
  .menu-dropdown[hidden] { display:none; }
  .menu-dropdown button {
    display:block; width:100%; box-sizing:border-box;
    padding:7px 12px; border:0; border-radius:0; background:transparent;
    color:var(--txt); font-size:12.5px; text-align:left; cursor:pointer; white-space:nowrap;
  }
  .menu-dropdown button:hover:not(:disabled) { background:#1c2230; }
  .menu-dropdown button:disabled { opacity:.4; cursor:not-allowed; }
  .menu-dropdown button.menu-danger { color:var(--bad); }
  .menu-dropdown hr { border:0; border-top:1px solid var(--line); margin:4px 0; }
  .grp-fields { display:flex; flex-wrap:wrap; gap:10px 14px; align-items:flex-end; }
  .fld { display:flex; flex-direction:column; gap:2px; }
  .fld label { font-size:11px; color:var(--mut); }
  .fld-control { display:flex; align-items:center; gap:4px; }
  .fld .unit { font-size:11px; color:var(--mut); white-space:nowrap; }
  .fld input, .fld select { padding:4px 6px; background:#0c0e12; color:var(--txt);
               border:1px solid var(--line); border-radius:5px; font-size:13px;
               box-sizing:border-box; }
  .fld input[type="number"],
  .fld input[type="time"] { text-align:right; }
  .fld input[type="text"] { text-align:left; }
  /* Compact number fields; hide spinners so width matches the digits */
  .fld input[type="number"] { width:3.1rem; -moz-appearance:textfield; }
  .fld input[type="number"]::-webkit-outer-spin-button,
  .fld input[type="number"]::-webkit-inner-spin-button { -webkit-appearance:none; margin:0; }
  .fld input[type="number"].w-sm { width:2.6rem; }   /* %, min — 1–3 digits */
  .fld input[type="number"].w-lg { width:3.6rem; }   /* decimals / 3+ digits (99.4, 250) */
  .fld input[type="time"] { width:5rem; }
  /* No native clock/calendar picker — collapse leftover indicator space */
  .fld input[type="time"]::-webkit-calendar-picker-indicator,
  table.sess-table input[type="time"]::-webkit-calendar-picker-indicator {
    display: none !important;
    -webkit-appearance: none;
    appearance: none;
    width: 0 !important;
    height: 0 !important;
    max-width: 0;
    padding: 0 !important;
    margin: 0 !important;
    opacity: 0;
    pointer-events: none;
  }
  .fld input[type="time"]::-webkit-datetime-edit,
  .fld input[type="time"]::-webkit-datetime-edit-fields-wrapper,
  table.sess-table input[type="time"]::-webkit-datetime-edit,
  table.sess-table input[type="time"]::-webkit-datetime-edit-fields-wrapper {
    padding: 0;
    margin: 0;
  }
  .fld input[type="text"] { width:7.5rem; }
  .fld select { width:auto; min-width:4.5rem; }
  .fld select#chargeCurveId { width:auto; min-width:0; max-width:100%; }
  /* EV section: fields hug content; curve sits tight beside them (no flex-grow gap) */
  .car-body {
    display:flex; flex-direction:row; flex-wrap:wrap; align-items:flex-start; gap:8px 12px;
    min-width:0;
  }
  .car-body .grp-fields {
    flex:0 1 auto; min-width:0; max-width:100%; align-content:flex-start;
  }
  /* Compact toggle on the Vehicle label line: "Vehicle [Show curve]" */
  .fld-label-row {
    display:flex; align-items:center; gap:6px; min-width:0;
  }
  .fld-label-row > label {
    margin:0; font-size:11px; color:var(--mut);
  }
  .fld-label-row button.curve-toggle-btn {
    display:inline-flex; align-items:center;
    margin:0; padding:1px 5px; font-size:10px; font-weight:600;
    color:var(--mut); background:transparent; border:1px solid var(--line);
    border-radius:4px; cursor:pointer; line-height:1.15; white-space:nowrap;
    flex:0 0 auto;
  }
  .fld-label-row button.curve-toggle-btn:hover { border-color:#4b5563; color:var(--txt); }
  .fld-label-row button.curve-toggle-btn[aria-expanded="true"] {
    color:var(--txt); border-color:#4b5563; background:#0c0e12;
  }
  .curve-col {
    width:240px; max-width:min(240px, 100%);
    display:flex; flex-direction:column; min-height:0; align-self:flex-start;
  }
  .curve-col[hidden] { display:none !important; }
  .curve-col canvas#chargeCurveChart {
    width:100%; height:120px; min-height:0; max-height:120px; display:block;
    background:#0c0e12; border:1px solid var(--line); border-radius:6px;
    cursor:crosshair;
  }
  .curve-caption {
    flex:0 0 auto; margin-top:2px; font-size:10px; color:var(--mut); letter-spacing:.02em;
    text-align:right;
  }
  .fld input:disabled, .fld select:disabled { opacity:.45; }
  .subgrp { margin-top:4px; padding-top:6px; border-top:1px dashed var(--line); }
  /* No separator when the sub-section is the first content under the profile header */
  .section-head + .subgrp { margin-top:0; padding-top:0; border-top:none; }
  .subgrp-head { display:flex; align-items:center; gap:8px; margin-bottom:4px; min-width:0; }
  .subgrp-head .subgrp-title { margin-bottom:0; flex:0 1 auto; }
  .subgrp-title { font-size:10px; text-transform:uppercase; letter-spacing:.04em;
                  color:var(--mut); margin-bottom:4px; }
  #sessionsTitle {
    font-size:13px; font-weight:650; color:var(--txt); letter-spacing:.03em;
    margin:0 0 4px;
  }
  .sessions-head {
    display:flex; align-items:center; flex-wrap:wrap; gap:8px 12px; margin-bottom:4px; min-width:0;
  }
  .sessions-head #sessionsPlanTitle {
    margin-bottom:0; font-size:13px; font-weight:650; color:var(--txt);
    letter-spacing:.06em; text-transform:uppercase;
  }
  .sessions-stats {
    display:flex; align-items:center; flex-wrap:wrap; gap:6px 14px;
    font-size:12px; color:var(--mut); font-weight:500;
  }
  .sessions-stats .sess-stat-val {
    color:var(--txt); font-weight:650; font-variant-numeric:tabular-nums;
  }
  .sessions-stats .sess-stat-sep { color:var(--line); user-select:none; }
  .sessions-stats .sess-max-dur {
    display:inline-flex; align-items:center; gap:5px; white-space:nowrap;
  }
  .sessions-stats .sess-max-dur label {
    margin:0; font-size:12px; color:var(--mut); font-weight:500; cursor:pointer;
  }
  .sessions-stats .sess-max-dur input#sessionDurationMin {
    width:3.2rem; padding:2px 5px; text-align:right;
    background:#0c0e12; color:var(--txt); border:1px solid var(--line);
    border-radius:5px; font-size:12px; font-variant-numeric:tabular-nums;
  }
  .sessions-stats .sess-max-dur .unit {
    font-size:12px; color:var(--mut);
  }
  /* Session count + day stats under Track profile dropdown */
  .track-day-summary {
    margin:-2px 0 6px; padding-left:0;
  }
  .track-day-stats {
    display:flex; align-items:center; flex-wrap:wrap; gap:4px 0;
    margin:0; padding-left:0; row-gap:4px;
    font-size:12px; color:var(--mut); font-weight:500;
  }
  .track-day-stats .track-stat {
    display:inline-flex; align-items:baseline; gap:4px;
    white-space:nowrap; margin-right:2px;
  }
  .track-day-stats .sess-stat-val {
    color:var(--txt); font-weight:650; font-variant-numeric:tabular-nums;
  }
  .track-day-stats .sess-stat-sep {
    color:var(--line); user-select:none; margin:0 8px;
  }
  /* Result panel is chart + feasibility only (stats live under Track) */
  #result .metrics { display:none; }
  .sessions-add-row { margin-top:8px; }
  button.add-session-btn {
    display:inline-flex; align-items:center; gap:6px;
    padding:5px 12px; font-size:12px; font-weight:600;
    color:var(--txt); background:#0c0e12; border:1px solid var(--line);
    border-radius:6px; cursor:pointer; line-height:1.2;
  }
  button.add-session-btn:hover { border-color:#4b5563; color:#fff; }
  button.add-session-btn svg { width:12px; height:12px; flex:0 0 auto; opacity:.85; }
  /* Generator / Battery / Grid: enable label + fields on one row */
  .subgrp[data-sub] {
    display:flex; flex-wrap:wrap; align-items:flex-end; gap:8px 14px;
  }
  .subgrp[data-sub] .subgrp-head {
    margin-bottom:0; flex:0 0 auto; align-self:flex-end;
    padding-bottom:5px; /* line up with input baselines under field labels */
  }
  .subgrp[data-sub] .grp-fields {
    flex:1 1 auto; min-width:0; margin:0;
  }
  /* Live sim readout at end of Generator field row */
  .gen-runtime {
    display:inline-flex; align-items:baseline; gap:5px;
    flex:0 0 auto; align-self:flex-end;
    padding-bottom:5px; /* match .subgrp-head baseline offset */
    white-space:nowrap; font-size:12px; color:var(--mut);
  }
  .gen-runtime .gen-runtime-val {
    color:var(--txt); font-weight:650; font-variant-numeric:tabular-nums;
  }
  .subgrp.is-off .gen-runtime { opacity:.55; }
  .subgrp-enable { display:flex; align-items:center; gap:6px; margin:0; cursor:pointer;
                   font-size:10px; text-transform:uppercase; letter-spacing:.04em;
                   color:var(--mut); font-weight:600; user-select:none; white-space:nowrap; }
  .subgrp-enable input { margin:0; width:auto; accent-color:var(--accent); cursor:pointer; }
  /* Disabled Generator / Battery (etc.): grey fields; enable stays usable */
  .subgrp.is-off {
    opacity:1;
  }
  .subgrp.is-off .grp-fields {
    opacity:.38; filter:grayscale(.65); pointer-events:none;
  }
  .subgrp.is-off .subgrp-enable { color:#5c6370; opacity:.72; }

      sub.querySelectorAll('.grp-fields input, .grp-fields select').forEach(function (el) {

    var gen = document.getElementById('genEnabled');
    var bat = document.getElementById('batteryEnabled');
    var portPanel = document.getElementById('siteChargingEnabled');

    // Whole portable panel greys via track-panel.is-off; sub-sections follow gen/battery enables

    setSubOn('Generator', portablePanelOn && gen.checked);
    setSubOn('Battery', portablePanelOn && bat.checked);
    setControlDisabled(gen, !portablePanelOn);

    // AC-DC is the gen→battery bus rectifier: only editable when both are on

  function profileReload(kind) {

  function profileSave(kind) {

  /** Create a blank profile with defaults (unlike Save as, which copies current form). */

      name: name,
      builtin: false,
      values: values,

    setActiveId(kind, prof.id);
    if (kind === 'track') {

    } else if (kind === 'site') {
      applyProfileValues('site', values);

  function profileDelete(kind) {
    var list = listFor(kind);
    var id = activeIdFor(kind);
    var prof = UI.findProfile(list, id);
    if (!prof || list.length <= 1) return;
    if (!window.confirm('Delete profile "' + prof.name + '"?')) return;
    var idx = -1;
    for (var i = 0; i < list.length; i++) if (list[i].id === id) { idx = i; break; }
    var next = UI.removeProfile(list, id);
    if (!next.length) return;
    // Prefer the profile that slid into this slot; otherwise the previous one.
    var pick = next[Math.min(Math.max(idx, 0), next.length - 1)] || next[0];
    setList(kind, next);

  /** Display order for profile selects (does not reorder stored list). */

          escapeHtml(p.name) + '</option>';

  function updateDirty(kind) {

    if (prof) {

      if (kind === 'track') {

  function escapeHtml(s) {

  // ---- Session list editor (part of Track) ----
  // Sessions are primary rows. After each enabled non-last session: a gap mode dropdown
  // (Charge onsite | Charge offsite | No charging). Onsite when track onsite and/or portable is on.
  function siteChargingAvailableFromDom() {

    if (grid && grid.checked) return true;
    var panel = document.getElementById('siteChargingEnabled');
    if (panel && !panel.checked) return false;
    var gen = document.getElementById('genEnabled');
    var bat = document.getElementById('batteryEnabled');
    if (gen && gen.checked) return true;
    if (bat && bat.checked) return true;
    return false;
  }
  function offsiteChargingAvailableFromDom() {
    var panel = document.getElementById('offsiteChargingEnabled');

  }
  /** Active at-track mode from radios: none | onsite | portable */
  function atTrackModeLabelForGap() {
    var mode = typeof atTrackModeFromDom === 'function' ? atTrackModeFromDom() : 'portable';
    if (mode === 'onsite') return 'Charge onsite';
    if (mode === 'portable') {
      var sel = document.getElementById('siteSelect');
      var name = '';
      if (sel && sel.selectedIndex >= 0) {
        name = (sel.options[sel.selectedIndex].text || '').trim();
      }
      if (!name && typeof listFor === 'function' && typeof activeIdFor === 'function') {
        var prof = UI.findProfile(listFor('site'), activeIdFor('site'));
        if (prof) name = prof.name;

      return name ? ('Charge at ' + name) : 'Charge at portable';
    }
    return 'Charge at track';

  function offsiteSitesFromDomOrParams() {
    if (typeof readOffsiteSitesForm === 'function') {

    }
    return (typeof Sim !== 'undefined' && Sim.defaultOffsiteSites)
      ? Sim.defaultOffsiteSites() : [];
  }
  function gapActionOptions(allowOnsite, allowOffsite) {
    if (allowOffsite == null) allowOffsite = offsiteChargingAvailableFromDom();
    var opts = [];
    if (allowOnsite) {
      opts.push({ value: 'onsite', label: atTrackModeLabelForGap() });
    }
    if (allowOffsite) {
      var sites = offsiteSitesFromDomOrParams();
      if (!sites.length) {
        opts.push({ value: 'offsite', label: 'Charge offsite' });
      } else {
        sites.forEach(function (s) {
          opts.push({
            value: 'offsite:' + s.id,
            label: 'Charge @ ' + s.name,
          });
        });
      }

    opts.push({ value: 'none', label: 'No charging' });

  function afterSelectValue(after, siteId) {
    if (after === 'offsite') {
      if (siteId) return 'offsite:' + siteId;
      var sites = offsiteSitesFromDomOrParams();
      return sites[0] ? ('offsite:' + sites[0].id) : 'offsite';
    }
    return after || 'onsite';
  }
  function parseAfterSelectValue(v) {
    v = String(v == null ? '' : v);
    if (v.indexOf('offsite:') === 0) {
      return { after: 'offsite', offsiteSiteId: v.slice(8) || null };
    }
    if (v === 'offsite') return { after: 'offsite', offsiteSiteId: null };
    if (v === 'none') return { after: 'none', offsiteSiteId: null };
    return { after: 'onsite', offsiteSiteId: null };

  function normalizeGapModeForUi(mode, allowOnsite, allowOffsite, siteId) {
    if (allowOffsite == null) allowOffsite = offsiteChargingAvailableFromDom();
    var parsed = parseAfterSelectValue(mode);
    // Also accept raw onsite/offsite/none without prefix
    var a = parsed.after;
    if (mode === 'run' || mode === '') a = 'onsite';
    else if (mode === 'nothing') a = 'none';
    if (a === 'onsite' && !allowOnsite) a = 'none';
    if (a === 'offsite' && !allowOffsite) a = 'none';
    if (a === 'offsite') {
      return afterSelectValue('offsite', siteId || parsed.offsiteSiteId);

    return a;
  }
  function gapSelectHtml(selected, allowOnsite, allowOffsite, sessionRow) {
    allowOnsite = !!allowOnsite;
    if (allowOffsite == null) allowOffsite = offsiteChargingAvailableFromDom();
    var siteId = sessionRow && sessionRow.offsiteSiteId;
    var selVal = normalizeGapModeForUi(selected, allowOnsite, allowOffsite, siteId);
    // If selected is plain offsite, resolve to first/matching site option
    if (selVal === 'offsite' || (String(selected) === 'offsite')) {
      selVal = afterSelectValue('offsite', siteId);
    }
    var opts = gapActionOptions(allowOnsite, allowOffsite);
    // Ensure current value appears even if site was deleted
    if (selVal.indexOf('offsite:') === 0 && !opts.some(function (o) { return o.value === selVal; })) {
      opts.splice(opts.length - 1, 0, {

  function gapModeLabel(mode, allowOnsite, allowOffsite, siteId) {

    if (String(v).indexOf('offsite') === 0) {

      var site = (typeof Sim !== 'undefined' && Sim.getOffsiteSite)
        ? Sim.getOffsiteSite({ offsiteSites: offsiteSitesFromDomOrParams() }, id)

  var OFFSITE_STOP_OPTIONS = [
    { value: 'next', label: 'Until next session' },

    { value: 'for', label: 'For' },

  function offsiteOptsHtml(s, visible) {
    var stop = (s && s.offsiteStop) || 'next';
    if (stop === 'till') stop = 'until';
    if (stop !== 'until' && stop !== 'for') stop = 'next';
    var soc = (s && s.offsiteUntilSocPct != null) ? s.offsiteUntilSocPct : 80;
    var mins = (s && s.offsiteForMin != null) ? s.offsiteForMin : 30;
    var stopOpts = OFFSITE_STOP_OPTIONS.map(function (o) {
      return '<option value="' + o.value + '"' + (o.value === stop ? ' selected' : '') + '>' +
        o.label + '</option>';

    return '<span class="sess-offsite-opts"' + (visible ? '' : ' hidden') + '>' +
      '<select class="sess-offsite-stop" aria-label="Offsite charge stop">' + stopOpts + '</select>' +
      '<span class="sess-offsite-until"' + (stop === 'until' ? '' : ' hidden') + '>' +
        '<input type="number" class="sess-offsite-soc" min="1" max="100" step="any" data-num-min="1" data-num-max="100" data-pct-max="100" value="' + soc + '" aria-label="Charge until SoC">' +
        '<span class="unit">%</span>' +
      '</span>' +
      '<span class="sess-offsite-for"' + (stop === 'for' ? '' : ' hidden') + '>' +
        '<input type="number" class="sess-offsite-min" min="1" max="480" step="1" data-num-min="1" data-num-max="480" value="' + mins + '" aria-label="Charge for minutes">' +
        '<span class="unit">min</span>' +
      '</span>' +
    '</span>';

  function syncOffsiteOptsVisibility(scope) {
    if (!scope) return;
    // scope may be a tbody, a charge-row tr, or any ancestor of the after select
    var after = scope.matches && scope.matches('select.sess-after')
      ? scope : scope.querySelector('.sess-after');
    var root = after ? (after.closest('tr') || scope) : scope;
    var opts = root.querySelector
      ? root.querySelector('.sess-offsite-opts')
      : null;
    if (!opts && after) opts = after.parentElement && after.parentElement.querySelector('.sess-offsite-opts');
    if (!opts) return;
    var isOff = after && (after.value === 'offsite' || String(after.value).indexOf('offsite:') === 0);
    opts.hidden = !isOff;
    if (!isOff) return;
    var stop = opts.parentElement
      ? opts.parentElement.querySelector('.sess-offsite-stop')
      : opts.querySelector('.sess-offsite-stop');
    if (!stop) stop = root.querySelector && root.querySelector('.sess-offsite-stop');
    var mode = stop ? stop.value : 'next';
    var untilEl = opts.querySelector('.sess-offsite-until');

  /** Dropdown alone when editable; plain label for continuation rows. */
  function chargeActHtml(mode, editable, allowOnsite, sessionRow) {
    if (allowOnsite == null) allowOnsite = siteChargingAvailableFromDom();
    var allowOffsite = offsiteChargingAvailableFromDom();
    var siteId = sessionRow && sessionRow.offsiteSiteId;
    var selVal = normalizeGapModeForUi(mode, allowOnsite, allowOffsite, siteId);
    if (!editable) return gapModeLabel(mode, allowOnsite, allowOffsite, siteId);
    var html = gapSelectHtml(mode, allowOnsite, allowOffsite, sessionRow);
    var isOff = String(selVal).indexOf('offsite') === 0;
    // Offsite stop controls sit under the mode dropdown (shown when offsite)
    html += offsiteOptsHtml(
      sessionRow || { offsiteStop: 'next', offsiteUntilSocPct: 80, offsiteForMin: 30 },

  /** Keep after-session dropdown options in sync with site/offsite availability. */
  function syncSessionGapOptions() {
    var allowOnsite = siteChargingAvailableFromDom();
    var allowOffsite = offsiteChargingAvailableFromDom();
    // Only session-block gap selects — never the pre-track site dropdown
    document.querySelectorAll('select.sess-after').forEach(function (sel) {
      if (sel.closest('#preTrackBlock')) return;
      var row = sel.closest('tr[data-idx]');
      var idx = row ? row.getAttribute('data-idx') : null;

        ? table.querySelector('input.sess-site-keep[data-idx="' + idx + '"]')
        : null;

      setCell(table.querySelector('.pre-sc-end'), UI.minToAmPmAligned(pre.leaveScMin));
      setForMinCell(table.querySelector('.pre-sc-dur'), pre.scDurationMin);
      setSocCell(table.querySelector('.pre-sc-soc'), tl0, pre.scArriveMin,
        Math.max(pre.scArriveMin, pre.leaveScMin - 1), p, 'sess-num pre-sc-soc', 'car',
        Object.assign({}, noRes, { modes: scModes }));
      setSocCell(table.querySelector('.pre-sc-trl'), tl0, pre.scArriveMin,
        Math.max(pre.scArriveMin, pre.leaveScMin - 1), p, 'sess-num pre-sc-trl', 'trailer',
        Object.assign({}, noRes, { modes: scModes }));
      // Row 2: Drive to track
      setCell(table.querySelector('.pre-drive-start'), UI.minToAmPmAligned(pre.driveStartMin));
      setCell(table.querySelector('.pre-drive-end'), UI.minToAmPmAligned(pre.driveEndMin));
      setForMinCell(table.querySelector('.pre-drive-dur'), pre.driveTimeMin);
      setSocCell(table.querySelector('.pre-drive-soc'), tl0, pre.driveStartMin,
        Math.max(pre.driveStartMin, pre.driveEndMin - 1), p, 'sess-num pre-drive-soc', 'car',
        Object.assign({}, noRes, { modes: driveModes }));
      setSocCell(table.querySelector('.pre-drive-trl'), tl0, pre.driveStartMin,
        Math.max(pre.driveStartMin, pre.driveEndMin - 1), p, 'sess-num pre-drive-trl', 'trailer',
        Object.assign({}, noRes, { modes: driveModes }));
      // Row 3: Arrive no later than [user time] — start is computed actual arrival
      var noLater = pre.noLaterThanMin != null ? pre.noLaterThanMin : p.arrivalTimeMin;
      syncArriveNoLaterThanField(UI.minToHHMM(
        noLater != null ? noLater : 8 * 60
      ));
      var arriveStart = pre.trackArriveMin;
      var hasPadCharge = pre.atTrackMode === 'onsite';
      // When charging, arrive is a moment; when not, idle until first session
      var arriveEnd = hasPadCharge ? arriveStart : pre.firstSessionMin;
      var arriveFor = Math.max(0, arriveEnd - arriveStart);
      setCell(table.querySelector('.pre-arrive-start'), UI.minToAmPmAligned(arriveStart));
      setCell(table.querySelector('.pre-arrive-end'),
        hasPadCharge ? '—' : UI.minToAmPmAligned(arriveEnd));
      if (hasPadCharge) {
        setForMinCell(table.querySelector('.pre-arrive-dur'), null);
        setCell(table.querySelector('.pre-arrive-soc'), '—', 'sess-num pre-arrive-soc');
        setCell(table.querySelector('.pre-arrive-trl'), '—', 'sess-num pre-arrive-trl');
      } else {
        setForMinCell(table.querySelector('.pre-arrive-dur'), arriveFor);
        setSocCell(table.querySelector('.pre-arrive-soc'), tl0, arriveStart,
          Math.max(arriveStart, arriveEnd - 1), p, 'sess-num pre-arrive-soc', 'car',
          Object.assign({}, noRes, { modes: padModes }));
        setSocCell(table.querySelector('.pre-arrive-trl'), tl0, arriveStart,
          Math.max(arriveStart, arriveEnd - 1), p, 'sess-num pre-arrive-trl', 'trailer',
          Object.assign({}, noRes, { modes: padModes }));
      }
      // Row 4: Charge onsite until first session (only when at-track power is available)
      var padRow = table.querySelector('.pre-pad-charge-row');
      if (padRow) {
        padRow.hidden = !hasPadCharge;
        var padLabel = padRow.querySelector('.pre-pad-label');
        if (padLabel) {
          padLabel.textContent = atTrackModeLabelForGap() + ' until first session';
        }
        if (hasPadCharge) {
          setCell(table.querySelector('.pre-pad-start'), UI.minToAmPmAligned(pre.trackArriveMin));
          setCell(table.querySelector('.pre-pad-end'), UI.minToAmPmAligned(pre.firstSessionMin));
          setForMinCell(table.querySelector('.pre-pad-dur'),
            Math.max(0, pre.firstSessionMin - pre.trackArriveMin));
          setSocCell(table.querySelector('.pre-pad-soc'), tl0, pre.trackArriveMin,
            Math.max(pre.trackArriveMin, pre.firstSessionMin - 1), p, 'sess-num pre-pad-soc', 'car',
            Object.assign({}, noRes, { modes: padModes }));
          setSocCell(table.querySelector('.pre-pad-trl'), tl0, pre.trackArriveMin,
            Math.max(pre.trackArriveMin, pre.firstSessionMin - 1), p, 'sess-num pre-pad-trl', 'trailer',
            Object.assign({}, noRes, { modes: padModes }));
        }
      }
    }
    // Mid-day table: render contiguous day activities (timeline-first view model)
    renderDayBody(p, result);

    // Header: N of M Track Sessions + total time / kWh on track
    if (result && result.metrics) {
      var m = result.metrics;
      var total = m.plannedSessions != null ? m.plannedSessions
        : (sessionsFormCache && sessionsFormCache.length) || 0;
      updateSessionsTitle(m.sessionsRun != null ? m.sessionsRun : 0, total);
      updateSessionsStats(p, m);
    } else {
      updateSessionsStats(p, null);
    }
  }

  // ── Day activity table (mid-day rows) ─────────────────────────────────────
  var sessionsFormCache = null;
  var dayBodyWired = false;

  function ensureDayBody() {
    var table = sessionTable();
    if (!table) return null;
    ensurePreTrackBlock();
    var day = document.getElementById('dayBody');
    if (!day) {
      day = document.createElement('tbody');
      day.id = 'dayBody';
      day.className = 'sess-day-body';
      var pre = document.getElementById('preTrackBlock');
      if (pre) pre.insertAdjacentElement('afterend', day);
      else table.appendChild(day);
    }
    table.querySelectorAll('tbody.sess-block, #sessDaySorted').forEach(function (b) {
      b.remove();
    });
    return day;
  }

  function formSessForAct(act, formSessions) {
    formSessions = formSessions || sessionsFormCache || [];
    if (act && act.formIdx != null && formSessions[act.formIdx]) {
      return formSessions[act.formIdx];
    }
    return null;
  }

  function siteColorStyleAttr(color) {
    if (!color) return '';
    var c = (typeof Sim !== 'undefined' && Sim.normalizeOffsiteColor)
      ? Sim.normalizeOffsiteColor(color, 0) : String(color);
    if (!c || c.charAt(0) !== '#') return '';
    return ' style="--site-color:' + escapeHtml(c) + '"';
  }
  function dayActivityRowHtml(act, formSessions, p) {
    var fi = act.formIdx != null ? act.formIdx : '';
    var di = fi === '' ? '' : ' data-idx="' + fi + '"';
    var aid = ' data-act-id="' + escapeHtml(String(act.id)) + '"';
    var siteStyle = siteColorStyleAttr(act.siteColor);
    var siteData = act.siteId
      ? ' data-site-id="' + escapeHtml(String(act.siteId)) + '"'
      : '';
    var fs = formSessForAct(act, formSessions);
    var allowOnsite = siteChargingAvailableFromDom();
    var allowOffsite = offsiteChargingAvailableFromDom();
    var startTxt = UI.minToAmPmAligned(act.startMin);
    var endTxt = (act.hideEnd || act.hideTimes) ? '—' : UI.minToAmPmAligned(act.endMin);
    var forMin = (act.hideTimes || act.hideEnd) ? null
      : Math.max(0, Math.round(act.endMin - act.startMin));
    var forHtml = forMin == null
      ? '<span class="for-line"><span class="for-num">—</span><span class="unit"></span></span>'
      : forMinHtml(forMin);
    var trCls = 'day-act day-act-' + act.kind;
    if (act.className) trCls += ' ' + act.className;
    if (act.kind === 'session') trCls += ' sess-edit-row';
    if (act.kind === 'missed' || act.kind === 'skipped') trCls += ' sess-edit-row sess-disabled';
    if (act.kind === 'missed') trCls += ' sess-away-missed';
    if (act.kind === 'drive_out' || act.kind === 'drive_back') trCls += ' sess-drive';
    if (act.kind === 'sc') trCls += ' sess-sc';
    if (act.kind === 'pad_charge') trCls += ' sess-pad-charge';
    if (act.kind === 'gap_control') trCls += ' sess-charge-row';
    if (act.kind === 'idle') trCls += ' sess-wait-row sess-none';
    // Shared open-tag attrs for activity rows that need site color
    var trOpenExtra = di + aid + siteData + siteStyle;

    // Session / missed / skipped
    if (act.kind === 'session' || act.kind === 'missed' || act.kind === 'skipped') {
      var isRun = act.kind === 'session';
      var checked = isRun || (fs && fs.enabled !== false && act.kind !== 'missed' && act.kind !== 'skipped')
        ? false : false;
      // enabled only when plan says enabled (session kind means ran/enabled)
      checked = (fs ? fs.enabled !== false : isRun) && act.kind !== 'missed';
      if (act.kind === 'skipped' || act.kind === 'missed') checked = false;
      if (act.kind === 'session') checked = true;
      if (fs && act.kind !== 'missed') checked = fs.enabled !== false;
      // Final: session = enabled from form (default true); skipped/missed = unchecked
      if (act.kind === 'session') checked = !fs || fs.enabled !== false;
      else checked = false;

      var startVal = fs && fs.start ? fs.start : UI.minToHHMM(act.startMin);
      var startDisp = UI.hhmmToAmPmAligned(startVal);
      var maxSess = trackMaxSessionMinFromDom();
      var durVal = fs && fs.durationMin > 0 ? fs.durationMin
        : Math.max(1, Math.round(act.endMin - act.startMin) || maxSess);
      if (durVal > maxSess) durVal = maxSess;
      if (durVal < 1) durVal = 1;
      var endCell = isRun
        ? '<span class="sess-end">' + endTxt + '</span>'
        : '<span class="sess-end" hidden></span>';
      var forCell = isRun
        ? ('<span class="for-line">' +
            '<input type="number" class="sess-dur-min for-num" min="1" max="' + maxSess +
              '" step="1" data-num-min="1" data-num-max="' + maxSess +
              '" value="' + durVal + '" ' +
              'aria-label="Session length (max ' + maxSess + ' min)">' +
            '<span class="unit">min</span></span>')
        : '<span class="for-line" hidden></span>';
      return '<tr class="' + trCls + '"' + trOpenExtra + '>' +
        '<td class="sess-start-cell">' +
          '<span class="sess-start-display">' + startDisp + '</span>' +
          '<input type="time" class="sess-start" value="' + escapeHtml(startVal) +
            '" aria-label="Track session start">' +
        '</td>' +
        '<td class="sess-act">' +
          '<label class="sess-enable-label">' +
            '<input type="checkbox" class="sess-enabled"' + (checked ? ' checked' : '') +
              ' aria-label="Enable track session">' +
            '<span class="sess-act-label">' + escapeHtml(act.label) + '</span>' +
          '</label>' +
        '</td>' +
        '<td class="sess-mut">' + endCell + '</td>' +
        '<td class="sess-mut sess-for-cell' + (isRun ? '' : ' is-empty') + '">' + forCell + '</td>' +
        '<td class="sess-num"><span class="day-soc sess-num">—</span></td>' +
        '<td class="sess-num"><span class="day-trl sess-num">—</span></td>' +
        '<td><button type="button" class="icon-btn sess-remove" title="Remove session" aria-label="Remove session">' +
          '<svg viewBox="0 0 16 16" aria-hidden="true"><path fill="currentColor" d="M5.5 2a.5.5 0 0 0-.5.5V3H2.5a.5.5 0 0 0 0 1H3v8.5A1.5 1.5 0 0 0 4.5 14h7a1.5 1.5 0 0 0 1.5-1.5V4h.5a.5.5 0 0 0 0-1H11v-.5a.5.5 0 0 0-.5-.5h-5zM6 3h4v.5H6V3zm-2 1h8v8.5a.5.5 0 0 1-.5.5h-7a.5.5 0 0 1-.5-.5V4zm2.5 1.5a.5.5 0 0 0-.5.5v5a.5.5 0 0 0 1 0v-5a.5.5 0 0 0-.5-.5zm3 0a.5.5 0 0 0-.5.5v5a.5.5 0 0 0 1 0v-5a.5.5 0 0 0-.5-.5z"/></svg>' +
        '</button></td></tr>';
    }

    // Gap planner (after-mode select) — one per non-last plan session
    if (act.kind === 'gap_control') {
      if (act.hideControl) {
        // Preserve after via hidden keep for away-missed
        var keepAfter = fs && fs.after != null ? fs.after : 'onsite';
        if (fs && fs.after === 'offsite' && fs.offsiteSiteId) {
          keepAfter = 'offsite:' + fs.offsiteSiteId;
        }
        return '<tr class="' + trCls + '" hidden' + trOpenExtra + '>' +
          '<td colspan="7">' +
          '<input type="hidden" class="sess-after-keep" data-idx="' + fi + '" value="' +
            escapeHtml(String(keepAfter)) + '">' +
          (fs && fs.offsiteSiteId
            ? '<input type="hidden" class="sess-site-keep" data-idx="' + fi + '" value="' +
              escapeHtml(String(fs.offsiteSiteId)) + '">'
            : '') +
          (fs && fs.residualMode
            ? '<input type="hidden" class="sess-residual-keep" data-idx="' + fi + '" value="' +
              escapeHtml(String(fs.residualMode === 'none' ? 'none' : 'onsite')) + '">'
            : '') +
          '</td></tr>';
      }
      var mode = fs ? (fs.after != null ? fs.after : 'onsite') : 'onsite';
      if (fs && fs.after === 'offsite') {
        mode = fs.offsiteSiteId ? ('offsite:' + fs.offsiteSiteId) : 'offsite';
      }
      // Color gap control by selected offsite site when applicable
      if (String(mode).indexOf('offsite') === 0) {
        var gapSid = fs && fs.offsiteSiteId
          ? fs.offsiteSiteId
          : (typeof Sim !== 'undefined' && Sim.offsiteSiteIdFromAfter
            ? Sim.offsiteSiteIdFromAfter(mode) : null);
        var gapSite = (typeof Sim !== 'undefined' && Sim.getOffsiteSite)
          ? Sim.getOffsiteSite(p || {}, gapSid) : null;
        if (gapSite && gapSite.color) {
          siteStyle = siteColorStyleAttr(gapSite.color);
          siteData = gapSite.id
            ? ' data-site-id="' + escapeHtml(String(gapSite.id)) + '"' : '';
          trOpenExtra = di + aid + siteData + siteStyle;
        }
      }
      // No charging → None color (same as Wait activity)
      if (mode === 'none') {
        trCls += ' sess-none sess-wait-row';
      }
      var actHtml = chargeActHtml(mode, true, allowOnsite, fs || {});
      // When this control also carries pad times, show End/For/SoC (one row only)
      var hasPad = !act.hideTimes && act.endMin > act.startMin;
      var gEnd = hasPad ? endTxt : '—';
      var gFor = hasPad ? forHtml
        : '<span class="for-line"><span class="for-num">—</span><span class="unit"></span></span>';
      var gSoc = hasPad
        ? '<span class="day-soc sess-num">—</span>'
        : '—';
      var gTrl = hasPad
        ? '<span class="day-trl sess-num">—</span>'
        : '—';
      if (hasPad && act.className) trCls += ' ' + act.className;
      return '<tr class="' + trCls + '"' + trOpenExtra + '>' +
        '<td class="sess-mut day-start">' + startTxt + '</td>' +
        '<td class="sess-act ch-act">' + actHtml + '</td>' +
        '<td class="sess-mut day-end">' + gEnd + '</td>' +
        '<td class="sess-mut day-for">' + gFor + '</td>' +
        '<td class="sess-num">' + gSoc + '</td>' +
        '<td class="sess-num">' + gTrl + '</td><td></td></tr>';
    }

    // SC / drive-out can carry the after-mode dropdown (offsite plan = real charge times)
    if (act.editable && act.editable.after && (act.kind === 'sc' || act.kind === 'drive_out')) {
      var offMode = fs ? (fs.after != null ? fs.after : 'offsite') : 'offsite';
      if (fs && fs.after === 'offsite' && fs.offsiteSiteId) {
        offMode = 'offsite:' + fs.offsiteSiteId;
      } else if (fs && fs.after && fs.after !== 'onsite' && fs.after !== 'none') {
        offMode = fs.after;
      } else if (act.kind === 'sc' || act.kind === 'drive_out') {
        // Default to this trip's site if form only says "offsite"
        offMode = fs && fs.offsiteSiteId ? ('offsite:' + fs.offsiteSiteId) : offMode;
      }
      var scActHtml = chargeActHtml(offMode, true, allowOnsite, fs || {});
      trCls += ' sess-charge-row';
      return '<tr class="' + trCls + '"' + trOpenExtra + '>' +
        '<td class="day-start">' + startTxt + '</td>' +
        '<td class="sess-act ch-act">' + scActHtml + '</td>' +
        '<td class="sess-mut day-end">' + endTxt + '</td>' +
        '<td class="sess-mut day-for">' + forHtml + '</td>' +
        '<td class="sess-num"><span class="day-soc sess-num">—</span></td>' +
        '<td class="sess-num"><span class="day-trl sess-num">—</span></td>' +
        '<td></td></tr>';
    }

    // Residual editor on residual pad (select alone — options already name the source)
    var actCell = escapeHtml(act.label || act.kind);
    if (act.editable && act.editable.residual) {
      var resMode = fs && fs.residualMode === 'none' ? 'none' : 'onsite';
      actCell = residualModeSelectHtml(resMode, allowOnsite);
      // Residual "No charging" / Wait → None color (not onsite/portable pad accent)
      if (resMode === 'none' || !allowOnsite) {
        trCls = trCls.replace(/\bsess-pad-charge\b/g, ' ').replace(/\s+/g, ' ').trim();
        if (trCls.indexOf('sess-none') < 0) trCls += ' sess-none';
        if (trCls.indexOf('sess-wait-row') < 0) trCls += ' sess-wait-row';
      }
    } else if (act.kind === 'pad_charge') {
      actCell = escapeHtml(atTrackModeLabelForGap());
    } else if (act.kind === 'idle') {
      actCell = 'No charging';
      trCls = trCls.replace(/\bsess-pad-charge\b/g, ' ').replace(/\s+/g, ' ').trim();
      if (trCls.indexOf('sess-none') < 0) trCls += ' sess-none';
      if (trCls.indexOf('sess-wait-row') < 0) trCls += ' sess-wait-row';
    }

    return '<tr class="' + trCls + '"' + trOpenExtra + '>' +
      '<td class="day-start">' + startTxt + '</td>' +
      '<td class="sess-act">' + actCell + '</td>' +
      '<td class="sess-mut day-end">' + endTxt + '</td>' +
      '<td class="sess-mut day-for">' + forHtml + '</td>' +
      '<td class="sess-num"><span class="day-soc sess-num">—</span></td>' +
      '<td class="sess-num"><span class="day-trl sess-num">—</span></td>' +
      '<td></td></tr>';
  }

  function renderDayBody(p, result) {
    var day = ensureDayBody();
    if (!day) return;
    var formSessions = sessionsFormCache;
    if (!formSessions || !formSessions.length) {
      formSessions = readSessionsFormRaw();
      sessionsFormCache = formSessions;
    }
    var acts = UI.buildDayActivities(p, result).filter(function (a) {
      return String(a.kind).indexOf('pre_') !== 0;
    });
    // Relabel pad using live at-track name
    var padLabel = atTrackModeLabelForGap();
    acts.forEach(function (a) {
      if (a.kind === 'pad_charge' && a.label === 'Charge at track') a.label = padLabel;
      if (a.kind === 'idle' && a.label === 'No charging') { /* keep */ }
    });
    var html = '';
    acts.forEach(function (act) {
      html += dayActivityRowHtml(act, formSessions, p);
    });
    day.innerHTML = html;
    wireDayBodyOnce(day);

    // Paint SoC ranges
    var tl = result && result.timeline;
    var noRes = { checkReserve: false };
    acts.forEach(function (act) {
      // gap_control with pad times still gets SoC; control-only skips
      if (act.kind === 'gap_control' && (act.hideTimes || !(act.endMin > act.startMin))) return;
      if (act.hideTimes && act.kind !== 'gap_control') return;
      if (act.endMin <= act.startMin && act.kind !== 'session') return;
      var tr = day.querySelector('tr[data-act-id="' + String(act.id).replace(/"/g, '') + '"]');
      if (!tr) return;
      var socEl = tr.querySelector('.day-soc');
      var trlEl = tr.querySelector('.day-trl');
      if (!socEl) return;
      if (act.kind === 'session') {
        var partialByIdx = {};
        if (result && result.metrics && result.metrics.partialSessions) {
          result.metrics.partialSessions.forEach(function (s) { partialByIdx[s.index] = s; });
        }
        var partial = act.sessionIndex != null ? partialByIdx[act.sessionIndex] : null;
        var sA = (partial && partial.runFromMin != null) ? partial.runFromMin
          : (act.startMin > 0 ? act.startMin - 1 : act.startMin);
        var sB = (partial && partial.runToMin != null) ? (partial.runToMin - 1)
          : (act.endMin > act.startMin ? act.endMin - 1 : act.startMin);
        setSocCell(socEl, tl, sA, sB, p, 'day-soc sess-num', 'car');
        setSocCell(trlEl, tl, sA, sB, p, 'day-trl sess-num', 'trailer');
        if (partial) tr.classList.add('sess-partial');
        return;
      }
      if (!act.modes) {
        setSocCellText(socEl, '—', 'day-soc sess-num', false);
        if (trlEl) setSocCellText(trlEl, '—', 'day-trl sess-num', false);
        return;
      }
      var a0 = act.startMin;
      var a1 = Math.max(act.startMin, act.endMin - 1);
      setSocCell(socEl, tl, a0, a1, p, 'day-soc sess-num', 'car',
        Object.assign({}, noRes, { modes: act.modes }));
      if (trlEl) {
        setSocCell(trlEl, tl, a0, a1, p, 'day-trl sess-num', 'trailer',
          Object.assign({}, noRes, { modes: act.modes }));
      }
    });

    day.querySelectorAll('select.sess-after').forEach(function (sel) {
      syncOffsiteOptsVisibility(sel.closest('tr') || sel);
    });

    // Optional flash after start-time re-sort
    var hl = setSessionsForm._highlight;
    if (hl && hl.highlightStart) {
      setSessionsForm._highlight = null;
      day.querySelectorAll('tr.sess-edit-row').forEach(function (er) {
        var st = er.querySelector('.sess-start');
        if (st && st.value === hl.highlightStart) {
          flashSessionBlock(er);
          try { er.scrollIntoView({ block: 'nearest', behavior: 'smooth' }); } catch (e) { /* ignore */ }
        }
      });
    }
  }

  function wireDayBodyOnce(day) {
    if (!day || dayBodyWired) return;
    dayBodyWired = true;
    day.addEventListener('change', function (e) {
      var t = e.target;
      if (!t || !t.classList) return;
      if (t.classList.contains('sess-after')) {
        syncOffsiteOptsVisibility(t.closest('tr') || t);
        var row = t.closest('tr[data-idx]');
        var idx = row ? row.getAttribute('data-idx') : null;
        var parsed = parseAfterSelectValue(t.value);
        if (parsed.after === 'offsite' && idx != null) {
          var stop = day.querySelector('tr[data-idx="' + idx + '"] .sess-offsite-stop');
          if (stop && !stop.value) stop.value = 'next';
        }
        sessionsFormCache = null; // force re-read
        // When after changes, rebuild form from DOM then re-sim
        sessionsFormCache = readSessionsFormRaw();
        render();
        return;
      }
      if (t.classList.contains('sess-enabled') || t.classList.contains('sess-residual-mode') ||
          t.classList.contains('sess-offsite-stop') || t.classList.contains('sess-start') ||
          t.classList.contains('sess-dur-min')) {
        if (t.classList.contains('sess-enabled')) {
          var er = t.closest('tr.sess-edit-row');
          var rawEn = readSessionsFormRaw();
          var posEn = -1;
          var editsEn = day.querySelectorAll('tr.sess-edit-row');
          for (var ei = 0; ei < editsEn.length; ei++) {
            if (editsEn[ei] === er) { posEn = ei; break; }
          }
          // Map DOM edit-row to form index via data-idx
          var idxEn = er ? er.getAttribute('data-idx') : null;
          if (idxEn != null) posEn = +idxEn;
          if (t.checked && er && posEn >= 0 && rawEn[posEn]) {
            rawEn[posEn].enabled = true;

      return isFinite(minKwh) && minKwh < reserve - 1e-9;

  }

      var afterKeep = sessField(table, idx, 'input.sess-after-keep');
      if (after) {
        var parsed = parseAfterSelectValue(after.value || 'onsite');
        row.after = parsed.after;
        if (row.after === 'offsite') {
          row.offsiteSiteId = parsed.offsiteSiteId;
          var stop = sessField(table, idx, '.sess-offsite-stop');
          var soc = sessField(table, idx, '.sess-offsite-soc');
          var mins = sessField(table, idx, '.sess-offsite-min');
          row.offsiteStop = stop ? stop.value : 'next';
          row.offsiteUntilSocPct = soc ? parseFloat(soc.value) : 80;
          row.offsiteForMin = mins ? parseFloat(mins.value) : 30;
          var resSel = sessField(table, idx, 'select.sess-residual-mode');
          var resKeep = sessField(table, idx, 'input.sess-residual-keep');
          if (resSel) row.residualMode = resSel.value === 'none' ? 'none' : 'onsite';
          else if (resKeep) row.residualMode = resKeep.value === 'none' ? 'none' : 'onsite';
          else row.residualMode = 'onsite';
        }
      } else if (afterKeep && afterKeep.value) {
        var p2 = parseAfterSelectValue(afterKeep.value);
        row.after = p2.after;
        if (p2.offsiteSiteId) row.offsiteSiteId = p2.offsiteSiteId;
        var resKeep2 = sessField(table, idx, 'input.sess-residual-keep');
        var resSel2 = sessField(table, idx, 'select.sess-residual-mode');
        if (resSel2) row.residualMode = resSel2.value === 'none' ? 'none' : 'onsite';
        else if (resKeep2) row.residualMode = resKeep2.value === 'none' ? 'none' : 'onsite';
      } else if (sessionsFormCache && sessionsFormCache[+idx] && sessionsFormCache[+idx].after) {
        // Fallback: keep previous after if control not in DOM this frame
        var prev = sessionsFormCache[+idx];
        row.after = prev.after;
        if (prev.offsiteSiteId) row.offsiteSiteId = prev.offsiteSiteId;
        if (prev.offsiteStop) row.offsiteStop = prev.offsiteStop;
        if (prev.offsiteUntilSocPct != null) row.offsiteUntilSocPct = prev.offsiteUntilSocPct;
        if (prev.offsiteForMin != null) row.offsiteForMin = prev.offsiteForMin;
        if (prev.residualMode) row.residualMode = prev.residualMode;
      }
      // Residual select may live on residual pad row (same data-idx)
      if (row.after === 'offsite' || (sessionsFormCache && sessionsFormCache[+idx] &&
          sessionsFormCache[+idx].after === 'offsite')) {
        var resSel3 = sessField(table, idx, 'select.sess-residual-mode');
        if (resSel3) row.residualMode = resSel3.value === 'none' ? 'none' : 'onsite';
      }
      rows.push(row);
    });
    if (rows.length) sessionsFormCache = rows;
    return rows.length ? rows : (sessionsFormCache || UI.defaultSessionsForm());
  }

  function readSessionsForm() {
    return UI.normalizeSessionsForm(readSessionsFormRaw(), trackMaxSessionMinFromDom());
  }

  function buildInputs() {
    var host = document.getElementById('inputs');
    var groups = {};
    UI.UI_FIELDS.forEach(function (f) { (groups[f.g] = groups[f.g] || []).push(f); });

    // Portable Charging is nested under Track (linked via track.values.siteProfileId)
    var PROFILED = [
      { group: 'EV', kind: 'car' },
      { group: 'Track', kind: 'track' },
    ];

    function unitSuffix(f) {
      return f.unit ? '<span class="unit">' + f.unit + '</span>' : '';
    }
    function fieldHtml(f) {
      if (f.kind === 'check') {
        return '<div class="fld chk"><label for="' + f.id + '">' +
          '<input id="' + f.id + '" type="checkbox"' + (f.default ? ' checked' : '') + '> ' + f.label + '</label></div>';
      }
      if (f.kind === 'select') {
        var opts = (f.options || []).map(function (o) {
          return '<option value="' + o.value + '"' + (o.value === f.default ? ' selected' : '') + '>' +
            o.label + '</option>';
        }).join('');
        // Vehicle: "Vehicle [Show curve]" — toggle sits on the label line
        var labelHtml;
        if (f.id === 'chargeCurveId') {
          labelHtml =
            '<div class="fld-label-row">' +
              '<label for="' + f.id + '">' + f.label + '</label>' +
              '<button type="button" id="toggleChargeCurve" class="curve-toggle-btn" ' +
                'aria-expanded="false" aria-controls="chargeCurvePanel" ' +
                'title="Show or hide DC charge curve">Show charge curve</button>' +
            '</div>';
        } else {
          labelHtml = '<label for="' + f.id + '">' + f.label + '</label>';
        }
        return '<div class="fld">' + labelHtml +
          '<div class="fld-control"><select id="' + f.id + '">' + opts + '</select>' +
          unitSuffix(f) + '</div></div>';
      }
      if (f.kind === 'text') {
        return '<div class="fld"><label for="' + f.id + '">' + f.label + '</label>' +
          '<div class="fld-control">' +
          '<input id="' + f.id + '" type="text" value="' + String(f.default).replace(/"/g, '&quot;') + '">' +
          unitSuffix(f) + '</div></div>';
      }
      var type = f.kind === 'time' ? 'time' : 'number';
      // Percent: allow decimals (99.9). Other numbers keep declared step.
      var step = f.unit === '%' ? ' step="any"'
        : (f.step != null ? ' step="' + f.step + '"' : '');
      var mn = f.min != null ? ' min="' + f.min + '"' : '';
      var mx = f.max != null ? ' max="' + f.max + '"' : '';
      // Typing guard attrs (enforced in capture-phase input listener)
      var numAttrs = '';
      if (type === 'number') {
        if (f.min != null) numAttrs += ' data-num-min="' + f.min + '"';
        else numAttrs += ' data-num-min="0"'; // default: no negatives
        if (f.max != null) numAttrs += ' data-num-max="' + f.max + '"';
        if (f.maxRef) numAttrs += ' data-max-ref="' + f.maxRef + '"';
        if (f.unit === '%') {
          numAttrs += ' data-pct-max="' + (f.max != null ? f.max : 100) + '"';
          if (f.max == null) numAttrs += ' data-num-max="100"';
        }
      }
      // Size by content: short %/min → sm; decimals or values ≥100 → lg
      var wclass = '';
      if (type === 'number') {
        var defNum = Number(f.default);
        var needsWide = (f.step != null && f.step < 1) ||
          (isFinite(defNum) && Math.abs(defNum) >= 100);
        if (f.unit === '%' || f.unit === 'min') wclass = 'w-sm';
        else if (needsWide) wclass = 'w-lg';
      }
      return '<div class="fld"><label for="' + f.id + '">' + f.label + '</label>' +
        '<div class="fld-control">' +
        '<input id="' + f.id + '" type="' + type + '"' +
        (wclass ? ' class="' + wclass + '"' : '') +
        ' value="' + f.default + '"' + step + mn + mx + numAttrs + '>' +
        unitSuffix(f) + '</div></div>';
    }
    function fieldsHtml(fields) {
      return '<div class="grp-fields">' + fields.map(fieldHtml).join('') + '</div>';
    }
    function groupFieldsHtml(g) {
      var list = groups[g] || [];
      var main = list.filter(function (f) { return !f.sub; });
      var subs = {};
      list.forEach(function (f) {
        if (!f.sub) return;
        (subs[f.sub] = subs[f.sub] || []).push(f);
      });
      // Skip empty main row so the first sub-section sits flush under the header
      // (avoids a stray separator above Generator on Portable Charging).
      var html = main.length ? fieldsHtml(main) : '';
      // EV: fields on the left (curve toggle is inline with Vehicle); curve chart optional
      if (g === 'EV') {
        return '<div class="car-body">' + html +
          '<div id="chargeCurvePanel" class="curve-col" hidden>' +
            '<canvas id="chargeCurveChart" width="260" height="120" aria-label="Charge power curve"></canvas>' +
            '<div class="curve-caption">DC charge acceptance · kW vs SoC %</div>' +
          '</div></div>';
      }

      function subSectionHtml(name, fields) {
        var enable = null;
        var body = [];
        fields.forEach(function (f) {
          if (f.subEnable) enable = f; else body.push(f);
        });
        var titleHtml;
        if (enable) {
          titleHtml = '<label class="subgrp-enable" for="' + enable.id + '">' +
            '<input id="' + enable.id + '" type="checkbox"' +
            (enable.default ? ' checked' : '') + '> ' + enable.label + '</label>';
        } else {
          titleHtml = '<div class="subgrp-title">' + name + '</div>';
        }
        // Generator: live runtime sits at the end of the field row (portable section)
        var extra = '';
        if (name === 'Generator') {
          extra = '<div class="gen-runtime" id="genRuntimeStat" title="Generator runtime this day">' +
            '<span class="gen-runtime-label">Runtime</span>' +
            '<span class="gen-runtime-val" id="genRuntimeVal">—</span>' +
          '</div>';
        }
        return '<div class="subgrp" data-sub="' + name + '">' +
          '<div class="subgrp-head">' + titleHtml + '</div>' +
          fieldsHtml(body) + extra + '</div>';
      }

      if (g === 'Track') {
        // Order: Onsite/Portable → Offsite → Day sessions (max session time is in sessions head)
        var mainTrack = main.filter(function (f) {
          return f.embed !== 'sessionsHead' && f.embed !== 'atTrack';
        });
        html = mainTrack.length ? fieldsHtml(mainTrack) : '';
        var onBody = [];
        var onEnableDefault = false;
        if (subs.Onsite) {
          subs.Onsite.forEach(function (f) {
            if (f.subEnable) onEnableDefault = !!f.default;
            else onBody.push(f);
          });
        }
        var portList = groups['Portable Charging'] || [];
        var portSubs = {};
        portList.forEach(function (f) {
          if (!f.sub) return;
          (portSubs[f.sub] = portSubs[f.sub] || []).push(f);
        });
        var portBody = '';
        ['Generator', 'Battery'].forEach(function (name) {
          if (portSubs[name]) portBody += subSectionHtml(name, portSubs[name]);
        });
        Object.keys(portSubs).forEach(function (name) {
          if (name === 'Generator' || name === 'Battery') return;
          portBody += subSectionHtml(name, portSubs[name]);
        });
        // Tab strip + radios: None | Onsite | Portable (exclusive). Only one panel visible.
        // Default = portable (matches track defaults); onsite field default is off.
        var atTrackDefault = onEnableDefault ? 'onsite' : 'portable';
        function atTrackTab(id, value, label, title, colorId, colorDefault) {
          var selected = atTrackDefault === value;
          // Color picker is a sibling of the radio label so opening it does not flip the mode
          return '<div class="track-source-tab' + (selected ? ' is-selected' : '') +
            '" data-source="' + value + '" title="' + title + '" role="presentation">' +
            '<label class="at-track-radio-label" for="' + id + '">' +
              '<input type="radio" name="atTrackCharge" id="' + id + '" value="' + value + '"' +
                (selected ? ' checked' : '') + ' aria-label="' + label + '">' +
              '<span class="track-source-tab-label">' + label + '</span>' +
            '</label>' +
            '<input type="color" class="at-track-color" id="' + colorId + '" value="' + colorDefault + '" ' +
              'title="' + label + ' activity color" aria-label="' + label + ' color">' +
          '</div>';
        }
        html += '<div class="track-source-choice" role="group" aria-label="At-track charging source">' +
          '<div class="track-source-choice-label">At-track charging</div>' +
          // Hidden mirrors still drive UI_FIELDS / track flags
          '<input type="checkbox" id="gridEnabled"' + (atTrackDefault === 'onsite' ? ' checked' : '') +
            ' hidden aria-hidden="true" tabindex="-1">' +
          '<input type="checkbox" id="siteChargingEnabled"' + (atTrackDefault === 'portable' ? ' checked' : '') +
            ' hidden aria-hidden="true" tabindex="-1">' +
          '<div class="track-source-tabs" role="tablist" aria-label="At-track charging mode">' +
            atTrackTab('atTrackNone', 'none', 'None', 'No at-track charging',
              'atTrackNoneColor', (UI.AT_TRACK_COLOR_DEFAULTS || {}).atTrackNoneColor || '#f59e0b') +
            atTrackTab('atTrackOnsite', 'onsite', 'Onsite', 'Onsite charging',
              'atTrackOnsiteColor', (UI.AT_TRACK_COLOR_DEFAULTS || {}).atTrackOnsiteColor || '#a78bfa') +
            atTrackTab('atTrackPortable', 'portable', 'Portable', 'Portable charging',
              'atTrackPortableColor', (UI.AT_TRACK_COLOR_DEFAULTS || {}).atTrackPortableColor || '#3b82f6') +
          '</div>' +
          '<div class="track-source-panels">' +
            '<div class="track-source-option' + (atTrackDefault === 'none' ? ' is-selected' : '') +
              '" data-source="none" role="tabpanel">' +
              '<div class="track-panel track-none" data-section-embed="none">' +
                '<div class="track-panel-body">No onsite or portable charging at the track. ' +
                  'Use offsite trips or session reserves only.</div>' +
              '</div>' +
            '</div>' +
            '<div class="track-source-option' + (atTrackDefault === 'onsite' ? ' is-selected' : '') +
              '" data-source="onsite" role="tabpanel">' +
              '<div class="track-panel track-onsite" data-section-embed="onsite">' +
                '<div class="track-panel-body">' + fieldsHtml(onBody) + '</div>' +
              '</div>' +
            '</div>' +
            '<div class="track-source-option' + (atTrackDefault === 'portable' ? ' is-selected' : '') +
              '" data-source="portable" role="tabpanel">' +
              '<div class="track-panel track-portable" data-section-embed="site">' +
                '<div class="track-panel-body">' +
                  sectionHeadHtml('site', 'Profile') +
                  portBody +
                '</div>' +
              '</div>' +
            '</div>' +
          '</div>' +
        '</div>';
        // Offsite: multi-site list (name, power, drive time, cost)
        html += '<div class="track-panel track-offsite" data-section-embed="offsite">' +
          '<label class="panel-enable" for="offsiteChargingEnabled">' +
            '<input type="checkbox" id="offsiteChargingEnabled" checked> Offsite Charging' +
          '</label>' +
          '<div class="track-panel-body">' +
            '<div class="offsite-sites-wrap">' +
              '<table class="offsite-sites-table" id="offsiteSitesTable">' +
                '<thead><tr>' +
                  '<th class="c-color" title="Activity table color">Color</th>' +
                  '<th>Name</th><th>Power</th><th>Drive</th><th>Cost</th>' +
                  '<th class="c-actions"></th>' +
                '</tr></thead>' +
                '<tbody id="offsiteSitesBody"></tbody>' +
              '</table>' +
            '</div>' +
          '</div>' +
        '</div>';
        // Session table: pre-track rows (charger, drive, at-track) + track sessions
        // (arrival time, pre-track site, and session length are edited in the table)
        html += '<div class="subgrp">' +
          '<div class="sessions-head">' +
            '<div class="subgrp-title" id="sessionsPlanTitle">PLAN</div>' +
            '<div class="sessions-stats" id="sessionsStats">' +
              '<span class="sess-max-dur">' +
                '<label for="sessionDurationMin">Max session time</label>' +
                '<input id="sessionDurationMin" type="number" class="w-sm" min="1" max="180" step="1" ' +
                  'data-num-min="1" data-num-max="180" value="20" ' +
                  'aria-label="Max session time">' +
                '<span class="unit">min</span>' +
              '</span>' +
            '</div>' +
          '</div>' +
          '<div class="sess-table-wrap"><table class="sess-table" id="sessionTable">' +
          '<colgroup><col class="c-start"><col class="c-act"><col class="c-end"><col class="c-for">' +
          '<col class="c-soc"><col class="c-trl"><col class="c-actn"></colgroup>' +
          '<thead><tr><th>Start</th><th>Activity</th><th>End</th><th>For</th><th>Car SoC</th><th>Trailer SoC</th><th></th></tr></thead>' +
          '</table></div>' +
          '<div class="sessions-add-row">' +
            '<button type="button" id="addSession" class="add-session-btn" title="Add track session">' +
              '<svg viewBox="0 0 16 16" aria-hidden="true"><path fill="currentColor" d="M8 2a.75.75 0 0 1 .75.75v4.5h4.5a.75.75 0 0 1 0 1.5h-4.5v4.5a.75.75 0 0 1-1.5 0v-4.5h-4.5a.75.75 0 0 1 0-1.5h4.5v-4.5A.75.75 0 0 1 8 2z"/></svg>' +
              'Add Session' +
            '</button>' +
          '</div>' +
        '</div>';
        return html;
      }

      Object.keys(subs).forEach(function (name) {
        html += subSectionHtml(name, subs[name]);
      });
      return html;
    }

    var html = PROFILED.map(function (s) {
      return '<div class="section-row" data-section="' + s.kind + '">' +
        sectionHeadHtml(s.kind, s.group) +
        groupFieldsHtml(s.group) +
      '</div>';
    }).join('');
    host.innerHTML = html;

    // Wire EV + Track + nested Site profile controls
    UI.PROFILE_KINDS.forEach(wireProfileBlock);
    document.addEventListener('click', function () { closeAllProfileMenus(); });
    document.addEventListener('keydown', function (e) {
      if (e.key === 'Escape') closeAllProfileMenus();
    });

    document.getElementById('addSession').addEventListener('click', function () {
      var cur = readSessionsForm();
      var last = cur.length ? cur[cur.length - 1] : { start: '09:00' };
      var nextMin = UI.hhmmToMin(last.start) + 60;
      if (nextMin >= 24 * 60) nextMin = UI.hhmmToMin(last.start);
      // Default duration from track profile "Max session time"
      var maxDur = trackMaxSessionMinFromDom();
      // after sticks with this new session for the gap after it (if not last once sorted).
      cur.push({
        start: UI.minToHHMM(nextMin), enabled: true, after: 'onsite',
        durationMin: maxDur,
      });
      setSessionsForm(cur);
      render();
    });
    wireOffsiteSitesEditor();
    wireChargeCurveToggle();
    wireAtTrackColorPickers();
    applyAtTrackColorsFromDom();

    // Overlay any saved values from a previous session (defaults stay for fields not stored).
    var saved = loadValues();
    UI.UI_FIELDS.forEach(function (f) {
      var el = document.getElementById(f.id);
      if (!el || saved[f.id] == null || saved[f.id] === '') return;
      if (f.kind === 'check') el.checked = (saved[f.id] === true || saved[f.id] === 'true');
      else el.value = saved[f.id];
    });
    applyAtTrackColorsFromDom();
    var initialSessions = saved.sessions || null;
    var initialOffsiteSites = saved.offsiteSites || null;
    if (!saved || !Object.keys(saved).length) {
      var carProf = UI.findProfile(listFor('car'), activeIdFor('car'));
      if (carProf) applyFieldValues(carProf.values, fieldIdsFor('car'));
      var trackProf = UI.findProfile(listFor('track'), activeIdFor('track'));
      if (trackProf) applyTrackProfile(trackProf);
      else {
        var siteProf = UI.findProfile(listFor('site'), activeIdFor('site'));
        if (siteProf) applyFieldValues(siteProf.values, fieldIdsFor('site'));
        setOffsiteSitesForm(null);
      }
      trackProf = UI.findProfile(listFor('track'), activeIdFor('track'));
      initialSessions = trackProf && trackProf.values.sessions;
      initialOffsiteSites = trackProf && trackProf.values.offsiteSites;
    } else {
      // Still honor track→site profile link for the site dropdown selection
      var tr = UI.findProfile(listFor('track'), activeIdFor('track'));
      if (tr && tr.values && tr.values.siteProfileId) {
        var sid = tr.values.siteProfileId;
        if (UI.findProfile(listFor('site'), sid)) {
          setActiveId('site', sid);
          var siteSel = document.getElementById('siteSelect');
          if (siteSel) siteSel.value = sid;
        }
      }
    }
    // Prefer track profile sites, then saved form values, then defaults
    if (!document.getElementById('offsiteSitesBody') ||
        !document.getElementById('offsiteSitesBody').querySelector('tr')) {
      var trSites = UI.findProfile(listFor('track'), activeIdFor('track'));
      setOffsiteSitesForm(
        initialOffsiteSites ||
        (trSites && trSites.values && trSites.values.offsiteSites) ||
        (saved && (saved.scName || saved.driveTimeMin) ? [{
          id: 'offsite-default',
          name: saved.scName || 'Tumwater',
          powerKw: saved.scPowerCapKw || 250,
          driveTimeMin: saved.driveTimeMin || 30,
          driveConsumptionKwh: saved.driveConsumptionKwh ||
            saved.arrivalCostNoTrailerKwh || 13,
        }] : null)
      );
    }
    // Pre-track charger selection (migrate legacy arrivalCostNoTrailerKwh via pickTrackValues)
    var prePrefer = saved.preTrackSiteId;
    if (!prePrefer) {
      var trPre = UI.findProfile(listFor('track'), activeIdFor('track'));
      if (trPre && trPre.values) {
        var picked = UI.pickTrackValues(Object.assign({}, trPre.values, saved));
        prePrefer = picked.preTrackSiteId;
      }
    }
    syncPreTrackSiteSelect(prePrefer);
    setSessionsForm(initialSessions || UI.defaultSessionsForm());
    // Pre-track table fields are outside UI_FIELDS — restore from form storage
    // (saveValues on each render) merged over active track profile, same as sessions.
    var trEn = UI.findProfile(listFor('track'), activeIdFor('track'));
    var preRest = Object.assign({}, (trEn && trEn.values) || {}, saved || {});
    if (preRest.preTrackArriveSocPct != null && preRest.preTrackArriveSocPct !== '') {
      syncPreTrackArriveSocPct(preRest.preTrackArriveSocPct);
    }
    var arrRest = document.getElementById('arrivalTime');
    if (arrRest && preRest.arrivalTime) arrRest.value = preRest.arrivalTime;
    normalizeSiteSourceCheckboxes();
    // Restore track panel enables from active track profile
    if (trEn && trEn.values) {
      var se0 = document.getElementById('siteChargingEnabled');
      var ge0 = document.getElementById('gridEnabled');
      var oe0 = document.getElementById('offsiteChargingEnabled');
      if (se0) se0.checked = trEn.values.siteChargingEnabled !== false && trEn.values.siteChargingEnabled !== 'false';
      if (ge0) ge0.checked = trEn.values.gridEnabled === true || trEn.values.gridEnabled === 'true';
      if (oe0) oe0.checked = trEn.values.offsiteChargingEnabled !== false && trEn.values.offsiteChargingEnabled !== 'false';
      if (ge0 && se0 && ge0.checked && se0.checked) se0.checked = false;
    }
    syncTrackPanelEnables();
    refreshProfileUI();

    function onAtTrackSourceChange() {
      var mode = atTrackModeFromDom();
      var turningOnOnsite = mode === 'onsite';
      var turningOnPortable = mode === 'portable';
      applyAtTrackRadio(mode);
      syncTrackPanelEnables();
      syncSiteSourceUI();
      applyAtTrackColorsFromDom(); // live None/Onsite/Portable accents on activity table
      // Do not auto-save into the track profile — leave it dirty so Save / Save as appear.
      // Rebuild session gap labels ("Charge onsite" vs "Charge at <portable>")
      setSessionsForm(readSessionsFormRaw());
      // None → onsite/portable: promote "No charging" gaps to Charge onsite
      if (turningOnOnsite || turningOnPortable) autoConvertNoneGapsToOnsite();
      render();
    }
    document.querySelectorAll('input[name="atTrackCharge"]').forEach(function (r) {
      r.addEventListener('change', onAtTrackSourceChange);
    });

    function wirePanelEnable(id) {
      var el = document.getElementById(id);
      if (!el) return;
      el.addEventListener('change', function () {
        var turningOnOffsite = (id === 'offsiteChargingEnabled' && el.checked);
        syncTrackPanelEnables();
        // Leave track dirty (do not auto-write profile) so Save / Save as appear.
        setSessionsForm(readSessionsFormRaw());
        if (turningOnOffsite) autoInsertOffsiteBeforeRedSessions();
        render();
      });
    }
    wirePanelEnable('offsiteChargingEnabled');

    UI.UI_FIELDS.forEach(function (f) {
      var el = document.getElementById(f.id);
      if (!el) return;
      // gridEnabled is a hidden mirror driven by at-track radios
      if (f.id === 'gridEnabled') return;
      if (f.id === 'chargeCurveId') {
        el.addEventListener('change', function () {
          // Switching vehicle type: snap capacity to that model's new-pack max.
          syncCapacityLimit({ resetToMax: true });
          syncVehicleSelectWidth();
          drawChargeCurveChart();
          render();
        });
        return;
