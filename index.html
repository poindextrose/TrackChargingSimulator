<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Track Charging Simulator</title>
<style>
  :root { --bg:#0f1115; --panel:#171a21; --line:#2a2f3a; --txt:#e6e8ec; --mut:#9aa3b2;
          --car:#22c55e; --trl:#3b82f6; --ok:#22c55e; --bad:#ef4444; --accent:#6366f1; }
  * { box-sizing: border-box; }
  body { margin:0; font:14px/1.4 -apple-system,Segoe UI,Roboto,sans-serif;
         background:var(--bg); color:var(--txt); }
  header { padding:10px 16px; border-bottom:1px solid var(--line); }
  header h1 { margin:0; font-size:16px; font-weight:650; }
  header .sub { margin:2px 0 0; font-size:12px; color:var(--mut); }
  #profiles { display:flex; flex-wrap:wrap; gap:12px 28px; padding:10px 16px;
              border-bottom:1px solid var(--line); background:var(--panel);
              align-items:flex-end; }
  .prof { display:flex; flex-direction:column; gap:4px; min-width:220px; flex:1 1 280px; }
  .prof .prof-title { font-size:11px; text-transform:uppercase; letter-spacing:.04em; color:var(--mut); }
  .prof-row { display:flex; flex-wrap:wrap; gap:6px; align-items:center; }
  .prof select { flex:1 1 140px; min-width:120px; padding:5px 8px; background:#0c0e12; color:var(--txt);
                 border:1px solid var(--line); border-radius:6px; font-size:13px; }
  .prof button, #reset, .btn { padding:5px 10px; border:1px solid var(--line);
           background:#0c0e12; color:var(--txt); border-radius:6px; cursor:pointer; font-size:12.5px; }
  .prof button:hover, #reset:hover, .btn:hover { border-color:#4b5563; }
  .prof button:disabled { opacity:.4; cursor:not-allowed; }
  .prof .dirty { color:var(--accent); font-size:11px; min-height:14px; }
  #inputs { display:flex; flex-direction:column; gap:12px; padding:12px 16px;
            border-bottom:1px solid var(--line); background:var(--panel); }
  .grp-row { display:flex; flex-wrap:wrap; gap:14px 30px; align-items:flex-start;
             border-top:1px solid var(--line); padding-top:9px; }
  #inputs > .grp-row:first-child { border-top:none; padding-top:0; }
  .grp { display:flex; flex-direction:column; gap:6px; }
  .grp > .grp-title { font-size:11px; text-transform:uppercase; letter-spacing:.04em;
                      color:var(--mut); }
  .grp-fields { display:flex; flex-wrap:wrap; gap:8px; }
  .fld { display:flex; flex-direction:column; gap:2px; }
  .fld label { font-size:11px; color:var(--mut); }
  .fld input { width:92px; padding:4px 6px; background:#0c0e12; color:var(--txt);
               border:1px solid var(--line); border-radius:5px; font-size:13px; }
  #reset { align-self:flex-end; }
  #cards { display:flex; gap:12px; padding:14px 16px; flex-wrap:wrap; }
  .card { flex:1 1 280px; min-width:280px; background:var(--panel);
          border:1px solid var(--line); border-radius:10px; padding:12px; }
  .card h2 { margin:0 0 2px; font-size:14px; }
  .card .desc { color:var(--mut); font-size:12px; margin-bottom:8px; }
  .badge { display:inline-block; padding:2px 8px; border-radius:999px; font-size:12px;
           font-weight:650; margin-bottom:8px; }
  .badge.ok { background:rgba(34,197,94,.15); color:var(--ok); }
  .badge.bad { background:rgba(239,68,68,.15); color:var(--bad); }
  canvas { width:100%; height:auto; display:block; background:#0c0e12;
           border:1px solid var(--line); border-radius:8px; }
  .metrics { list-style:none; margin:8px 0 0; padding:0; }
  .metrics li { display:flex; justify-content:space-between; gap:8px; padding:2px 0;
                border-bottom:1px dashed var(--line); font-size:12.5px; }
  .metrics li span:last-child { color:#fff; font-variant-numeric:tabular-nums; }
  #result { padding:14px 16px 24px; }
  .panel { background:var(--panel); border:1px solid var(--line); border-radius:10px; padding:14px; }
  .panel h2 { margin:0 0 8px; font-size:14px; }
  #result .metrics { display:grid; grid-template-columns:repeat(auto-fit, minmax(240px, 1fr)); gap:0 22px; margin-top:10px; }
  #sessions { padding:0 16px 28px; }
  table.sessions { width:100%; border-collapse:collapse; font-size:12.5px; }
  table.sessions th, table.sessions td { text-align:left; padding:4px 12px 4px 0; border-bottom:1px solid var(--line); font-variant-numeric:tabular-nums; }
  table.sessions th { color:var(--mut); font-weight:600; }
  table.sessions tr.skipped td { color:var(--mut); }
  .fld.chk label { display:flex; flex-direction:row; align-items:center; gap:6px; color:var(--txt); font-size:12.5px; cursor:pointer; }
  .fld.chk input { width:auto; margin:0; }
  @media (max-width:880px){ .card{ flex-basis:100%; } }
</style>
</head>
<body>
<header>
  <h1>Track Charging Simulator</h1>
  <p class="sub">Plan portable DC charging for any car and track. Profiles are saved in this browser.</p>
</header>
<div id="profiles"></div>
<div id="inputs"></div>
<div id="result"></div>
<div id="sessions"></div>
<script>
// SIM_ENGINE_START
var Sim = (function () {
  'use strict';

  var PLAID_V3_CURVE = [
    [5, 210], [10, 250], [20, 250], [30, 250], [33, 250],
    [40, 195], [50, 148], [60, 120], [70, 95], [80, 68],
    [90, 42], [95, 27], [100, 7],
  ];

  function curvePower(socPct) {
    var c = PLAID_V3_CURVE;
    if (socPct <= c[0][0]) return c[0][1];
    if (socPct >= c[c.length - 1][0]) return c[c.length - 1][1];
    for (var i = 1; i < c.length; i++) {
      if (socPct <= c[i][0]) {
        var x0 = c[i - 1][0], y0 = c[i - 1][1], x1 = c[i][0], y1 = c[i][1];
        return y0 + (y1 - y0) * (socPct - x0) / (x1 - x0);
      }
    }
    return c[c.length - 1][1];
  }

  var DEFAULTS = {
    arrivalTimeMin: 8 * 60,
    capacityKwh: 100,
    arrivalSocNoTrailerPct: 87,
    towingCostPct: 4,
    sessionEnergyKwh: 35,
    sessionDurationMin: 15,
    coolingPerGapKwh: 6,
    preSessionCoolingKwh: 5,
    trailerCapKwh: 50,
    genPowerKw: 13,
    acdcEff: 0.94,
    fuelBurnGalPerHr: 1.3,
    dcPowerKw: 40,
    dcdcEff: 0.95,
    sessionEndReservePct: 20,
    firstSessionMin: 9 * 60,
    sessionCount: 7,
    lunchSkipHour: 12,
    driveTimeMin: 30,
    driveConsumptionPct: 14,
    scTargetSocPct: 100,
    scPowerCapKw: 250,
    minTrailerSocPct: 5,
    supercharge: true,
    skipS1: false, skipS2: false, skipS3: false, skipS4: true,
    skipS5: false, skipS6: false, skipS7: false,
  };
  function defaultParams() {
    var o = {}; for (var k in DEFAULTS) o[k] = DEFAULTS[k]; return o;
  }
  function effectiveArrivalKwh(p) {
    return (p.arrivalSocNoTrailerPct - p.towingCostPct) / 100 * p.capacityKwh;
  }

  function chargeDelivery(socPct, eCar, eTr, p) {
    var headroomKw = (p.capacityKwh - eCar) * 60; // kWh headroom as 1-min power
    if (headroomKw < 0) headroomKw = 0;
    var acceptKw = curvePower(socPct);
    var deliver = Math.min(p.dcPowerKw, acceptKw, headroomKw);
    if (deliver < 0) deliver = 0;

    var busNeed = deliver / p.dcdcEff;
    var genBus = p.genPowerKw * p.acdcEff;
    var fromGenBus = Math.min(genBus, busNeed);
    var fromTrailerBus = busNeed - fromGenBus;

    // trailer can only discharge down to its minimum SoC floor
    var trailerAvailKw = Math.max(0, eTr - p.minTrailerSocPct / 100 * p.trailerCapKwh) * 60;
    if (fromTrailerBus > trailerAvailKw) {
      fromTrailerBus = trailerAvailKw;
      var busActual = fromGenBus + fromTrailerBus;
      deliver = Math.min(deliver, busActual * p.dcdcEff);
    }
    return { deliverKw: deliver, fromGenBusKw: fromGenBus, fromTrailerBusKw: fromTrailerBus };
  }

  function buildSchedule(p) {
    var sessions = [];
    var hourMin = p.firstSessionMin;
    while (sessions.length < p.sessionCount) {
      if (hourMin !== p.lunchSkipHour * 60) {
        var idx = sessions.length + 1;
        sessions.push({
          index: idx,
          startMin: hourMin,
          endMin: hourMin + p.sessionDurationMin,
          skipped: !!p['skipS' + idx], // user chose to skip this session
        });
      }
      hourMin += 60;
    }
    return sessions;
  }

  function simulate(p) {
    var dt = 1 / 60;
    var sessions = buildSchedule(p);
    var startMin = p.arrivalTimeMin;
    var endMin = sessions.length ? sessions[sessions.length - 1].endMin : startMin;
    var cap = p.capacityKwh, tcap = p.trailerCapKwh;
    var reserveKwh = p.sessionEndReservePct / 100 * cap; // required Plaid SoC at each session end
    var genBusFull = p.genPowerKw * p.acdcEff;

    // Supercharge departs after session 3 (index 3), returns for session 4.
    var depSession = null, backBy = null;
    for (var di = 0; di < sessions.length; di++) {
      if (sessions[di].index === 3) depSession = sessions[di];
      if (sessions[di].index === 4) backBy = sessions[di];
    }
    var s3End = depSession ? depSession.endMin : Infinity;
    // Supercharge and the 1pm session (index 4) are mutually exclusive: turning on
    // the Supercharge run always skips session 4 (you're away for it).
    var scSkipsS4 = function (s) { return p.supercharge && s.index === 4; };

    // Per-minute cooling power (kW): a pre-first-session lump (heat from the drive
    // in), plus a lump in each gap between sessions the car actually runs. The
    // supercharge away-trip gap (after session 3) gets no lump.
    var runByUser = sessions.filter(function (s) { return !s.skipped && !scSkipsS4(s); });
    var cooling = new Array(endMin + 1);
    for (var z = 0; z <= endMin; z++) cooling[z] = 0;
    var preEnd = runByUser.length ? runByUser[0].startMin : startMin;
    if (runByUser.length && preEnd > startMin && p.preSessionCoolingKwh > 0) {
      var preKw = p.preSessionCoolingKwh / ((preEnd - startMin) / 60);
      for (var pm = startMin; pm < preEnd; pm++) cooling[pm] = preKw;
    }
    for (var i = 0; i < runByUser.length - 1; i++) {
      if (p.supercharge && runByUser[i].index === 3) continue; // away-trip gap
      var gapStart = runByUser[i].endMin, gapEnd = runByUser[i + 1].startMin;
      var gapHours = (gapEnd - gapStart) / 60;
      var kw = p.coolingPerGapKwh / gapHours;
      for (var m = gapStart; m < gapEnd; m++) cooling[m] = kw;
    }

    var eCar = effectiveArrivalKwh(p);
    var eTr = tcap;
    var genRuntimeMin = 0, genAcKwh = 0;
    var fromTrailer = 0, fromGenerator = 0, fromSupercharger = 0;
    var minSocKwh = Infinity, minSocAtMin = startMin; // lowest SoC at a session end (the on-track low)
    var timeline = [];

    // Supercharge trip state machine (only runs when p.supercharge).
    var trip = { phase: p.supercharge ? 'before' : 'off',
                 driveEndMin: null, scStartMin: null, scEndMin: null,
                 scArrivalSocPct: null, returnMin: null };
    var driveDrainKw = (p.driveConsumptionPct / 100 * cap) / (p.driveTimeMin / 60);

    function sessionAt(t) {
      for (var s = 0; s < sessions.length; s++) {
        if (t >= sessions[s].startMin && t < sessions[s].endMin) return sessions[s];
      }
      return null;
    }
    function refillTrailer(busKw) {
      // generator dumps up to busKw onto the trailer (capped by headroom)
      var headKw = (tcap - eTr) * 60;
      var into = Math.min(busKw, headKw);
      if (into < 0) into = 0;
      eTr += into * dt;
      genAcKwh += (p.acdcEff > 0 ? into / p.acdcEff : 0) * dt;
      fromGenerator += into * dt;
      return into;
    }

    for (var t = startMin; t < endMin; t++) {
      var mode = null, coolKw = 0, genOn = false;

      // ---- Supercharge trip overrides ----
      if (trip.phase !== 'off' && trip.phase !== 'done') {
        if (trip.phase === 'before' && t >= s3End) {
          trip.phase = 'out'; trip.driveEndMin = t + p.driveTimeMin;
        }
        if (trip.phase === 'out') {
          mode = 'DRIVE';
          eCar -= driveDrainKw * dt;
          if (eTr < tcap) { genOn = true; refillTrailer(genBusFull); }
          if (t + 1 >= trip.driveEndMin) { trip.phase = 'sc'; trip.scStartMin = t + 1;
            trip.scArrivalSocPct = eCar / cap * 100; }
        } else if (trip.phase === 'sc') {
          mode = 'SC';
          var scKw = Math.min(curvePower(Math.max(0, eCar) / cap * 100), p.scPowerCapKw);
          var targetKwh = p.scTargetSocPct / 100 * cap;
          var head = (Math.min(cap, targetKwh) - eCar) * 60; if (head < 0) head = 0;
          if (scKw > head) scKw = head;
          eCar += scKw * dt; fromSupercharger += scKw * dt;
          if (eTr < tcap) { genOn = true; refillTrailer(genBusFull); }
          if (eCar / cap * 100 >= p.scTargetSocPct - 1e-9 || eCar >= cap - 1e-9) {
            trip.phase = 'back'; trip.scEndMin = t + 1; trip.driveEndMin = t + 1 + p.driveTimeMin;
          }
        } else if (trip.phase === 'back') {
          mode = 'DRIVE';
          eCar -= driveDrainKw * dt;
          if (eTr < tcap) { genOn = true; refillTrailer(genBusFull); }
          if (t + 1 >= trip.driveEndMin) { trip.phase = 'done'; trip.returnMin = t + 1; }
        }
      }

      // ---- Normal modes ----
      if (!mode) {
        var s = sessionAt(t);
        // A session that started while the car was away supercharging is skipped
        // entirely — never drawn, even for its post-return minutes.
        var awaySkipped = s && p.supercharge && trip.returnMin != null &&
                          s.startMin >= s3End && s.startMin < trip.returnMin;
        var run = s && !s.skipped && !scSkipsS4(s) && !awaySkipped;
        if (run) {
          mode = 'SESSION';
          var rate = p.sessionEnergyKwh / (p.sessionDurationMin / 60);
          eCar -= rate * dt;
          if (eTr < tcap) { genOn = true; refillTrailer(genBusFull); }
        } else {
          mode = s ? 'SKIP' : 'CHARGE'; // a skipped-session slot, or a between-session gap
          coolKw = cooling[t] || 0;
          var cd = chargeDelivery(Math.max(0, eCar) / cap * 100, eCar, eTr, p);
          var net = cd.deliverKw - coolKw;
          eCar += net * dt;
          eTr -= cd.fromTrailerBusKw * dt;
          fromTrailer += cd.fromTrailerBusKw * dt;
          fromGenerator += cd.fromGenBusKw * dt;
          genAcKwh += (p.acdcEff > 0 ? cd.fromGenBusKw / p.acdcEff : 0) * dt;
          genOn = true;
          var surplus = genBusFull - cd.fromGenBusKw;
          if (surplus > 1e-9 && eTr < tcap) refillTrailer(surplus);
        }
      }

      if (eCar > cap) eCar = cap;
      if (eTr > tcap) eTr = tcap;
      if (eTr < 0) eTr = 0;
      if (genOn) genRuntimeMin++;
      if (mode === 'SESSION' && eCar < minSocKwh) { minSocKwh = eCar; minSocAtMin = t; }

      timeline.push({
        min: t, mode: mode, coolingKw: coolKw,
        carPct: eCar / cap * 100, trlPct: tcap > 0 ? eTr / tcap * 100 : 0,
      });
    }

    if (!isFinite(minSocKwh)) { minSocKwh = eCar; minSocAtMin = endMin; } // no sessions ran
    var fuelGal = p.genPowerKw > 0 ? genAcKwh * (p.fuelBurnGalPerHr / p.genPowerKw) : 0;

    // Sessions not run: user-skipped, plus any the car was away for while supercharging
    // (between departure and return, or all of them if it never returns).
    var awayEnd = (trip.phase === 'off' || trip.phase === 'before') ? -Infinity
                : (trip.returnMin != null ? trip.returnMin : Infinity);
    var skippedSessions = [];
    for (var sj = 0; sj < sessions.length; sj++) {
      var ss = sessions[sj];
      var sc = scSkipsS4(ss) || (ss.startMin >= s3End && ss.startMin < awayEnd);
      if (ss.skipped || sc) {
        skippedSessions.push({ index: ss.index, startMin: ss.startMin, reason: sc ? 'supercharge' : 'skip' });
      }
    }

    var metrics = {
      feasible: minSocKwh >= reserveKwh - 1e-9,
      shortfallKwh: Math.max(0, reserveKwh - minSocKwh),
      minSocKwh: minSocKwh, minSocPct: minSocKwh / cap * 100, minSocAtMin: minSocAtMin,
      endSocKwh: eCar, endSocPct: eCar / cap * 100,
      trailerEndKwh: eTr, trailerEndPct: tcap > 0 ? eTr / tcap * 100 : 0,
      genRuntimeHr: genRuntimeMin / 60, fuelGal: fuelGal, genAcKwh: genAcKwh,
      fromArrivalKwh: effectiveArrivalKwh(p),
      fromTrailerKwh: fromTrailer, fromGeneratorKwh: fromGenerator,
      fromSuperchargerKwh: fromSupercharger,
      sessionsRun: sessions.length - skippedSessions.length,
      skippedSessions: skippedSessions,
      sc: p.supercharge ? {
        scArrivalSocPct: trip.scArrivalSocPct,
        scDurationMin: (trip.scEndMin != null && trip.scStartMin != null)
          ? trip.scEndMin - trip.scStartMin : null,
        returnMin: trip.returnMin,
        backBefore1pm: (trip.returnMin != null && backBy) ? trip.returnMin <= backBy.startMin : false,
      } : null,
    };
    return { timeline: timeline, metrics: metrics };
  }
  return { PLAID_V3_CURVE: PLAID_V3_CURVE, curvePower: curvePower,
           defaultParams: defaultParams, effectiveArrivalKwh: effectiveArrivalKwh,
           buildSchedule: buildSchedule, chargeDelivery: chargeDelivery,
           simulate: simulate };
})();
// SIM_ENGINE_END
</script>
<script>
// UI_START
var UI = (function () {
  'use strict';

  function hhmmToMin(s) { var a = String(s).split(':'); return (+a[0]) * 60 + (+a[1]); }
  function minToHHMM(m) {
    var h = Math.floor(m / 60), mm = m % 60;
    return (h < 10 ? '0' : '') + h + ':' + (mm < 10 ? '0' : '') + mm;
  }

  // group, id, label, default (in display units), step, unit, kind, set(out,value)
  var num = function (key, mul) {
    return function (out, v) { out[key] = (mul == null ? 1 : mul) * parseFloat(v); };
  };
  var check = function (key) {
    return function (out, v) { out[key] = (v === true || v === 'true'); };
  };
  var run = function (key) { // a "run this session" checkbox maps to the engine's skip flag
    return function (out, v) { out[key] = !(v === true || v === 'true'); };
  };
  // Car = vehicle pack & session energy. Track = day schedule + nearby public charger.
  // Trailer/charging hardware and per-day session skips stay outside profiles.
  var CAR_FIELD_IDS = [
    'capacityKwh', 'arrivalSocNoTrailerPct', 'towingCostPct', 'sessionEnergyKwh',
    'coolingPerGapKwh', 'preSessionCoolingKwh', 'sessionEndReservePct',
  ];
  var TRACK_FIELD_IDS = [
    'arrivalTime', 'firstSession', 'sessionCount', 'sessionDurationMin',
    'driveTimeMin', 'driveConsumptionPct', 'scTargetSocPct', 'scPowerCapKw',
  ];

  var UI_FIELDS = [
    { g:'Car', id:'capacityKwh', label:'Capacity', unit:'kWh', step:1, default:100, min:1, set:num('capacityKwh') },
    { g:'Car', id:'arrivalSocNoTrailerPct', label:'Arrival SoC (no trailer)', unit:'%', step:1, default:87, set:num('arrivalSocNoTrailerPct') },
    { g:'Car', id:'towingCostPct', label:'Towing cost', unit:'% pack', step:1, default:4, set:num('towingCostPct') },
    { g:'Car', id:'sessionEnergyKwh', label:'Energy / session', unit:'kWh', step:1, default:35, set:num('sessionEnergyKwh') },
    { g:'Car', id:'coolingPerGapKwh', label:'Cooling / gap', unit:'kWh', step:0.5, default:6, min:0, set:num('coolingPerGapKwh') },
    { g:'Car', id:'preSessionCoolingKwh', label:'Pre-session cooling', unit:'kWh', step:0.5, default:5, min:0, set:num('preSessionCoolingKwh') },
    { g:'Car', id:'sessionEndReservePct', label:'Session end reserve', unit:'%', step:1, default:20, min:0, max:100, set:num('sessionEndReservePct') },

    { g:'Track', id:'arrivalTime', label:'Arrival', kind:'time', default:'08:00',
      set:function(o,v){ o.arrivalTimeMin = hhmmToMin(v); } },
    { g:'Track', id:'firstSession', label:'First session', kind:'time', default:'09:00',
      set:function(o,v){ o.firstSessionMin = hhmmToMin(v); } },
    { g:'Track', id:'sessionCount', label:'# sessions', unit:'', step:1, default:7, min:1, set:num('sessionCount') },
    { g:'Track', id:'sessionDurationMin', label:'Session length', unit:'min', step:1, default:15, min:1, set:num('sessionDurationMin') },
    { g:'Track', id:'driveTimeMin', label:'Drive to charger', unit:'min', step:1, default:30, min:1, set:num('driveTimeMin') },
    { g:'Track', id:'driveConsumptionPct', label:'Drive cost / leg', unit:'% pack', step:1, default:14, set:num('driveConsumptionPct') },
    { g:'Track', id:'scTargetSocPct', label:'Charger target SoC', unit:'%', step:1, default:100, set:num('scTargetSocPct') },
    { g:'Track', id:'scPowerCapKw', label:'Charger power cap', unit:'kW', step:5, default:250, min:1, set:num('scPowerCapKw') },

    { g:'Trailer & generator', id:'trailerCapKwh', label:'Trailer battery', unit:'kWh', step:1, default:50, set:num('trailerCapKwh') },
    { g:'Trailer & generator', id:'genPowerKw', label:'Generator', unit:'kW', step:0.5, default:13, min:0, set:num('genPowerKw') },
    { g:'Trailer & generator', id:'acdcEffPct', label:'AC-DC eff', unit:'%', step:1, default:94, min:1, max:100, set:function(o,v){ o.acdcEff = parseFloat(v)/100; } },
    { g:'Trailer & generator', id:'fuelBurnGalPerHr', label:'Fuel burn', unit:'gal/hr', step:0.1, default:1.3, set:num('fuelBurnGalPerHr') },
    { g:'Trailer & generator', id:'minTrailerSocPct', label:'Min trailer SoC', unit:'%', step:1, default:5, min:0, max:100, set:num('minTrailerSocPct') },

    { g:'Charging', id:'dcPowerKw', label:'DC charge', unit:'kW', step:1, default:40, set:num('dcPowerKw') },
    { g:'Charging', id:'dcdcEffPct', label:'DC-DC eff', unit:'%', step:1, default:95, min:1, max:100, set:function(o,v){ o.dcdcEff = parseFloat(v)/100; } },

    { g:'Day plan', id:'supercharge', label:'Public charge after session 3 (skips session 4)', kind:'check', default:true, set:check('supercharge') },

    { g:'Sessions', id:'runS1', label:'9:00', kind:'check', default:true, set:run('skipS1') },
    { g:'Sessions', id:'runS2', label:'10:00', kind:'check', default:true, set:run('skipS2') },

    function line(getY, color, dashed) {
      ctx.strokeStyle = color; ctx.lineWidth = 1.6; ctx.setLineDash(dashed ? [4, 3] : []);
      ctx.beginPath();
      result.timeline.forEach(function (pt, i) {
        var xx = s.X(pt.min), yy = s.Y(Math.max(0, Math.min(100, getY(pt))));
        if (i) ctx.lineTo(xx, yy); else ctx.moveTo(xx, yy);
      });
      ctx.stroke(); ctx.setLineDash([]);
    }
    line(function (pt) { return pt.trlPct; }, '#3b82f6', true);
    line(function (pt) { return pt.carPct; }, '#22c55e', false);

    // hover crosshair + tooltip (Plaid + trailer SoC at the hovered time)
    if (hoverX != null) {
      var minute = hoverMinuteFromX(hoverX, b);
      var pt = pointAtMinute(result.timeline, minute);
      var hx = s.X(pt.min);
      ctx.strokeStyle = 'rgba(230,232,236,.35)'; ctx.lineWidth = 1; ctx.setLineDash([]);
      ctx.beginPath(); ctx.moveTo(hx, b.padT); ctx.lineTo(hx, H - b.padB); ctx.stroke();
      ctx.fillStyle = '#3b82f6'; ctx.beginPath(); ctx.arc(hx, s.Y(Math.max(0, Math.min(100, pt.trlPct))), 2.5, 0, 6.2832); ctx.fill();
      ctx.fillStyle = '#22c55e'; ctx.beginPath(); ctx.arc(hx, s.Y(Math.max(0, Math.min(100, pt.carPct))), 3, 0, 6.2832); ctx.fill();
      var away = pt.mode === 'DRIVE' ? '  · driving' : pt.mode === 'SC' ? '  · supercharging' : '';
      drawTooltip(ctx, hx, b.padT + 3, [
        { text: UI.minToHHMM(pt.min) + away, color: pt.mode === 'DRIVE' ? '#eab308' : '#9aa3b2' },
        { text: 'Car ' + Math.round(pt.carPct) + '%  (' + Math.round(pt.carPct / 100 * p.capacityKwh) + ' kWh)', color: '#22c55e' },
        { text: 'Trailer ' + Math.round(pt.trlPct) + '%', color: '#3b82f6' }
      ], b);
    }
    canvas.__draw = { redraw: function (hx) { drawTimeline(canvas, p, result, opts, hx); } };
  }

  function syncExclusive() {
    // Supercharge and the 1pm session are mutually exclusive: lock the 1pm box off when supercharging.
    var sc = document.getElementById('supercharge'), s4 = document.getElementById('runS4');
    if (!sc || !s4) return;
    if (sc.checked) { s4.checked = false; s4.disabled = true; } else { s4.disabled = false; }
  }

  function renderSessions(p, result) {
    var el = document.getElementById('sessions');
    var sched = Sim.buildSchedule(p);
    var reasonByIdx = {};
    result.metrics.skippedSessions.forEach(function (s) { reasonByIdx[s.index] = s.reason; });
    var tl = result.timeline;
    function at(min, key) {
      var i = min - tl[0].min; if (i < 0) i = 0; if (i > tl.length - 1) i = tl.length - 1;
      return Math.round(tl[i][key]) + '%';
    }
    var rows = sched.map(function (s) {
      var reason = reasonByIdx[s.index];
      var status = reason === 'supercharge' ? 'Supercharge' : (reason === 'skip' ? 'Skipped' : 'Run');
      return '<tr' + (reason ? ' class="skipped"' : '') + '>' +
        '<td>' + UI.minToHHMM(s.startMin) + '</td><td>' + status + '</td>' +
        '<td>' + at(s.startMin, 'carPct') + ' → ' + at(s.endMin, 'carPct') + '</td>' +
        '<td>' + at(s.startMin, 'trlPct') + ' → ' + at(s.endMin, 'trlPct') + '</td></tr>';
    }).join('');
    el.innerHTML = '<section class="panel"><h2>Per-session state of charge</h2>' +
      '<table class="sessions"><thead><tr><th>Session</th><th>Status</th>' +
      '<th>Car (start → end)</th><th>Trailer (start → end)</th></tr></thead><tbody>' + rows + '</tbody></table></section>';
  }

  function render() {
    syncExclusive();
    var values = currentValues();
    saveValues(values); // persist so a refresh restores the inputs
    var p = UI.readParams(values);
    var result = Sim.simulate(p);
    renderResult(p, result);
    renderSessions(p, result);
    updateDirty('car');
    updateDirty('track');
  }

  window.__render = render; // exposed for manual debugging
  // Inputs first so profile dirty-checks and applyFieldValues have real fields.
  buildInputs();
  buildProfilesBar();
  render();
})();
// UI_END
</script>
</body>
</html>
