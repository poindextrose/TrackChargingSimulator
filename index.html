      var cont = lastEnabledAfter;
      if (s.enabled !== false) lastEnabledAfter = s.after != null ? s.after : null;
      return sessionBlockHtml(s, i, i === rows.length - 1, cont);
    }).join('');
    table.insertAdjacentHTML('beforeend', html);
    table.querySelectorAll('.sess-after').forEach(function (el) {
      el.addEventListener('change', function () {
        var block = el.closest('tbody.sess-block');
        syncOffsiteOptsVisibility(block);
        // If switched to offsite, ensure defaults exist in extras
        if (el.value === 'offsite' && block) {
          var stop = block.querySelector('.sess-offsite-stop');
          if (stop && !stop.value) stop.value = 'next';
        }
        render();
      });
    });
    table.querySelectorAll('.sess-offsite-stop').forEach(function (el) {
      el.addEventListener('change', function () {
        syncOffsiteOptsVisibility(el.closest('tbody.sess-block'));
        render();
      });
    });
    table.querySelectorAll('.sess-offsite-soc, .sess-offsite-min').forEach(function (el) {
      el.addEventListener('input', render);
      el.addEventListener('change', render);
    });
    table.querySelectorAll('tbody.sess-block').forEach(function (block) {
      syncOffsiteOptsVisibility(block);
    });
    table.querySelectorAll('.sess-enabled').forEach(function (el) {
      el.addEventListener('change', function () {
        // Rebuild so after-charge controls appear/disappear for enable toggles
        setSessionsForm(readSessionsFormRaw());
        render();
      });
    });
    table.querySelectorAll('.sess-start').forEach(function (el) {
      // Live sim updates while editing; re-sort only when the field is committed
      // (blur or Enter) so typing a new time doesn't jump the row mid-edit.
      el.addEventListener('input', render);
      el.addEventListener('change', render);
      function commitSort() {
        var block = el.closest('tbody.sess-block');
        var t = sessionTable();
        var orderBefore = [];
        if (t) {
          t.querySelectorAll('tbody.sess-block').forEach(function (b) {
            var st = b.querySelector('.sess-start');
            orderBefore.push(st ? st.value : '');
          });
        }
        var startVal = el.value || '09:00';
        var afterVal = null;
        if (block) {
          var sel = block.querySelector('.sess-after');
          if (sel) afterVal = sel.value || 'onsite';
        }
        var raw = readSessionsFormRaw();
        var sorted = UI.normalizeSessionsForm(raw);
        var orderAfter = sorted.map(function (r) { return r.start; });
        var moved = orderBefore.join('\0') !== orderAfter.join('\0');
        setSessionsForm(raw, moved ? { highlightStart: startVal, highlightAfter: afterVal } : null);
        render();
      }
      el.addEventListener('blur', commitSort);
      el.addEventListener('keydown', function (e) {
        if (e.key === 'Enter') {
          e.preventDefault();
          el.blur(); // blur runs commitSort
        }
      });
    });
    table.querySelectorAll('.sess-remove').forEach(function (btn) {
      btn.addEventListener('click', function () {
        var block = btn.closest('tbody.sess-block');
        var t = sessionTable();
        if (!block || !t) return;
        var blocks = t.querySelectorAll('tbody.sess-block');
        if (blocks.length <= 1) return;
        // Charge-after lives on each session, so deleting one leaves neighbors' after intact.
        // Rebuild via normalize so the new last session drops its after selector.
        block.remove();
        setSessionsForm(readSessionsFormRaw());
        render();
      });
    });
    if (opts.highlightStart) {
      var match = null;
      table.querySelectorAll('tbody.sess-block').forEach(function (b) {
        var st = b.querySelector('.sess-start');
        var af = b.querySelector('.sess-after');
        if (!st) return;
        if (st.value === opts.highlightStart &&
            (opts.highlightAfter == null || (af && af.value === opts.highlightAfter) ||
             (opts.highlightAfter == null && !af))) {
          match = b;
        }
      });
      if (!match) {
        table.querySelectorAll('tbody.sess-block').forEach(function (b) {
          var st = b.querySelector('.sess-start');
          if (st && st.value === opts.highlightStart) match = b;
        });
      }
      if (match) {
        flashSessionBlock(match);
        try { match.scrollIntoView({ block: 'nearest', behavior: 'smooth' }); } catch (e) { /* ignore */ }
      }
    }
  }
  function readSessionsFormRaw() {
    var table = sessionTable();
    if (!table) return UI.defaultSessionsForm();
    var rows = [];
    table.querySelectorAll('tbody.sess-block').forEach(function (block) {
      var start = block.querySelector('.sess-start');
      if (!start) return;
      var en = block.querySelector('.sess-enabled');
      var row = {
        start: start.value || '09:00',
        enabled: !en || en.checked,
      };
      var after = block.querySelector('.sess-after');
      if (after && row.enabled) {
        row.after = after.value || 'onsite';
        if (row.after === 'offsite') {
          var stop = block.querySelector('.sess-offsite-stop');
          var soc = block.querySelector('.sess-offsite-soc');
          var mins = block.querySelector('.sess-offsite-min');
          row.offsiteStop = stop ? stop.value : 'next';
          row.offsiteUntilSocPct = soc ? parseFloat(soc.value) : 80;
          row.offsiteForMin = mins ? parseFloat(mins.value) : 30;
        }
      }
      rows.push(row);
    });
    return rows.length ? rows : UI.defaultSessionsForm();
  }
  function readSessionsForm() {
    return UI.normalizeSessionsForm(readSessionsFormRaw());
  }

  function buildInputs() {
    var host = document.getElementById('inputs');
    var groups = {};
    UI.UI_FIELDS.forEach(function (f) { (groups[f.g] = groups[f.g] || []).push(f); });

    // Site Charging is nested under Track (linked via track.values.siteProfileId)
    var PROFILED = [
      { group: 'EV', kind: 'car' },
      { group: 'Track', kind: 'track' },
    ];

    function unitSuffix(f) {
      return f.unit ? '<span class="unit">' + f.unit + '</span>' : '';
    }
    function fieldHtml(f) {
      if (f.kind === 'check') {
        return '<div class="fld chk"><label for="' + f.id + '">' +
          '<input id="' + f.id + '" type="checkbox"' + (f.default ? ' checked' : '') + '> ' + f.label + '</label></div>';
      }
      if (f.kind === 'select') {
        var opts = (f.options || []).map(function (o) {
          return '<option value="' + o.value + '"' + (o.value === f.default ? ' selected' : '') + '>' +
            o.label + '</option>';
        }).join('');
        return '<div class="fld"><label for="' + f.id + '">' + f.label + '</label>' +
          '<div class="fld-control"><select id="' + f.id + '">' + opts + '</select>' +
          unitSuffix(f) + '</div></div>';
      }
      if (f.kind === 'text') {
        return '<div class="fld"><label for="' + f.id + '">' + f.label + '</label>' +
          '<div class="fld-control">' +
          '<input id="' + f.id + '" type="text" value="' + String(f.default).replace(/"/g, '&quot;') + '">' +
          unitSuffix(f) + '</div></div>';
      }
      var type = f.kind === 'time' ? 'time' : 'number';
      var step = f.step != null ? ' step="' + f.step + '"' : '';
      var mn = f.min != null ? ' min="' + f.min + '"' : '';
      var mx = f.max != null ? ' max="' + f.max + '"' : '';
      // Size by content: short %/min → sm; decimals or values ≥100 → lg
      var wclass = '';
      if (type === 'number') {
        var defNum = Number(f.default);
        var needsWide = (f.step != null && f.step < 1) ||
          (isFinite(defNum) && Math.abs(defNum) >= 100);
        if (f.unit === '%' || f.unit === 'min') wclass = 'w-sm';
        else if (needsWide) wclass = 'w-lg';
      }
      return '<div class="fld"><label for="' + f.id + '">' + f.label + '</label>' +
        '<div class="fld-control">' +
        '<input id="' + f.id + '" type="' + type + '"' +
        (wclass ? ' class="' + wclass + '"' : '') +
        ' value="' + f.default + '"' + step + mn + mx + '>' +
        unitSuffix(f) + '</div></div>';
    }
    function fieldsHtml(fields) {
      return '<div class="grp-fields">' + fields.map(fieldHtml).join('') + '</div>';
    }
    function groupFieldsHtml(g) {
      var list = groups[g] || [];
      var main = list.filter(function (f) { return !f.sub; });
      var subs = {};
      list.forEach(function (f) {
        if (!f.sub) return;
        (subs[f.sub] = subs[f.sub] || []).push(f);
      });
      // Skip empty main row so the first sub-section sits flush under the header
      // (avoids a stray separator above Generator on Site Charging).
      var html = main.length ? fieldsHtml(main) : '';
      // EV: fields on the left, charge curve as a full-height right column
      if (g === 'EV') {
        return '<div class="car-body">' + html +
          '<div class="curve-col">' +
            '<canvas id="chargeCurveChart" width="260" height="120" aria-label="Charge power curve"></canvas>' +
            '<div class="curve-caption">DC charge acceptance · kW vs SoC %</div>' +
          '</div></div>';
      }

      function subSectionHtml(name, fields) {
        var enable = null;
        var body = [];
        fields.forEach(function (f) {
          if (f.subEnable) enable = f; else body.push(f);
        });
        var titleHtml;
        if (enable) {
          titleHtml = '<label class="subgrp-enable" for="' + enable.id + '">' +
            '<input id="' + enable.id + '" type="checkbox"' +
            (enable.default ? ' checked' : '') + '> ' + enable.label + '</label>';
        } else {
          titleHtml = '<div class="subgrp-title">' + name + '</div>';
        }
        return '<div class="subgrp" data-sub="' + name + '">' +
          '<div class="subgrp-head">' + titleHtml + '</div>' +
          fieldsHtml(body) + '</div>';
      }

      if (g === 'Track') {
        // Order: arrival/main → Site Charging (profiles) → Offsite → Track Sessions
        var siteList = groups['Site Charging'] || [];
        var siteSubs = {};
        siteList.forEach(function (f) {
          if (!f.sub) return;
          (siteSubs[f.sub] = siteSubs[f.sub] || []).push(f);
        });
        var siteBody = '';
        Object.keys(siteSubs).forEach(function (name) {
          siteBody += subSectionHtml(name, siteSubs[name]);
        });
        html += '<div class="track-panel track-site" data-section-embed="site">' +
          sectionHeadHtml('site', 'Site Charging') +
          siteBody +
        '</div>';
        if (subs.Offsite) {
          // Flatten Offsite fields (no enable checkboxes) inside a titled panel
          var offBody = [];
          subs.Offsite.forEach(function (f) {
            if (!f.subEnable) offBody.push(f);
          });
          html += '<div class="track-panel track-offsite" data-section-embed="offsite">' +
            '<div class="panel-title">Offsite Charging</div>' +
            fieldsHtml(offBody) +
          '</div>';
        }
        html += '<div class="subgrp">' +
          '<div class="subgrp-head">' +
            '<div class="subgrp-title" id="sessionsTitle">Track Sessions</div>' +
            '<button type="button" id="addSession" class="icon-btn" title="Add track session" aria-label="Add track session">' +
              '<svg viewBox="0 0 16 16" aria-hidden="true"><path fill="currentColor" d="M8 2a.75.75 0 0 1 .75.75v4.5h4.5a.75.75 0 0 1 0 1.5h-4.5v4.5a.75.75 0 0 1-1.5 0v-4.5h-4.5a.75.75 0 0 1 0-1.5h4.5v-4.5A.75.75 0 0 1 8 2z"/></svg>' +
            '</button>' +
          '</div>' +
          '<div class="sess-table-wrap"><table class="sess-table" id="sessionTable">' +
          '<colgroup><col class="c-start"><col class="c-act"><col class="c-for">' +
          '<col class="c-soc"><col class="c-trl"><col class="c-actn"></colgroup>' +
          '<thead><tr><th>Start</th><th>Activity</th><th>For</th><th>Car SoC</th><th>Trailer SoC</th><th></th></tr></thead>' +
          '</table></div></div>';
        return html;
      }

      Object.keys(subs).forEach(function (name) {
        html += subSectionHtml(name, subs[name]);
      });
      return html;
    }

    var html = PROFILED.map(function (s) {
      return '<div class="section-row" data-section="' + s.kind + '">' +
        sectionHeadHtml(s.kind, s.group) +
        groupFieldsHtml(s.group) +
      '</div>';
    }).join('');
    host.innerHTML = html;

    // Wire EV + Track + nested Site profile controls
    UI.PROFILE_KINDS.forEach(wireProfileBlock);
    document.addEventListener('click', function () { closeAllProfileMenus(); });
    document.addEventListener('keydown', function (e) {
      if (e.key === 'Escape') closeAllProfileMenus();
    });

    document.getElementById('addSession').addEventListener('click', function () {
      var cur = readSessionsForm();
      var last = cur.length ? cur[cur.length - 1] : { start: '09:00' };
      var nextMin = UI.hhmmToMin(last.start) + 60;
      if (nextMin >= 24 * 60) nextMin = UI.hhmmToMin(last.start);
      // after sticks with this new session for the gap after it (if not last once sorted).
      cur.push({ start: UI.minToHHMM(nextMin), enabled: true, after: 'onsite' });
      setSessionsForm(cur);
      render();
    });

    // Overlay any saved values from a previous session (defaults stay for fields not stored).
    var saved = loadValues();
    UI.UI_FIELDS.forEach(function (f) {
      var el = document.getElementById(f.id);
      if (saved[f.id] == null || saved[f.id] === '') return;
      if (f.kind === 'check') el.checked = (saved[f.id] === true || saved[f.id] === 'true');
      else el.value = saved[f.id];
    });
    var initialSessions = saved.sessions || null;
    if (!saved || !Object.keys(saved).length) {
      var carProf = UI.findProfile(listFor('car'), activeIdFor('car'));
      if (carProf) applyFieldValues(carProf.values, fieldIdsFor('car'));
      var trackProf = UI.findProfile(listFor('track'), activeIdFor('track'));
      if (trackProf) applyTrackProfile(trackProf);
      else {
        var siteProf = UI.findProfile(listFor('site'), activeIdFor('site'));
        if (siteProf) applyFieldValues(siteProf.values, fieldIdsFor('site'));
      }
      trackProf = UI.findProfile(listFor('track'), activeIdFor('track'));
      initialSessions = trackProf && trackProf.values.sessions;
    } else {
      // Still honor track→site profile link for the site dropdown selection
      var tr = UI.findProfile(listFor('track'), activeIdFor('track'));
      if (tr && tr.values && tr.values.siteProfileId) {
        var sid = tr.values.siteProfileId;
        if (UI.findProfile(listFor('site'), sid)) {
          setActiveId('site', sid);
          var siteSel = document.getElementById('siteSelect');
          if (siteSel) siteSel.value = sid;
        }
      }
    }
    setSessionsForm(initialSessions || UI.defaultSessionsForm());
    normalizeSiteSourceCheckboxes();
    refreshProfileUI();

    UI.UI_FIELDS.forEach(function (f) {
      var el = document.getElementById(f.id);
      if (!el) return;
      if (f.id === 'chargeCurveId') {
        el.addEventListener('change', function () {
          // Switching vehicle type: snap capacity to that model's new-pack max.
          syncCapacityLimit({ resetToMax: true });
          syncVehicleSelectWidth();
          drawChargeCurveChart();
          render();
        });
        return;
      }
      var ev = (f.kind === 'check' || f.kind === 'select') ? 'change' : 'input';
      el.addEventListener(ev, function () {
        if (f.id === 'genEnabled' || f.id === 'batteryEnabled' || f.id === 'gridEnabled') {
          applySiteSourceExclusivity(f.id);
        }
        render();
      });
    });
  }

  function currentValues() {
    var v = {};
    UI.UI_FIELDS.forEach(function (f) {
      var el = document.getElementById(f.id);
      if (!el) return;
      if (f.kind === 'check') {
        v[f.id] = el.checked;
      } else if (f.id === 'towingCostKwh' && el.dataset.savedTow != null) {
        // Field shows 0 while disabled; keep the real value for profiles/params storage
        v[f.id] = el.dataset.savedTow;
      } else {
        v[f.id] = el.value;
      }
    });
    v.sessions = readSessionsForm();
    return v;
  }

  function syncCapacityLimit(opts) {
    opts = opts || {};
    var vehicleEl = document.getElementById('chargeCurveId');
    var capEl = document.getElementById('capacityKwh');
    if (!vehicleEl || !capEl || typeof Sim === 'undefined') return;
    var max = Sim.maxCapacityKwh(vehicleEl.value);
    capEl.max = max;
    capEl.title = 'Max for this vehicle: ' + max + ' kWh (new-pack usable ceiling)';
    if (opts.resetToMax) {
      // Vehicle type changed: use full new-pack capacity for that model.
      capEl.value = String(max);
      return;
    }
    var v = parseFloat(capEl.value);
    if (isFinite(v) && v > max) capEl.value = String(max);
  }
  /** Size the vehicle <select> to the currently selected label width. */
  function syncVehicleSelectWidth() {
    var sel = document.getElementById('chargeCurveId');
    if (!sel) return;
    var opt = sel.options[sel.selectedIndex];
    var label = opt ? opt.text : '';
    var probe = document.createElement('span');
    probe.style.cssText = 'position:absolute;visibility:hidden;white-space:nowrap;font:12.5px/1.4 -apple-system,Segoe UI,Roboto,sans-serif;';
    probe.textContent = label;
    document.body.appendChild(probe);
    // Extra space for dropdown chrome / native arrow
    var w = Math.ceil(probe.getBoundingClientRect().width) + 36;
    document.body.removeChild(probe);
    sel.style.width = Math.max(w, 80) + 'px';
  }

  /** Draw DC charge acceptance curve; optional hoverSoc draws crosshair + readout. */
  function drawChargeCurveChart(hoverSoc) {
    var canvas = document.getElementById('chargeCurveChart');
    var sel = document.getElementById('chargeCurveId');
    if (!canvas || !sel || typeof Sim === 'undefined') return;
    var curveId = sel.value;
    var curve = Sim.getChargeCurve(curveId);
    if (!curve || !curve.length) return;

    var col = canvas.parentElement;
    var dpr = window.devicePixelRatio || 1;
    var cssW = canvas.clientWidth || (col && col.clientWidth) || 260;
    var cssH = canvas.clientHeight || 120;
    var bw = Math.round(cssW * dpr), bh = Math.round(cssH * dpr);
    if (canvas.width !== bw || canvas.height !== bh) {
      canvas.width = bw;
      canvas.height = bh;
    }
    var ctx = canvas.getContext('2d');
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

    var padL = 32, padR = 10, padT = 12, padB = 22;
    var w = cssW - padL - padR, h = cssH - padT - padB;
    if (w < 40 || h < 40) return;
    var xMin = 0, xMax = 100;
    var yMax = 0;
    curve.forEach(function (pt) { if (pt[1] > yMax) yMax = pt[1]; });
    yMax = Math.ceil(yMax / 50) * 50 || 250;
    var yMin = 0;

    function X(soc) { return padL + (soc - xMin) / (xMax - xMin) * w; }
    function Y(kw) { return padT + (1 - (kw - yMin) / (yMax - yMin)) * h; }
    function socFromX(px) {
      return xMin + (px - padL) / w * (xMax - xMin);
    }

    // Persist plot geometry for hover handlers
    canvas.__curve = {
      curveId: curveId, padL: padL, padR: padR, padT: padT, padB: padB,
      w: w, h: h, cssW: cssW, cssH: cssH, xMin: xMin, xMax: xMax, yMin: yMin, yMax: yMax,
      X: X, Y: Y, socFromX: socFromX,
    };

    ctx.clearRect(0, 0, cssW, cssH);
    ctx.fillStyle = '#0c0e12';
    ctx.fillRect(0, 0, cssW, cssH);

    // Grid
    ctx.strokeStyle = 'rgba(255,255,255,.06)';
    ctx.lineWidth = 1;
    ctx.font = '9px -apple-system,Segoe UI,Roboto,sans-serif';
    ctx.fillStyle = '#6b7280';
    ctx.textAlign = 'right';
    ctx.textBaseline = 'middle';
    for (var gy = 0; gy <= yMax; gy += 50) {
      var yy = Y(gy);
      ctx.beginPath(); ctx.moveTo(padL, yy); ctx.lineTo(padL + w, yy); ctx.stroke();
      ctx.fillText(String(gy), padL - 4, yy);
    }
    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';
    for (var gx = 0; gx <= 100; gx += 25) {
      var xx = X(gx);
      ctx.beginPath(); ctx.moveTo(xx, padT); ctx.lineTo(xx, padT + h); ctx.stroke();
      ctx.fillText(gx + '%', xx, padT + h + 4);
    }

    // Axes
    ctx.strokeStyle = 'rgba(255,255,255,.18)';
    ctx.beginPath();
    ctx.moveTo(padL, padT);
    ctx.lineTo(padL, padT + h);
    ctx.lineTo(padL + w, padT + h);
    ctx.stroke();

    // Dense polyline via curvePower for smooth segments
    ctx.strokeStyle = '#22c55e';
    ctx.lineWidth = 2;
    ctx.lineJoin = 'round';
    ctx.beginPath();
    for (var i = 0; i <= 100; i++) {
      var kw = Sim.curvePower(i, curveId);
      var px = X(i), py = Y(kw);
      if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
    }
    ctx.stroke();

    // Anchor dots
    ctx.fillStyle = '#86efac';
    curve.forEach(function (pt) {
      ctx.beginPath();
      ctx.arc(X(pt[0]), Y(pt[1]), 2.5, 0, Math.PI * 2);
      ctx.fill();
    });

    // Peak label (hidden while hovering so readout is clearer)
    if (hoverSoc == null || !isFinite(hoverSoc)) {
      ctx.fillStyle = '#9aa3b2';
      ctx.textAlign = 'left';
      ctx.textBaseline = 'top';
      ctx.fillText(yMax + ' kW max', padL + 4, padT + 2);
    }

    // Hover crosshair + SoC / power readout
    if (hoverSoc != null && isFinite(hoverSoc)) {
      var soc = Math.max(0, Math.min(100, hoverSoc));
      var pwr = Sim.curvePower(soc, curveId);
      var hx = X(soc), hy = Y(pwr);

      ctx.save();
      ctx.strokeStyle = 'rgba(165,180,252,.75)';
      ctx.lineWidth = 1;
      ctx.setLineDash([3, 3]);
      // Vertical (SoC)
      ctx.beginPath();
      ctx.moveTo(hx, padT);
      ctx.lineTo(hx, padT + h);
      ctx.stroke();
      // Horizontal (power)
      ctx.beginPath();
      ctx.moveTo(padL, hy);
      ctx.lineTo(padL + w, hy);
      ctx.stroke();
      ctx.setLineDash([]);

      // Intersection marker
      ctx.fillStyle = '#a5b4fc';
      ctx.beginPath();
      ctx.arc(hx, hy, 3.5, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = '#0c0e12';
      ctx.lineWidth = 1;
      ctx.stroke();

      // Readout badge
      var label = Math.round(soc) + '% SoC  ·  ' + Math.round(pwr) + ' kW';
      ctx.font = '10px -apple-system,Segoe UI,Roboto,sans-serif';
      var tw = ctx.measureText(label).width + 10;
      var th = 16;
      var bx = hx + 8;
      var by = hy - th - 6;
      if (bx + tw > padL + w) bx = hx - tw - 8;
      if (by < padT) by = hy + 8;
      if (by + th > padT + h) by = padT + h - th;
      ctx.fillStyle = 'rgba(15,18,28,.92)';
      ctx.strokeStyle = 'rgba(165,180,252,.55)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      // simple rounded rect
      var r = 4;
      ctx.moveTo(bx + r, by);
      ctx.arcTo(bx + tw, by, bx + tw, by + th, r);
      ctx.arcTo(bx + tw, by + th, bx, by + th, r);
      ctx.arcTo(bx, by + th, bx, by, r);
      ctx.arcTo(bx, by, bx + tw, by, r);
      ctx.closePath();
      ctx.fill();
      ctx.stroke();
      ctx.fillStyle = '#e5e7eb';
      ctx.textAlign = 'left';
      ctx.textBaseline = 'middle';
      ctx.fillText(label, bx + 5, by + th / 2);
      ctx.restore();
    }

    wireChargeCurveHover(canvas);
  }

  function wireChargeCurveHover(canvas) {
    if (!canvas || canvas.__curveHoverWired) return;
    canvas.__curveHoverWired = true;
    canvas.style.cursor = 'crosshair';
    canvas.addEventListener('mousemove', function (e) {
      var geo = canvas.__curve;
      if (!geo) return;
      var rect = canvas.getBoundingClientRect();
      var px = (e.clientX - rect.left) * (geo.cssW / rect.width);
      if (px < geo.padL || px > geo.padL + geo.w) {
        drawChargeCurveChart(null);
        return;
      }
      var soc = geo.socFromX(px);
      drawChargeCurveChart(soc);
    });
    canvas.addEventListener('mouseleave', function () {
      drawChargeCurveChart(null);
    });
  }

  // ---- Export / import UI ----
  var modalEl = document.getElementById('modal');
  var modalTitle = document.getElementById('modalTitle');
  var modalDesc = document.getElementById('modalDesc');
  var modalBody = document.getElementById('modalBody');
  var modalToolbar = document.getElementById('modalToolbar');
  var modalOk = document.getElementById('modalOk');
  var modalCancel = document.getElementById('modalCancel');
  var modalOnOk = null;

  function closeModal() {
    modalEl.classList.add('hidden');
    modalOnOk = null;
    modalBody.innerHTML = '';
    modalToolbar.innerHTML = '';
  }
  function openModal(opts) {
    modalTitle.textContent = opts.title || '';
    modalDesc.textContent = opts.desc || '';
    modalOk.textContent = opts.okLabel || 'OK';
    modalBody.innerHTML = opts.bodyHtml || '';
    modalToolbar.innerHTML = opts.toolbarHtml || '';
    modalOnOk = opts.onOk || null;
    modalEl.classList.remove('hidden');
    if (opts.onOpen) opts.onOpen();
  }
  modalCancel.addEventListener('click', closeModal);
  modalEl.addEventListener('click', function (e) {
    if (e.target === modalEl) closeModal();
  });
  modalOk.addEventListener('click', function () {
    if (modalOnOk) modalOnOk();
  });
  document.addEventListener('keydown', function (e) {
    if (e.key === 'Escape' && !modalEl.classList.contains('hidden')) closeModal();
  });

  function profileChecklistHtml(groups, idPrefix) {
    // groups: [{ kind, label, profiles: [{id,name}] }]
    return groups.map(function (g) {
      if (!g.profiles.length) {
        return '<div class="modal-group"><h3>' + escapeHtml(g.label) + '</h3>' +
          '<div class="modal-desc">No profiles</div></div>';
      }
      return '<div class="modal-group" data-kind="' + g.kind + '"><h3>' + escapeHtml(g.label) + '</h3>' +
        g.profiles.map(function (p) {
          var cid = idPrefix + g.kind + '_' + p.id;
          return '<label class="modal-check" for="' + cid + '">' +
            '<input type="checkbox" id="' + cid + '" data-kind="' + g.kind + '" data-id="' +
            escapeHtml(p.id) + '" data-name="' + escapeHtml(p.name) + '" checked> ' +
            escapeHtml(p.name) + '</label>';
        }).join('') + '</div>';
    }).join('');
  }
  function readChecklistSelection() {
    var selected = { cars: [], tracks: [], sites: [], items: [] };
    modalBody.querySelectorAll('input[type="checkbox"][data-kind]').forEach(function (cb) {
      if (!cb.checked) return;
      var kind = cb.getAttribute('data-kind');
      var id = cb.getAttribute('data-id');
      var name = cb.getAttribute('data-name');
      var m = UI.PROFILE_META[kind];
      selected[m.listKey].push(id);
      selected.items.push({ kind: kind, id: id, name: name });
    });
    return selected;
  }
  function wireSelectAllNone() {
    var all = document.getElementById('modalSelectAll');
    var none = document.getElementById('modalSelectNone');
    if (all) all.addEventListener('click', function () {
      modalBody.querySelectorAll('input[type="checkbox"][data-kind]').forEach(function (cb) { cb.checked = true; });
    });
    if (none) none.addEventListener('click', function () {
      modalBody.querySelectorAll('input[type="checkbox"][data-kind]').forEach(function (cb) { cb.checked = false; });
    });
  }
  function downloadJson(obj, filename) {
    var blob = new Blob([JSON.stringify(obj, null, 2)], { type: 'application/json' });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    a.remove();
    setTimeout(function () { URL.revokeObjectURL(url); }, 1000);
  }

  function openExportDialog() {
    var groups = UI.PROFILE_KINDS.map(function (kind) {
      var m = UI.PROFILE_META[kind];
      return {
        kind: kind,
        label: m.label,
        profiles: (profileState[m.listKey] || []).map(function (p) {
          return { id: p.id, name: p.name };
        }),
      };
    });
    openModal({
      title: 'Export profiles',
      desc: 'Choose which profiles to include in the JSON file.',
      okLabel: 'Export',
      toolbarHtml: '<button type="button" id="modalSelectAll">Select all</button>' +
        '<button type="button" id="modalSelectNone">Select none</button>',
      bodyHtml: profileChecklistHtml(groups, 'ex_'),
      onOpen: wireSelectAllNone,
      onOk: function () {
        var sel = readChecklistSelection();
        if (!sel.items.length) {
          window.alert('Select at least one profile to export.');
          return;
        }
        var payload = UI.packExport(profileState, {
          cars: sel.cars, tracks: sel.tracks, sites: sel.sites,
        });
        var stamp = new Date().toISOString().slice(0, 10);
        downloadJson(payload, 'track-charging-profiles-' + stamp + '.json');
        closeModal();
      },
    });
  }

  function openImportPicker(parsed) {
    var groups = UI.PROFILE_KINDS.map(function (kind) {
      var m = UI.PROFILE_META[kind];
      return {
        kind: kind,
        label: m.label,
        profiles: (parsed[m.listKey] || []).map(function (p) {
          return { id: p.id, name: p.name };
        }),
      };
    });
    var total = groups.reduce(function (n, g) { return n + g.profiles.length; }, 0);
    if (!total) {
      window.alert('No profiles found in that file.');
      return;
    }
    openModal({
      title: 'Import profiles',
      desc: 'Choose which profiles to import. If a name already exists you will be asked to replace or create a “…import” copy.',
      okLabel: 'Import',
      toolbarHtml: '<button type="button" id="modalSelectAll">Select all</button>' +
        '<button type="button" id="modalSelectNone">Select none</button>',
      bodyHtml: profileChecklistHtml(groups, 'im_'),
      onOpen: wireSelectAllNone,
      onOk: function () {
        var sel = readChecklistSelection();
        if (!sel.items.length) {
          window.alert('Select at least one profile to import.');
          return;
        }
        var items = [];
        var decisions = {};
        sel.items.forEach(function (it) {
          var m = UI.PROFILE_META[it.kind];
          var list = parsed[m.listKey] || [];
          var prof = null;
          for (var i = 0; i < list.length; i++) {
            if (list[i].id === it.id || list[i].name === it.name) { prof = list[i]; break; }
          }
          if (!prof) return;
          var existing = UI.findByName(profileState[m.listKey] || [], prof.name);
          if (existing) {
            var replace = window.confirm(
              m.label + ' profile "' + prof.name + '" already exists.\n\n' +
              'OK = Replace existing\n' +
              'Cancel = Import as "' + UI.duplicateImportName(prof.name) + '"'
            );
            decisions[it.kind + ':' + prof.name] = replace ? 'replace' : 'duplicate';
          }
          items.push({ kind: it.kind, profile: prof });
        });
        var result = UI.applyImport(profileState, items, decisions);
        profileState = result.state;
        saveProfiles(profileState);
        refreshProfileUI();
        closeModal();
        var s = result.summary;
        window.alert(
          'Import complete.\n' +
          'Added: ' + s.added + '\n' +
          'Replaced: ' + s.replaced + '\n' +
          'Duplicated: ' + s.duplicated
        );
      },
    });
  }

  document.getElementById('btnExport').addEventListener('click', openExportDialog);
  document.getElementById('btnImport').addEventListener('click', function () {
    document.getElementById('importFile').click();
  });
  document.getElementById('importFile').addEventListener('change', function () {
    var file = this.files && this.files[0];
    this.value = '';
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function () {
      try {
        var parsed = UI.parseImport(String(reader.result || ''));
        openImportPicker(parsed);
      } catch (err) {
        window.alert('Could not import file: ' + (err && err.message ? err.message : err));
      }
    };
    reader.onerror = function () {
      window.alert('Could not read that file.');
    };
    reader.readAsText(file);
  });

  function renderResult(p, result) {
    var el = document.getElementById('result');
    var m = result.metrics;
    var badge = m.feasible
      ? '<span class="badge ok">✓ Feasible</span>'
      : '<span class="badge bad">✗ Short ' + (Math.round(m.shortfallKwh)) + ' kWh</span>';
    var rows = UI.formatMetrics(m).map(function (r) {
      return '<li><span>' + r.label + '</span><span>' + r.value + '</span></li>';
    }).join('');
    el.innerHTML = '<section class="panel">' + badge +
      '<canvas id="chart" width="1200" height="260"></canvas>' +
      '<ul class="metrics">' + rows + '</ul></section>';
    var tl = result.timeline;
    var opts = { xMin: p.arrivalTimeMin, xMax: tl.length ? tl[tl.length - 1].min + 1 : p.arrivalTimeMin };
    var cv = document.getElementById('chart');
    drawTimeline(cv, p, result, opts);
    wireHover(cv);
  }

  function sessionBands(p) {
    return Sim.buildSchedule(p); // {index, startMin, endMin, skipped}
  }

  // ---- chart hover (crosshair + tooltip) ----
  function hoverMinuteFromX(hoverX, b) {
    var frac = (hoverX - b.padL) / (b.w - b.padL - b.padR);
    var minute = Math.round(b.xMin + frac * (b.xMax - b.xMin));
    return Math.max(b.xMin, Math.min(b.xMax, minute));
  }
  function pointAtMinute(timeline, minute) {
    var idx = minute - timeline[0].min;
    if (idx < 0) idx = 0; if (idx > timeline.length - 1) idx = timeline.length - 1;
    return timeline[idx];
  }
  function drawTooltip(ctx, ax, ay, lines, b) {
    ctx.font = '11px sans-serif'; ctx.textBaseline = 'top';
    var pad = 5, lh = 13, tw = 0;
    lines.forEach(function (l) { tw = Math.max(tw, ctx.measureText(l.text).width); });
    var bw = tw + pad * 2, bh = lines.length * lh + pad * 2;
    var bx = ax + 9; if (bx + bw > b.w - b.padR) bx = ax - 9 - bw;
    if (bx < b.padL) bx = b.padL;
    var by = ay; if (by + bh > b.h - b.padB) by = b.h - b.padB - bh;
    ctx.fillStyle = 'rgba(12,14,18,.92)'; ctx.strokeStyle = 'rgba(140,148,160,.55)'; ctx.lineWidth = 1;
    ctx.fillRect(bx, by, bw, bh); ctx.strokeRect(bx, by, bw, bh);
    lines.forEach(function (l, i) { ctx.fillStyle = l.color || '#e6e8ec'; ctx.fillText(l.text, bx + pad, by + pad + i * lh); });
    ctx.textBaseline = 'alphabetic';
  }
  function wireHover(canvas) {
    if (canvas.__hoverWired) return;
    canvas.__hoverWired = true;
    canvas.style.cursor = 'crosshair';
    canvas.addEventListener('mousemove', function (e) {
      var d = canvas.__draw; if (!d) return;
      var rect = canvas.getBoundingClientRect();
      d.redraw((e.clientX - rect.left) * (canvas.width / rect.width));
    });
    canvas.addEventListener('mouseleave', function () {
      var d = canvas.__draw; if (d) d.redraw(null);
    });
  }

  function drawTimeline(canvas, p, result, opts, hoverX) {
    var ctx = canvas.getContext('2d');
    var W = canvas.width, H = canvas.height;
    var b = { w:W, h:H, padL:30, padR:8, padT:8, padB:18, xMin:opts.xMin, xMax:opts.xMax, yMin:0, yMax:100 };
    var s = UI.chartScale(b);
    ctx.clearRect(0, 0, W, H);

    // y gridlines 0/50/100
    ctx.strokeStyle = '#222732'; ctx.fillStyle = '#6b7280'; ctx.font = '10px sans-serif'; ctx.lineWidth = 1;
    [0, 50, 100].forEach(function (yy) {
      ctx.beginPath(); ctx.moveTo(b.padL, s.Y(yy)); ctx.lineTo(W - b.padR, s.Y(yy)); ctx.stroke();
      ctx.fillText(yy + '%', 4, s.Y(yy) + 3);
    });
    // hour ticks
    for (var hh = Math.ceil(opts.xMin / 60); hh <= opts.xMax / 60; hh++) {
      var x = s.X(hh * 60);
      ctx.fillText(((hh % 12) || 12), x - 4, H - 5);
    }
    // driving-time background (the Supercharge drive legs), drawn under the session bands
    var driveSegs = [], segStart = null;
    result.timeline.forEach(function (pt) {
      if (pt.mode === 'DRIVE' && segStart === null) segStart = pt.min;
      else if (pt.mode !== 'DRIVE' && segStart !== null) { driveSegs.push([segStart, pt.min]); segStart = null; }
    });
    if (segStart !== null) driveSegs.push([segStart, result.timeline[result.timeline.length - 1].min + 1]);
    ctx.fillStyle = 'rgba(234,179,8,.18)'; // amber = driving
    driveSegs.forEach(function (seg) {
      ctx.fillRect(s.X(seg[0]), b.padT, Math.max(1, s.X(seg[1]) - s.X(seg[0])), H - b.padT - b.padB);
    });

    // session bands: solid = ran; dashed outline = missed (away during offsite trip)
    var skippedIdx = {};
    result.metrics.skippedSessions.forEach(function (ss) { skippedIdx[ss.index] = true; });
    sessionBands(p).forEach(function (sess) {
      var x0 = s.X(sess.startMin), w = Math.max(1, s.X(sess.endMin) - x0);
      if (skippedIdx[sess.index]) {
        ctx.strokeStyle = 'rgba(99,102,241,.5)'; ctx.lineWidth = 1; ctx.setLineDash([3, 2]);
        ctx.strokeRect(x0, b.padT, w, H - b.padT - b.padB); ctx.setLineDash([]);
      } else {
        ctx.fillStyle = 'rgba(99,102,241,.16)';
        ctx.fillRect(x0, b.padT, w, H - b.padT - b.padB);
      }
    });
    // reserve line
    if (p.sessionEndReserveKwh > 0 && p.capacityKwh > 0) {
      var ry = s.Y(p.sessionEndReserveKwh / p.capacityKwh * 100);
      ctx.strokeStyle = 'rgba(239,68,68,.6)'; ctx.setLineDash([3, 3]);
      ctx.beginPath(); ctx.moveTo(b.padL, ry); ctx.lineTo(W - b.padR, ry); ctx.stroke(); ctx.setLineDash([]);
    }
    // trailer (dashed blue) then car (solid green)
    function line(getY, color, dashed) {
      ctx.strokeStyle = color; ctx.lineWidth = 1.6; ctx.setLineDash(dashed ? [4, 3] : []);
      ctx.beginPath();
      result.timeline.forEach(function (pt, i) {
        var xx = s.X(pt.min), yy = s.Y(Math.max(0, Math.min(100, getY(pt))));
        if (i) ctx.lineTo(xx, yy); else ctx.moveTo(xx, yy);
      });
      ctx.stroke(); ctx.setLineDash([]);
    }
    line(function (pt) { return pt.trlPct; }, '#3b82f6', true);
    line(function (pt) { return pt.carPct; }, '#22c55e', false);

    // hover crosshair + tooltip (Plaid + trailer SoC at the hovered time)
    if (hoverX != null) {
      var minute = hoverMinuteFromX(hoverX, b);
      var pt = pointAtMinute(result.timeline, minute);
      var hx = s.X(pt.min);
      ctx.strokeStyle = 'rgba(230,232,236,.35)'; ctx.lineWidth = 1; ctx.setLineDash([]);
      ctx.beginPath(); ctx.moveTo(hx, b.padT); ctx.lineTo(hx, H - b.padB); ctx.stroke();
      ctx.fillStyle = '#3b82f6'; ctx.beginPath(); ctx.arc(hx, s.Y(Math.max(0, Math.min(100, pt.trlPct))), 2.5, 0, 6.2832); ctx.fill();
      ctx.fillStyle = '#22c55e'; ctx.beginPath(); ctx.arc(hx, s.Y(Math.max(0, Math.min(100, pt.carPct))), 3, 0, 6.2832); ctx.fill();
      var away = pt.mode === 'DRIVE' ? '  · driving' : pt.mode === 'SC' ? '  · supercharging' : '';
      drawTooltip(ctx, hx, b.padT + 3, [
        { text: UI.minToHHMM(pt.min) + away, color: pt.mode === 'DRIVE' ? '#eab308' : '#9aa3b2' },
        { text: 'Car ' + Math.round(pt.carPct) + '%  (' + Math.round(pt.carPct / 100 * p.capacityKwh) + ' kWh)', color: '#22c55e' },
        { text: 'Trailer ' + Math.round(pt.trlPct) + '%', color: '#3b82f6' }
      ], b);
    }
    canvas.__draw = { redraw: function (hx) { drawTimeline(canvas, p, result, opts, hx); } };
  }

  function syncTrailerSocColumn(p) {
    var table = document.getElementById('sessionTable');
    if (!table) return;
    // Trailer SoC only makes sense when the portable battery is in the model
    var show = !!(p && Sim.siteSources(p).battery);
    table.classList.toggle('no-trailer', !show);
  }

  function render() {
    syncCapacityLimit();
    syncVehicleSelectWidth();
    drawChargeCurveChart();
    syncSiteSourceUI();
    syncSessionGapOptions();
    var values = currentValues();
    saveValues(values); // persist so a refresh restores the inputs
    if (values.sessions) updateSessionsTitle(values.sessions.length);
    var p = UI.readParams(values);
    // Enforce vehicle capacity ceiling in params (and reflected in the form).
    p.capacityKwh = Sim.clampCapacityKwh(p.capacityKwh, p.chargeCurveId);
    var capEl = document.getElementById('capacityKwh');
    if (capEl && parseFloat(capEl.value) !== p.capacityKwh) {
      capEl.value = String(p.capacityKwh);
    }
    syncTrailerSocColumn(p);
    var result = Sim.simulate(p);
    updateSessionsComputed(p, result);
    renderResult(p, result);
    UI.PROFILE_KINDS.forEach(updateDirty);
  }

  window.__render = render; // exposed for manual debugging
  buildInputs();
  window.addEventListener('resize', function () { drawChargeCurveChart(); });
  render();
  // Second pass after layout so the curve column has a real height
  requestAnimationFrame(function () { drawChargeCurveChart(); });
})();
// UI_END
</script>
</body>
</html>
