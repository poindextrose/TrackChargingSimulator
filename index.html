  /** Draw DC charge acceptance curve; optional hoverSoc draws crosshair + readout. */
  function drawChargeCurveChart(hoverSoc) {
    var canvas = document.getElementById('chargeCurveChart');
    var sel = document.getElementById('chargeCurveId');
    if (!canvas || !sel || typeof Sim === 'undefined') return;
    if (!isChargeCurveVisible()) return;
    var curveId = sel.value;
    var curve = Sim.getChargeCurve(curveId);
    if (!curve || !curve.length) return;

    var col = canvas.parentElement;
    var dpr = window.devicePixelRatio || 1;
    var cssW = canvas.clientWidth || (col && col.clientWidth) || 260;
    var cssH = canvas.clientHeight || 120;
    var bw = Math.round(cssW * dpr), bh = Math.round(cssH * dpr);
    if (canvas.width !== bw || canvas.height !== bh) {
      canvas.width = bw;
      canvas.height = bh;
    }
    var ctx = canvas.getContext('2d');
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

    var padL = 32, padR = 10, padT = 12, padB = 22;
    var w = cssW - padL - padR, h = cssH - padT - padB;
    if (w < 40 || h < 40) return;
    var xMin = 0, xMax = 100;
    var yMax = 0;
    curve.forEach(function (pt) { if (pt[1] > yMax) yMax = pt[1]; });
    yMax = Math.ceil(yMax / 50) * 50 || 250;
    var yMin = 0;

    function X(soc) { return padL + (soc - xMin) / (xMax - xMin) * w; }
    function Y(kw) { return padT + (1 - (kw - yMin) / (yMax - yMin)) * h; }
    function socFromX(px) {
      return xMin + (px - padL) / w * (xMax - xMin);
    }

    // Persist plot geometry for hover handlers
    canvas.__curve = {
      curveId: curveId, padL: padL, padR: padR, padT: padT, padB: padB,
      w: w, h: h, cssW: cssW, cssH: cssH, xMin: xMin, xMax: xMax, yMin: yMin, yMax: yMax,
      X: X, Y: Y, socFromX: socFromX,
    };

    ctx.clearRect(0, 0, cssW, cssH);
    ctx.fillStyle = '#0c0e12';
    ctx.fillRect(0, 0, cssW, cssH);

    // Grid
    ctx.strokeStyle = 'rgba(255,255,255,.06)';
    ctx.lineWidth = 1;
    ctx.font = '9px -apple-system,Segoe UI,Roboto,sans-serif';
    ctx.fillStyle = '#6b7280';
    ctx.textAlign = 'right';
    ctx.textBaseline = 'middle';
    for (var gy = 0; gy <= yMax; gy += 50) {
      var yy = Y(gy);
      ctx.beginPath(); ctx.moveTo(padL, yy); ctx.lineTo(padL + w, yy); ctx.stroke();
      ctx.fillText(String(gy), padL - 4, yy);
    }
    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';
    for (var gx = 0; gx <= 100; gx += 25) {
      var xx = X(gx);
      ctx.beginPath(); ctx.moveTo(xx, padT); ctx.lineTo(xx, padT + h); ctx.stroke();
      ctx.fillText(gx + '%', xx, padT + h + 4);
    }

    // Axes
    ctx.strokeStyle = 'rgba(255,255,255,.18)';
    ctx.beginPath();
    ctx.moveTo(padL, padT);
    ctx.lineTo(padL, padT + h);
    ctx.lineTo(padL + w, padT + h);
    ctx.stroke();

    // Dense polyline via curvePower for smooth segments
    ctx.strokeStyle = '#22c55e';
    ctx.lineWidth = 2;
    ctx.lineJoin = 'round';
    ctx.beginPath();
    for (var i = 0; i <= 100; i++) {
      var kw = Sim.curvePower(i, curveId);
      var px = X(i), py = Y(kw);
      if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
    }
    ctx.stroke();

    // Anchor dots
    ctx.fillStyle = '#86efac';
    curve.forEach(function (pt) {
      ctx.beginPath();
      ctx.arc(X(pt[0]), Y(pt[1]), 2.5, 0, Math.PI * 2);
      ctx.fill();
    });

    // Peak label (hidden while hovering so readout is clearer)
    if (hoverSoc == null || !isFinite(hoverSoc)) {
      ctx.fillStyle = '#9aa3b2';
      ctx.textAlign = 'left';
      ctx.textBaseline = 'top';
      ctx.fillText(yMax + ' kW max', padL + 4, padT + 2);
    }

    // Hover crosshair + SoC / power readout
    if (hoverSoc != null && isFinite(hoverSoc)) {
      var soc = Math.max(0, Math.min(100, hoverSoc));
      var pwr = Sim.curvePower(soc, curveId);
      var hx = X(soc), hy = Y(pwr);

      ctx.save();
      ctx.strokeStyle = 'rgba(165,180,252,.75)';
      ctx.lineWidth = 1;
      ctx.setLineDash([3, 3]);
      // Vertical (SoC)
      ctx.beginPath();
      ctx.moveTo(hx, padT);
      ctx.lineTo(hx, padT + h);
      ctx.stroke();
      // Horizontal (power)
      ctx.beginPath();
      ctx.moveTo(padL, hy);
      ctx.lineTo(padL + w, hy);
      ctx.stroke();
      ctx.setLineDash([]);

      // Intersection marker
      ctx.fillStyle = '#a5b4fc';
      ctx.beginPath();
      ctx.arc(hx, hy, 3.5, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = '#0c0e12';
      ctx.lineWidth = 1;
      ctx.stroke();

      // Readout badge
      var label = Math.round(soc) + '% SoC  ·  ' + Math.round(pwr) + ' kW';
      ctx.font = '10px -apple-system,Segoe UI,Roboto,sans-serif';
      var tw = ctx.measureText(label).width + 10;
      var th = 16;
      var bx = hx + 8;
      var by = hy - th - 6;
      if (bx + tw > padL + w) bx = hx - tw - 8;
      if (by < padT) by = hy + 8;
      if (by + th > padT + h) by = padT + h - th;
      ctx.fillStyle = 'rgba(15,18,28,.92)';
      ctx.strokeStyle = 'rgba(165,180,252,.55)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      // simple rounded rect
      var r = 4;
      ctx.moveTo(bx + r, by);
      ctx.arcTo(bx + tw, by, bx + tw, by + th, r);
      ctx.arcTo(bx + tw, by + th, bx, by + th, r);
      ctx.arcTo(bx, by + th, bx, by, r);
      ctx.arcTo(bx, by, bx + tw, by, r);
      ctx.closePath();
      ctx.fill();
      ctx.stroke();
      ctx.fillStyle = '#e5e7eb';
      ctx.textAlign = 'left';
      ctx.textBaseline = 'middle';
      ctx.fillText(label, bx + 5, by + th / 2);
      ctx.restore();
    }

    wireChargeCurveHover(canvas);
  }

  function wireChargeCurveHover(canvas) {
    if (!canvas || canvas.__curveHoverWired) return;
    canvas.__curveHoverWired = true;
    canvas.style.cursor = 'crosshair';
    canvas.addEventListener('mousemove', function (e) {
      var geo = canvas.__curve;
      if (!geo) return;
      var rect = canvas.getBoundingClientRect();
      var px = (e.clientX - rect.left) * (geo.cssW / rect.width);
      if (px < geo.padL || px > geo.padL + geo.w) {
        drawChargeCurveChart(null);
        return;
      }
      var soc = geo.socFromX(px);
      drawChargeCurveChart(soc);
    });
    canvas.addEventListener('mouseleave', function () {
      drawChargeCurveChart(null);
    });
  }

  function profileChecklistHtml(groups, idPrefix) {
    // groups: [{ kind, label, profiles: [{id,name}] }]
    return groups.map(function (g) {
      if (!g.profiles.length) {
        return '<div class="modal-group"><h3>' + escapeHtml(g.label) + '</h3>' +
          '<div class="modal-desc">No profiles</div></div>';

      return '<div class="modal-group" data-kind="' + g.kind + '"><h3>' + escapeHtml(g.label) + '</h3>' +
        g.profiles.map(function (p) {
          var cid = idPrefix + g.kind + '_' + p.id;
          return '<label class="modal-check" for="' + cid + '">' +
            '<input type="checkbox" id="' + cid + '" data-kind="' + g.kind + '" data-id="' +
            escapeHtml(p.id) + '" data-name="' + escapeHtml(p.name) + '" checked> ' +
            escapeHtml(p.name) + '</label>';
        }).join('') + '</div>';

  function readChecklistSelection() {

    modalBody.querySelectorAll('input[type="checkbox"][data-kind]').forEach(function (cb) {
      if (!cb.checked) return;
      var kind = cb.getAttribute('data-kind');

  function downloadJson(obj, filename) {
    var blob = new Blob([JSON.stringify(obj, null, 2)], { type: 'application/json' });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    a.remove();
    setTimeout(function () { URL.revokeObjectURL(url); }, 1000);
  }

  function openExportDialog() {
    var groups = UI.PROFILE_KINDS.map(function (kind) {
      var m = UI.PROFILE_META[kind];
      return {
        kind: kind,
        label: m.label,
        profiles: profilesSortedByName(profileState[m.listKey] || []).map(function (p) {
          return { id: p.id, name: p.name };
        }),
      };
    });
    openModal({
      title: 'Export profiles',
      desc: 'Choose which profiles to include in the JSON file.',
      okLabel: 'Export',
      toolbarHtml: '<button type="button" id="modalSelectAll">Select all</button>' +
        '<button type="button" id="modalSelectNone">Select none</button>',
      bodyHtml: profileChecklistHtml(groups, 'ex_'),
      onOpen: wireSelectAllNone,
      onOk: function () {
        var sel = readChecklistSelection();
        if (!sel.items.length) {
          window.alert('Select at least one profile to export.');
          return;
        }
        var payload = UI.packExport(profileState, {
          cars: sel.cars, tracks: sel.tracks, sites: sel.sites,
        });
        var stamp = new Date().toISOString().slice(0, 10);
        downloadJson(payload, 'track-charging-profiles-' + stamp + '.json');

      },

  function openImportPicker(parsed) {
    var groups = UI.PROFILE_KINDS.map(function (kind) {
      var m = UI.PROFILE_META[kind];
      return {
        kind: kind,
        label: m.label,
        profiles: profilesSortedByName(parsed[m.listKey] || []).map(function (p) {
          return { id: p.id, name: p.name };
        }),
      };
    });
    var total = groups.reduce(function (n, g) { return n + g.profiles.length; }, 0);
    if (!total) {
      window.alert('No profiles found in that file.');
      return;
    }
    openModal({
      title: 'Import profiles',
      desc: 'Choose which profiles to import. If a name already exists you will be asked to replace or create a “…import” copy.',
      okLabel: 'Import',
      toolbarHtml: '<button type="button" id="modalSelectAll">Select all</button>' +
        '<button type="button" id="modalSelectNone">Select none</button>',
      bodyHtml: profileChecklistHtml(groups, 'im_'),
      onOpen: wireSelectAllNone,
      onOk: function () {
        var sel = readChecklistSelection();
        if (!sel.items.length) {
          window.alert('Select at least one profile to import.');
          return;
        }
        var items = [];
        var decisions = {};
        sel.items.forEach(function (it) {
          var m = UI.PROFILE_META[it.kind];
          var list = parsed[m.listKey] || [];
          var prof = null;
          for (var i = 0; i < list.length; i++) {
            if (list[i].id === it.id || list[i].name === it.name) { prof = list[i]; break; }
          }
          if (!prof) return;
          var existing = UI.findByName(profileState[m.listKey] || [], prof.name);
          if (existing) {
            var replace = window.confirm(
              m.label + ' profile "' + prof.name + '" already exists.\n\n' +
              'OK = Replace existing\n' +
              'Cancel = Import as "' + UI.duplicateImportName(prof.name) + '"'
            );
            decisions[it.kind + ':' + prof.name] = replace ? 'replace' : 'duplicate';
          }
          items.push({ kind: it.kind, profile: prof });
        });
        var actives = {
          activeCarId: parsed.activeCarId,
          activeCarName: parsed.activeCarName,
          activeTrackId: parsed.activeTrackId,
          activeTrackName: parsed.activeTrackName,
          activeSiteId: parsed.activeSiteId,
          activeSiteName: parsed.activeSiteName,
        };
        var result = UI.applyImport(profileState, items, decisions, actives);
        profileState = result.state;
        saveProfiles(profileState);
        // Apply restored active car/track (and linked site) into the form
        var car = UI.findProfile(listFor('car'), activeIdFor('car'));
        if (car) applyProfileValues('car', car.values || {});
        var track = UI.findProfile(listFor('track'), activeIdFor('track'));
        if (track) applyTrackProfile(track);
        refreshProfileUI();
        render();
        closeModal();
        var s = result.summary;
        window.alert(
          'Import complete.\n' +
          'Added: ' + s.added + '\n' +
          'Replaced: ' + s.replaced + '\n' +
          'Duplicated: ' + s.duplicated
        );
      },
    });
  }

  // ---- chart hover (crosshair + tooltip) ----
  function hoverMinuteFromX(hoverX, b) {
    var frac = (hoverX - b.padL) / (b.w - b.padL - b.padR);
    var minute = Math.round(b.xMin + frac * (b.xMax - b.xMin));
    return Math.max(b.xMin, Math.min(b.xMax, minute));
  }
  function pointAtMinute(timeline, minute) {
    var idx = minute - timeline[0].min;
    if (idx < 0) idx = 0; if (idx > timeline.length - 1) idx = timeline.length - 1;
    return timeline[idx];
  }
  function drawTooltip(ctx, ax, ay, lines, b) {
    ctx.font = '11px sans-serif'; ctx.textBaseline = 'top';
    var pad = 5, lh = 13, tw = 0;
    lines.forEach(function (l) { tw = Math.max(tw, ctx.measureText(l.text).width); });
    var bw = tw + pad * 2, bh = lines.length * lh + pad * 2;
    var bx = ax + 9; if (bx + bw > b.w - b.padR) bx = ax - 9 - bw;
    if (bx < b.padL) bx = b.padL;
    var by = ay; if (by + bh > b.h - b.padB) by = b.h - b.padB - bh;
    ctx.fillStyle = 'rgba(12,14,18,.92)'; ctx.strokeStyle = 'rgba(140,148,160,.55)'; ctx.lineWidth = 1;
    ctx.fillRect(bx, by, bw, bh); ctx.strokeRect(bx, by, bw, bh);
    lines.forEach(function (l, i) { ctx.fillStyle = l.color || '#e6e8ec'; ctx.fillText(l.text, bx + pad, by + pad + i * lh); });
    ctx.textBaseline = 'alphabetic';
  }
  function wireHover(canvas) {
    if (canvas.__hoverWired) return;
    canvas.__hoverWired = true;
    canvas.style.cursor = 'crosshair';
    canvas.addEventListener('mousemove', function (e) {
      var d = canvas.__draw; if (!d) return;
      var rect = canvas.getBoundingClientRect();
      d.redraw((e.clientX - rect.left) * (canvas.width / rect.width));
    });
    canvas.addEventListener('mouseleave', function () {
      var d = canvas.__draw; if (d) d.redraw(null);
    });
  }

  function drawTimeline(canvas, p, result, opts, hoverX) {
    var ctx = canvas.getContext('2d');
    var W = canvas.width, H = canvas.height;
    var b = { w:W, h:H, padL:30, padR:8, padT:8, padB:18, xMin:opts.xMin, xMax:opts.xMax, yMin:0, yMax:100 };
    var s = UI.chartScale(b);
    ctx.clearRect(0, 0, W, H);

    // y gridlines 0/50/100
    ctx.strokeStyle = '#222732'; ctx.fillStyle = '#6b7280'; ctx.font = '10px sans-serif'; ctx.lineWidth = 1;
    [0, 50, 100].forEach(function (yy) {
      ctx.beginPath(); ctx.moveTo(b.padL, s.Y(yy)); ctx.lineTo(W - b.padR, s.Y(yy)); ctx.stroke();
      ctx.fillText(yy + '%', 4, s.Y(yy) + 3);
    });
    // hour ticks
    for (var hh = Math.ceil(opts.xMin / 60); hh <= opts.xMax / 60; hh++) {
      var x = s.X(hh * 60);
      ctx.fillText(((hh % 12) || 12), x - 4, H - 5);
    }
    // driving-time background (the Supercharge drive legs), drawn under the session bands
    var driveSegs = [], segStart = null;
    result.timeline.forEach(function (pt) {
      if (pt.mode === 'DRIVE' && segStart === null) segStart = pt.min;
      else if (pt.mode !== 'DRIVE' && segStart !== null) { driveSegs.push([segStart, pt.min]); segStart = null; }
    });
    if (segStart !== null) driveSegs.push([segStart, result.timeline[result.timeline.length - 1].min + 1]);
    ctx.fillStyle = 'rgba(234,179,8,.18)'; // amber = driving
    driveSegs.forEach(function (seg) {
      ctx.fillRect(s.X(seg[0]), b.padT, Math.max(1, s.X(seg[1]) - s.X(seg[0])), H - b.padT - b.padB);
    });

    // Session bands: solid for minutes actually run (full or partial); skip disabled
    var runMinsChart = result.metrics.sessionRunMinutes || {};
    var partialBy = {};
    (result.metrics.partialSessions || []).forEach(function (ps) { partialBy[ps.index] = ps; });
    sessionBands(p).forEach(function (sess) {
      if (sess.enabled === false) return;
      var mins = runMinsChart[sess.index] || 0;
      if (mins <= 0) return; // fully away — will auto-skip to unchecked
      var partial = partialBy[sess.index];
      var x0 = s.X(partial && partial.runFromMin != null ? partial.runFromMin : sess.startMin);
      var x1 = s.X(partial && partial.runToMin != null ? partial.runToMin : sess.endMin);
      var w = Math.max(1, x1 - x0);
      ctx.fillStyle = 'rgba(99,102,241,.16)';
      ctx.fillRect(x0, b.padT, w, H - b.padT - b.padB);
    });
    // reserve line
    if (p.sessionEndReserveKwh > 0 && p.capacityKwh > 0) {
      var ry = s.Y(p.sessionEndReserveKwh / p.capacityKwh * 100);
      ctx.strokeStyle = 'rgba(239,68,68,.6)'; ctx.setLineDash([3, 3]);
      ctx.beginPath(); ctx.moveTo(b.padL, ry); ctx.lineTo(W - b.padR, ry); ctx.stroke(); ctx.setLineDash([]);
    }
    // trailer (dashed blue) then car (solid green)
    function line(getY, color, dashed) {
      ctx.strokeStyle = color; ctx.lineWidth = 1.6; ctx.setLineDash(dashed ? [4, 3] : []);
      ctx.beginPath();
      result.timeline.forEach(function (pt, i) {
        var xx = s.X(pt.min), yy = s.Y(Math.max(0, Math.min(100, getY(pt))));
        if (i) ctx.lineTo(xx, yy); else ctx.moveTo(xx, yy);
      });
      ctx.stroke(); ctx.setLineDash([]);
    }
    line(function (pt) { return pt.trlPct; }, '#3b82f6', true);
    line(function (pt) { return pt.carPct; }, '#22c55e', false);

    // hover crosshair + tooltip (Plaid + trailer SoC at the hovered time)
    if (hoverX != null) {
      var minute = hoverMinuteFromX(hoverX, b);
      var pt = pointAtMinute(result.timeline, minute);
      var hx = s.X(pt.min);
      ctx.strokeStyle = 'rgba(230,232,236,.35)'; ctx.lineWidth = 1; ctx.setLineDash([]);
      ctx.beginPath(); ctx.moveTo(hx, b.padT); ctx.lineTo(hx, H - b.padB); ctx.stroke();
      ctx.fillStyle = '#3b82f6'; ctx.beginPath(); ctx.arc(hx, s.Y(Math.max(0, Math.min(100, pt.trlPct))), 2.5, 0, 6.2832); ctx.fill();
      ctx.fillStyle = '#22c55e'; ctx.beginPath(); ctx.arc(hx, s.Y(Math.max(0, Math.min(100, pt.carPct))), 3, 0, 6.2832); ctx.fill();
      var away = pt.mode === 'DRIVE' ? '  · driving' : pt.mode === 'SC' ? '  · supercharging' : '';
      drawTooltip(ctx, hx, b.padT + 3, [
        { text: UI.minToHHMM(pt.min) + away, color: pt.mode === 'DRIVE' ? '#eab308' : '#9aa3b2' },
        { text: 'Car ' + Math.round(pt.carPct) + '%  (' + Math.round(pt.carPct / 100 * p.capacityKwh) + ' kWh)', color: '#22c55e' },
        { text: 'Trailer ' + Math.round(pt.trlPct) + '%', color: '#3b82f6' }
      ], b);
    }
    canvas.__draw = { redraw: function (hx) { drawTimeline(canvas, p, result, opts, hx); } };
  }

  function syncTrailerSocColumn(p) {
    var table = document.getElementById('sessionTable');
    if (!table) return;
    // Trailer SoC only makes sense when the portable battery is in the model
    var src = p ? Sim.siteSources(p) : { grid: false, gen: false, battery: false };
    var show = !!src.battery;
    table.classList.toggle('no-trailer', !show);
    // At-track charge row accent: violet (onsite grid) vs blue (portable)
    table.classList.toggle('at-track-portable', !src.grid && !!(src.gen || src.battery));
    table.classList.toggle('at-track-grid', !!src.grid);
  }

  function render() {
    // Session-table number fields (until %, for min) re-render the day on every keystroke;
    // preserve focus/caret so typing multi-digit values does not require re-clicking.
    var focusSnap = captureSessionFieldFocus();
    syncCapacityLimit(); // also syncs capacity-linked maxes (energy/cooling/reserve/…)
    syncSessionDurationLimits(); // For min ≤ track max session time
    applyAtTrackColorsFromDom(); // None color → Wait / No charging; onsite/portable accents
    syncVehicleSelectWidth();
    drawChargeCurveChart();
    // Panel is-off first, then field-level greys (gen/battery/acdc/tow)
    syncTrackPanelEnables();
    syncSiteSourceUI();
    syncSessionGapOptions();
    var values = currentValues();
    // Re-clamp sessions after reading form so stored plan never exceeds track max
    var maxSess = trackMaxSessionMinFromDom();
    if (values.sessions) {
      values.sessions = UI.normalizeSessionsForm(values.sessions, maxSess);
      sessionsFormCache = values.sessions;
    }
    saveValues(values); // persist so a refresh restores the inputs
    if (values.sessions) updateSessionsTitle(values.sessions.length);
    var p = UI.readParams(values);
    // Enforce vehicle capacity ceiling in params (and reflected in the form).
    p.capacityKwh = Sim.clampCapacityKwh(p.capacityKwh, p.chargeCurveId);
    var capEl = document.getElementById('capacityKwh');
    if (capEl && parseFloat(capEl.value) !== p.capacityKwh) {
      capEl.value = String(p.capacityKwh);
    }
    syncTrailerSocColumn(p);
    var result = Sim.simulate(p);
    // Fully-away enabled sessions → uncheck as Skipped (then re-sim once)
    if (applyAwayAutoSkip(result)) {
      values = currentValues();
      saveValues(values);
      if (values.sessions) updateSessionsTitle(values.sessions.length);
      p = UI.readParams(values);
      p.capacityKwh = Sim.clampCapacityKwh(p.capacityKwh, p.chargeCurveId);
      result = Sim.simulate(p);
    }
    updateSessionsComputed(p, result);
    renderResult(p, result);
    UI.PROFILE_KINDS.forEach(updateDirty);
    restoreSessionFieldFocus(focusSnap);
  }

  window.__render = render; // exposed for manual debugging
  buildInputs();
  window.addEventListener('resize', function () { drawChargeCurveChart(); });
  render();
  // Second pass after layout so the curve column has a real height
  requestAnimationFrame(function () { drawChargeCurveChart(); });
})();
// UI_END
</script>
</body>
</html>
