<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Track Charging Simulator</title>
<style>
  :root { --bg:#0f1115; --panel:#171a21; --line:#2a2f3a; --txt:#e6e8ec; --mut:#9aa3b2;
          --car:#22c55e; --trl:#3b82f6; --ok:#22c55e; --bad:#ef4444; --accent:#6366f1; }
  * { box-sizing: border-box; }
  body { margin:0; font:14px/1.4 -apple-system,Segoe UI,Roboto,sans-serif;
         background:var(--bg); color:var(--txt); }
  header { padding:10px 16px; border-bottom:1px solid var(--line); }
  /* Title + export/import always share one line; description sits below */
  .header-top { display:flex; flex-wrap:nowrap; align-items:center; justify-content:space-between;
                gap:10px; }
  header h1 { margin:0; font-size:16px; font-weight:650; flex:1 1 auto; min-width:0;
              white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .header-actions { display:flex; flex-wrap:nowrap; gap:6px; align-items:center; flex:0 0 auto; }
  .header-actions button, .modal-actions button { padding:5px 10px; border:1px solid var(--line);
           background:#0c0e12; color:var(--txt); border-radius:6px; cursor:pointer; font-size:12.5px; }
  .header-actions button:hover, .modal-actions button:hover { border-color:#4b5563; }
  .modal { position:fixed; inset:0; background:rgba(0,0,0,.55); display:flex; align-items:center;
           justify-content:center; z-index:100; padding:16px; }
  .modal.hidden { display:none; }
  .modal-card { background:var(--panel); border:1px solid var(--line); border-radius:10px;
                padding:14px 16px; width:min(440px, 100%); max-height:min(80vh, 640px);
                display:flex; flex-direction:column; gap:10px; }
  .modal-card h2 { margin:0; font-size:14px; }
  .modal-card .modal-desc { margin:0; font-size:12px; color:var(--mut); }
  .modal-body { overflow:auto; flex:1 1 auto; display:flex; flex-direction:column; gap:10px; }
  .modal-group { border:1px solid var(--line); border-radius:8px; padding:8px 10px; }
  .modal-group h3 { margin:0 0 6px; font-size:11px; text-transform:uppercase; letter-spacing:.04em;
                    color:var(--mut); }
  .modal-check { display:flex; align-items:center; gap:8px; font-size:13px; padding:3px 0;
                 cursor:pointer; }
  .modal-check input { margin:0; }
  .modal-toolbar { display:flex; gap:8px; flex-wrap:wrap; }
  .modal-toolbar button { font-size:12px; padding:3px 8px; }
  .modal-actions { display:flex; justify-content:flex-end; gap:8px; padding-top:4px; }
  .modal-actions .primary { border-color:var(--accent); color:#c7c9ff; }
  #inputs { display:flex; flex-direction:column; gap:12px; padding:12px 16px;
            border-bottom:1px solid var(--line); background:var(--bg); }
  .section-row { display:flex; flex-direction:column; gap:10px;
                 padding:14px 16px; background:var(--panel);
                 border:1px solid var(--line); border-radius:10px; }
  .section-row[data-section="car"] { border-left:3px solid var(--car); }
  .section-row[data-section="track"] { border-left:3px solid var(--accent); }
  /* Nested panels inside Track (Site Charging, Offsite Charging) */
  .track-panel {
    margin-top:8px; padding:10px 12px; border:1px solid var(--line); border-radius:8px;
  }
  .track-panel.track-site {
    border-left:3px solid var(--trl); background:rgba(59,130,246,.04);
  }
  .track-panel.track-offsite {
    border-left:3px solid #22c55e; background:rgba(34,197,94,.04);
  }
  .track-panel .section-head {
    padding-bottom:6px; margin-bottom:6px; border-bottom:1px dashed var(--line);
  }
  .track-panel .section-head .grp-title { font-size:12px; font-weight:650; }
  .track-panel .section-head select { flex:0 1 180px; width:180px; max-width:240px; font-size:12px; }
  .track-panel .panel-title {
    margin:0 0 8px; font-size:12px; font-weight:650; text-transform:uppercase;
    letter-spacing:.04em; color:var(--txt);
  }
  .track-panel .subgrp:first-of-type { margin-top:0; padding-top:0; border-top:none; }
  /* EV / TRACK: profile select + ⋯ menu */
  .section-head { display:flex; flex-wrap:nowrap; gap:6px; align-items:center; min-width:0;
                  padding-bottom:8px; border-bottom:1px solid var(--line); margin-bottom:2px; }
  .section-head .grp-title { flex:0 0 auto; font-size:16px; text-transform:uppercase;
                             letter-spacing:.04em; color:var(--txt); font-weight:700; white-space:nowrap; }
  .section-head select { flex:0 1 200px; width:200px; min-width:120px; max-width:280px;
                         padding:4px 6px; background:#0c0e12; color:var(--txt);
                         border:1px solid var(--line); border-radius:6px; font-size:12.5px; }
  .section-head button, #reset, .btn { flex:0 0 auto; white-space:nowrap; padding:4px 8px;
           border:1px solid var(--line); background:#0c0e12; color:var(--txt);
           border-radius:6px; cursor:pointer; font-size:12px; }
  .section-head button:hover, #reset:hover, .btn:hover { border-color:#4b5563; }
  .section-head button:disabled { opacity:.4; cursor:not-allowed; }
  .section-head .dirty-actions {
    flex:0 0 auto; display:none; align-items:center; gap:6px;
  }
  .section-head .dirty-actions.is-dirty { display:inline-flex; }
  .section-head .dirty-save,
  .section-head .dirty-reset {
    display:inline-flex; align-items:center; justify-content:center;
    border-radius:7px; border:1px solid transparent; cursor:pointer;
    color:#0b1020; background:linear-gradient(180deg, #a5b4fc 0%, #6366f1 100%);
    box-shadow:0 0 0 2px rgba(99,102,241,.45), 0 4px 14px rgba(99,102,241,.55);
    animation: savePulse 1.6s ease-in-out infinite;
  }
  .section-head .dirty-save {
    padding:5px 14px; font-size:12.5px; font-weight:700; letter-spacing:.02em;
  }
  .section-head .dirty-reset {
    width:2rem; height:2rem; padding:0;
  }
  .section-head .dirty-save:hover,
  .section-head .dirty-reset:hover {
    background:linear-gradient(180deg, #c7d2fe 0%, #818cf8 100%);
    box-shadow:0 0 0 3px rgba(99,102,241,.55), 0 6px 18px rgba(99,102,241,.65);
  }
  .section-head .dirty-save:active,
  .section-head .dirty-reset:active { transform:translateY(1px); }
  .section-head .dirty-reset svg { display:block; width:15px; height:15px; }
  @keyframes savePulse {
    0%, 100% { box-shadow:0 0 0 2px rgba(99,102,241,.45), 0 4px 14px rgba(99,102,241,.5); }
    50% { box-shadow:0 0 0 4px rgba(99,102,241,.65), 0 6px 20px rgba(99,102,241,.75); }
  }
  .menu-wrap { position:relative; flex:0 0 auto; }
  .menu-wrap > .menu-btn { width:2rem; padding:4px 0; font-size:16px; line-height:1;
                           letter-spacing:0.05em; text-align:center; }
  .menu-dropdown {
    position:absolute; top:calc(100% + 4px); left:0; z-index:40;
    min-width:9.5rem; padding:4px 0; margin:0;
    background:var(--panel); border:1px solid var(--line); border-radius:8px;
    box-shadow:0 8px 24px rgba(0,0,0,.45);
  }
  .menu-dropdown[hidden] { display:none; }
  .menu-dropdown button {
    display:block; width:100%; box-sizing:border-box;
    padding:7px 12px; border:0; border-radius:0; background:transparent;
    color:var(--txt); font-size:12.5px; text-align:left; cursor:pointer; white-space:nowrap;
  }
  .menu-dropdown button:hover:not(:disabled) { background:#1c2230; }
  .menu-dropdown button:disabled { opacity:.4; cursor:not-allowed; }
  .menu-dropdown button.menu-danger { color:var(--bad); }
  .menu-dropdown hr { border:0; border-top:1px solid var(--line); margin:4px 0; }
  .grp-fields { display:flex; flex-wrap:wrap; gap:10px 14px; align-items:flex-end; }
  .fld { display:flex; flex-direction:column; gap:2px; }
  .fld label { font-size:11px; color:var(--mut); }
  .fld-control { display:flex; align-items:center; gap:4px; }
  .fld .unit { font-size:11px; color:var(--mut); white-space:nowrap; }
  .fld input, .fld select { padding:4px 6px; background:#0c0e12; color:var(--txt);
               border:1px solid var(--line); border-radius:5px; font-size:13px;
               box-sizing:border-box; }
  .fld input[type="number"],
  .fld input[type="time"] { text-align:right; }
  .fld input[type="text"] { text-align:left; }
  /* Compact number fields; hide spinners so width matches the digits */
  .fld input[type="number"] { width:3.1rem; -moz-appearance:textfield; }
  .fld input[type="number"]::-webkit-outer-spin-button,
  .fld input[type="number"]::-webkit-inner-spin-button { -webkit-appearance:none; margin:0; }
  .fld input[type="number"].w-sm { width:2.6rem; }   /* %, min — 1–3 digits */
  .fld input[type="number"].w-lg { width:3.6rem; }   /* decimals / 3+ digits (99.4, 250) */
  .fld input[type="time"] { width:5.5rem; }
  /* No native clock/calendar picker on time fields (type typed HH:MM) */
  .fld input[type="time"]::-webkit-calendar-picker-indicator,
  table.sess-table input[type="time"]::-webkit-calendar-picker-indicator {
    display: none;
    -webkit-appearance: none;
  }
  .fld input[type="text"] { width:7.5rem; }
  .fld select { width:auto; min-width:4.5rem; }
  .fld select#chargeCurveId { width:auto; min-width:0; max-width:100%; }
  /* EV section: fields wrap on the left; curve stays a right column (~2/3 prior size) */
  .car-body {
    display:flex; flex-direction:row; flex-wrap:nowrap; align-items:flex-start; gap:14px 18px;
    min-width:0;
  }
  .car-body .grp-fields {
    flex:1 1 0; min-width:12rem; align-content:flex-start;
  }
  .curve-col {
    flex:0 0 clamp(190px, 28vw, 347px); /* ~2/3 of prior 280–520 range */
    display:flex; flex-direction:column; min-height:0; align-self:flex-start;
  }
  .curve-col canvas#chargeCurveChart {
    width:100%; height:120px; min-height:0; max-height:120px; display:block;
    /* 120 ≈ 2/3 of prior ~180 stretch; fixed so it doesn't fill full field column */
    background:#0c0e12; border:1px solid var(--line); border-radius:6px;
    cursor:crosshair;
  }
  .curve-caption {
    flex:0 0 auto; margin-top:4px; font-size:10px; color:var(--mut); letter-spacing:.02em;
    text-align:right;
  }
  .fld input:disabled, .fld select:disabled { opacity:.45; }
  .subgrp { margin-top:4px; padding-top:6px; border-top:1px dashed var(--line); }
  /* No separator when the sub-section is the first content under the profile header */
  .section-head + .subgrp { margin-top:0; padding-top:0; border-top:none; }
  .subgrp-head { display:flex; align-items:center; gap:8px; margin-bottom:4px; min-width:0; }
  .subgrp-head .subgrp-title { margin-bottom:0; flex:0 1 auto; }
  .subgrp-title { font-size:10px; text-transform:uppercase; letter-spacing:.04em;
                  color:var(--mut); margin-bottom:4px; }
  #sessionsTitle { font-size:13px; font-weight:650; color:var(--txt); letter-spacing:.03em; }
  /* Generator / Battery / Grid: enable label + fields on one row */
  .subgrp[data-sub] {
    display:flex; flex-wrap:wrap; align-items:flex-end; gap:8px 14px;
  }
  .subgrp[data-sub] .subgrp-head {
    margin-bottom:0; flex:0 0 auto; align-self:flex-end;
    padding-bottom:5px; /* line up with input baselines under field labels */
  }
  .subgrp[data-sub] .grp-fields {
    flex:1 1 auto; min-width:0; margin:0;
  }
  .subgrp-enable { display:flex; align-items:center; gap:6px; margin:0; cursor:pointer;
                   font-size:10px; text-transform:uppercase; letter-spacing:.04em;
                   color:var(--mut); font-weight:600; user-select:none; white-space:nowrap; }
  .subgrp-enable input { margin:0; width:auto; accent-color:var(--accent); cursor:pointer; }
  .subgrp.is-off .grp-fields { opacity:.4; }
  .subgrp.is-off .grp-fields input:not([type="checkbox"]),
  .subgrp.is-off .grp-fields select { pointer-events:none; }
  .fld.is-disabled { opacity:.4; }
  .fld.is-disabled input,
  .fld.is-disabled select { pointer-events:none; }
  .icon-btn { display:inline-flex; align-items:center; justify-content:center;
              width:1.65rem; height:1.65rem; padding:0; border:1px solid var(--line);
              background:#0c0e12; color:var(--txt); border-radius:6px; cursor:pointer;
              line-height:1; flex:0 0 auto; }
  .icon-btn:hover { border-color:#4b5563; color:#fff; }
  .icon-btn svg { display:block; width:14px; height:14px; }
  .icon-btn.sess-remove { color:var(--mut); }
  .icon-btn.sess-remove:hover { color:var(--bad); border-color:rgba(239,68,68,.45); }
  .sess-table-wrap { margin-top:6px; overflow-x:auto; max-width:100%; }
  /* auto layout: Activity column tracks content (short charger names = less gap before For) */
  table.sess-table { width:max-content; max-width:none; border-collapse:collapse; font-size:12px;
                     table-layout:auto; }
  table.sess-table col.c-start { width:5.75rem; }
  table.sess-table col.c-act { width:auto; }
  table.sess-table col.c-for { width:4.25rem; }
  table.sess-table col.c-soc { width:6.5rem; }
  table.sess-table col.c-trl { width:6.5rem; }
  /* Hide Trailer SoC when site battery is off (no trailer in the model) */
  table.sess-table.no-trailer col.c-trl,
  table.sess-table.no-trailer th:nth-child(5),
  table.sess-table.no-trailer td:nth-child(5) { display:none; }
  table.sess-table col.c-actn { width:2.25rem; }
  /* Activity column must grow for offsite stop controls (not clip into For / SoC) */
  table.sess-table th:nth-child(2),
  table.sess-table td:nth-child(2) {
    padding-right:14px; max-width:none; overflow:visible;
  }
  table.sess-table th { text-align:left; color:var(--mut); font-weight:600; font-size:10px;
                        text-transform:uppercase; letter-spacing:.04em; padding:4px 8px 6px 0;
                        border-bottom:1px solid var(--line); white-space:nowrap; }
  table.sess-table td { padding:4px 8px 4px 0; border-bottom:1px solid var(--line);
                        vertical-align:middle; font-variant-numeric:tabular-nums; white-space:nowrap;
                        overflow:visible; }
  table.sess-table td:first-child { overflow:visible; }
  table.sess-table tr.sess-charge-row td.sess-act,
  table.sess-table tr.sess-charge-row td.ch-act {
    position:relative; z-index:3; overflow:visible;
    white-space:normal; /* allow offsite controls to wrap under mode select */
  }
  table.sess-table tr.sess-charge-row td.ch-act {
    display:flex; flex-direction:column; align-items:flex-start; gap:4px;
  }
  /* Intermediate (drive / charge / wait): smaller, normal weight; center computed start times */
  table.sess-table tr.sess-drive td:first-child,
  table.sess-table tr.sess-charge-row td:first-child,
  table.sess-table tr.sess-wait-row td:first-child { text-align:center; }
  table.sess-table tr.sess-drive td { color:#eab308; font-size:11.5px; font-weight:400; }
  table.sess-table tr.sess-charge-row td,
  table.sess-table tr.sess-wait-row td { font-size:11.5px; font-weight:400; color:var(--mut); }
  table.sess-table tr.sess-charge-row td.sess-act { color:var(--txt); }
  table.sess-table tr.sess-sc td .ch-start,
  table.sess-table tr.sess-sc td.sess-num { color:#22c55e; }
  table.sess-table tr.sess-charge-row td.ch-start { font-variant-numeric:tabular-nums; }
  /* Primary session rows: larger + bold */
  table.sess-table tr.sess-edit-row td { border-bottom-color:#3a4150; font-size:13.5px;
                                          font-weight:650; color:var(--txt); }
  table.sess-table tr.sess-edit-row td.sess-mut { color:var(--mut); font-weight:600; }
  table.sess-table tr.sess-missed td { color:var(--mut); }
  table.sess-table tr.sess-disabled td { color:var(--mut); font-weight:600; }
  table.sess-table tr[hidden] { display:none; }
  table.sess-table .sess-act { color:var(--txt); }
  table.sess-table .sess-enable-label {
    display:inline-flex; align-items:center; gap:6px; cursor:pointer; user-select:none;
  }
  table.sess-table .sess-enable-label input { margin:0; width:auto; accent-color:var(--accent); cursor:pointer; }
  table.sess-table .sess-mut { color:var(--mut); }
  table.sess-table .sess-bad { color:var(--bad); }
  /* Centered SoC ranges: "83% → 48%" — green charge, yellow discharge */
  table.sess-table th:nth-child(4),
  table.sess-table th:nth-child(5),
  table.sess-table td:nth-child(4),
  table.sess-table td:nth-child(5) { text-align: center; }
  table.sess-table .soc-range {
    display: inline;
    font-variant-numeric: tabular-nums;
    white-space: nowrap;
    color: var(--txt);
  }
  table.sess-table .soc-range .soc-arrow { padding: 0 0.15em; opacity: 0.85; }
  table.sess-table .soc-range.soc-charge,
  table.sess-table .soc-range.soc-charge .soc-a,
  table.sess-table .soc-range.soc-charge .soc-arrow,
  table.sess-table .soc-range.soc-charge .soc-b { color: #22c55e; }
  table.sess-table .soc-range.soc-discharge,
  table.sess-table .soc-range.soc-discharge .soc-a,
  table.sess-table .soc-range.soc-discharge .soc-arrow,
  table.sess-table .soc-range.soc-discharge .soc-b { color: #eab308; }
  table.sess-table .soc-range.soc-flat,
  table.sess-table .soc-range.soc-flat .soc-a,
  table.sess-table .soc-range.soc-flat .soc-arrow,
  table.sess-table .soc-range.soc-flat .soc-b { color: var(--mut); }
  /* Low-reserve / floor still wins over charge/discharge colors */
  table.sess-table .soc-range.sess-bad,
  table.sess-table .soc-range.sess-bad .soc-a,
  table.sess-table .soc-range.sess-bad .soc-arrow,
  table.sess-table .soc-range.sess-bad .soc-b { color: var(--bad) !important; }
  /* Flash a session block after auto-sort so the new position is obvious */
  @keyframes sessFlash {
    0% { background-color: rgba(99, 102, 241, 0.42); }
    70% { background-color: rgba(99, 102, 241, 0.18); }
    100% { background-color: transparent; }
  }
  table.sess-table tbody.sess-block.sess-flash td {
    animation: sessFlash 2s ease-out;
  }
  /* Time field without native picker icon */
  table.sess-table input[type="time"] {
    width:5.5rem; min-width:5.5rem; max-width:5.5rem; box-sizing:border-box;
    padding:2px 4px; margin:0; background:#0c0e12; color:var(--txt);
    border:1px solid var(--line); border-radius:5px; font-size:12.5px; font-weight:650;
    font-variant-numeric:tabular-nums;
  }
  table.sess-table select.sess-after,
  table.sess-table select.sess-offsite-stop {
    width:auto; min-width:7.5rem; max-width:12rem;
    padding:2px 4px; background:#0c0e12;
    color:var(--txt); border:1px solid var(--line); border-radius:5px; font-size:11.5px;
  }
  table.sess-table .sess-offsite-opts {
    display:inline-flex; flex-wrap:wrap; align-items:center; gap:5px;
    margin-left:0; vertical-align:middle;
    position:relative; z-index:4; pointer-events:auto;
  }
  table.sess-table .sess-offsite-opts[hidden] { display:none !important; }
  table.sess-table .sess-offsite-opts input[type="number"] {
    width:3.5rem; padding:2px 4px; background:#0c0e12; color:var(--txt);
    border:1px solid var(--line); border-radius:5px; font-size:11.5px;
    text-align:right; -moz-appearance:textfield; position:relative; z-index:4;
    pointer-events:auto;
  }
  table.sess-table .sess-offsite-opts input[type="number"]::-webkit-outer-spin-button,
  table.sess-table .sess-offsite-opts input[type="number"]::-webkit-inner-spin-button {
    -webkit-appearance:none; margin:0;
  }
  table.sess-table .sess-offsite-opts .unit {
    font-size:11px; color:var(--mut); white-space:nowrap;
  }
  table.sess-table .icon-btn { vertical-align:middle; }
  #cards { display:flex; gap:12px; padding:14px 16px; flex-wrap:wrap; }
  .card { flex:1 1 280px; min-width:280px; background:var(--panel);
          border:1px solid var(--line); border-radius:10px; padding:12px; }
  .card h2 { margin:0 0 2px; font-size:14px; }
  .card .desc { color:var(--mut); font-size:12px; margin-bottom:8px; }
  .badge { display:inline-block; padding:2px 8px; border-radius:999px; font-size:12px;
           font-weight:650; margin-bottom:8px; }
  .badge.ok { background:rgba(34,197,94,.15); color:var(--ok); }
  .badge.bad { background:rgba(239,68,68,.15); color:var(--bad); }
  #result canvas, .panel canvas#chart {
    width:100%; height:auto; display:block; background:#0c0e12;
    border:1px solid var(--line); border-radius:8px;
  }
  .metrics { list-style:none; margin:8px 0 0; padding:0; }
  .metrics li { display:flex; justify-content:space-between; gap:8px; padding:2px 0;
                border-bottom:1px dashed var(--line); font-size:12.5px; }
  .metrics li span:last-child { color:#fff; font-variant-numeric:tabular-nums; }
  #result { padding:14px 16px 24px; }
  .panel { background:var(--panel); border:1px solid var(--line); border-radius:10px; padding:14px; }
  .panel h2 { margin:0 0 8px; font-size:14px; }
  #result .metrics { display:grid; grid-template-columns:repeat(auto-fit, minmax(240px, 1fr)); gap:0 22px; margin-top:10px; }
  #sessions { padding:0 16px 28px; }
  table.sessions { width:100%; border-collapse:collapse; font-size:12.5px; }
  table.sessions th, table.sessions td { text-align:left; padding:4px 12px 4px 0; border-bottom:1px solid var(--line); font-variant-numeric:tabular-nums; }
  table.sessions th { color:var(--mut); font-weight:600; }

<script>

    [30, 170], [40, 135], [50, 110], [60, 88], [70, 68],
    [80, 48], [90, 30], [95, 18], [100, 8],

        } else if (stopMode === 'until') {
          done = done || (eCar >= targetKwh - 1e-9);
        } else {
          // until next session: leave in time to drive back for dest start
          var leaveBy = (jobSc.mustReturnBy != null ? jobSc.mustReturnBy : endMin) - p.driveTimeMin;
          done = done || ((t + 1) >= leaveBy);
        }
        if (done) {
          trip.phase = 'back'; trip.scEndMin = t + 1; trip.driveEndMin = t + 1 + p.driveTimeMin;
        }
      } else if (trip.phase === 'back') {
        mode = 'DRIVE';
        eCar -= driveDrainKw * dt;
        if (src.gen && src.battery && eTr < tcap) {
          genOn = refillTrailer(genBusFull) > 1e-9;
        }
        if (t + 1 >= trip.driveEndMin) {
          trip.returnMin = t + 1;
          trip.lastReturnMin = t + 1;
          trip.trips.push({
            sessionIndex: trip.sessionIndex,
            departMin: trip.departMin,
            scStartMin: trip.scStartMin,
            scEndMin: trip.scEndMin,
            scArrivalSocPct: trip.scArrivalSocPct,
            scDurationMin: (trip.scEndMin != null && trip.scStartMin != null)
              ? trip.scEndMin - trip.scStartMin : null,
            returnMin: trip.returnMin,
          });
          trip.phase = 'idle';
          trip.sessionIndex = null;
          trip.job = null;
        }
      }

      // ---- On-track / paddock modes ----
      if (!mode) {
        var s = sessionAt(t);
        if (s) {
          // Every session entry is a run (if the car is present).
          mode = 'SESSION';
          var rate = p.sessionEnergyKwh / (p.sessionDurationMin / 60);
          eCar -= rate * dt;
          if (src.gen && src.battery && eTr < tcap) {
            genOn = refillTrailer(genBusFull) > 1e-9;
          }
        } else {
          // Gap / trailing time. Offsite gaps after the trip returns act as onsite (or none).
          var gMode = gapModeAt(t);
          if (gMode === 'offsite') gMode = siteCanCharge(p) ? 'onsite' : 'none';
          coolKw = cooling[t] || 0;
          if (gMode === 'onsite') {
            mode = 'CHARGE';
            genOn = chargeCarOnsite(coolKw);
          } else {
            mode = 'IDLE';
            if (coolKw > 0) eCar -= coolKw * dt;
          }
        }
      }

      if (eCar > cap) eCar = cap;
      if (eTr > tcap) eTr = tcap;
      if (eTr < 0) eTr = 0;
      if (genOn) genRuntimeMin++;
      if (mode === 'SESSION' && eCar < minSocKwh) { minSocKwh = eCar; minSocAtMin = t; }

      timeline.push({
        min: t, mode: mode, coolingKw: coolKw,
        carPct: eCar / cap * 100, trlPct: tcap > 0 ? eTr / tcap * 100 : 0,
      });
    }

    if (!isFinite(minSocKwh)) { minSocKwh = eCar; minSocAtMin = endMin; }
    var fuelGal = (src.gen && p.genPowerKw > 0)
      ? genAcKwh * (p.fuelBurnGalPerHr / p.genPowerKw) : 0;

    // Which planned enabled sessions actually got SESSION minutes?
    var ranIdx = {};
    timeline.forEach(function (pt) {
      if (pt.mode !== 'SESSION') return;
      var ss = sessionAt(pt.min);
      if (ss) ranIdx[ss.index] = true;
    });
    var skippedSessions = []; // missed (e.g. away offsite) among enabled sessions
    var disabledSessions = []; // intentionally unchecked in the plan
    var sessionsRun = 0;
    var enabledCount = 0;
    sessions.forEach(function (ss) {
      if (!ss.enabled) {
        disabledSessions.push({
          index: ss.index, startMin: ss.startMin, reason: 'disabled',
        });
        return;
      }
      enabledCount++;
      if (ranIdx[ss.index]) {
        sessionsRun++;
      } else {
        skippedSessions.push({
          index: ss.index, startMin: ss.startMin, reason: 'missed', before: ss.before,
        });
      }
    });

    var allTrips = trip.trips.slice();
    // Incomplete final trip (never returned)
    if (trip.phase !== 'idle') {
      allTrips.push({
        sessionIndex: trip.sessionIndex,
        departMin: trip.departMin,
        scStartMin: trip.scStartMin,
        scEndMin: trip.scEndMin,
        scArrivalSocPct: trip.scArrivalSocPct,
        scDurationMin: (trip.scEndMin != null && trip.scStartMin != null)
          ? trip.scEndMin - trip.scStartMin : null,
        returnMin: null,
      });
    }
    var lastTrip = allTrips.length ? allTrips[allTrips.length - 1] : null;

    var metrics = {
      feasible: minSocKwh >= reserveKwh - 1e-9,
      shortfallKwh: Math.max(0, reserveKwh - minSocKwh),
      minSocKwh: minSocKwh, minSocPct: minSocKwh / cap * 100, minSocAtMin: minSocAtMin,
      endSocKwh: eCar, endSocPct: eCar / cap * 100,
      trailerEndKwh: eTr, trailerEndPct: tcap > 0 ? eTr / tcap * 100 : 0,
      genRuntimeHr: genRuntimeMin / 60, fuelGal: fuelGal, genAcKwh: genAcKwh,
      genFuelType: (p.genFuelType === 'propane') ? 'propane' : 'gasoline',
      fromArrivalKwh: effectiveArrivalKwh(p),
      fromTrailerKwh: fromTrailer, fromGeneratorKwh: fromGenerator,
      fromGridKwh: fromGrid,
      fromSuperchargerKwh: fromSupercharger,
      sessionsRun: sessionsRun,
      plannedSessions: sessions.length,
      enabledSessions: enabledCount,
      disabledSessions: disabledSessions,
      skippedSessions: skippedSessions,
      trips: allTrips,
      sc: lastTrip ? {
        name: p.scName || '',
        scArrivalSocPct: lastTrip.scArrivalSocPct,
        scDurationMin: lastTrip.scDurationMin,
        returnMin: lastTrip.returnMin,
        trips: allTrips.length,
      } : null,
    };
    return { timeline: timeline, metrics: metrics };
  }
  return {
    PLAID_V3_CURVE: CURVE_MODEL_S_PLAID, // alias for older tests
    CURVE_MODEL_S_PLAID: CURVE_MODEL_S_PLAID,
    CURVE_MODEL_3_PERFORMANCE: CURVE_MODEL_3_PERFORMANCE,
    CHARGE_CURVES: CHARGE_CURVES,
    DEFAULT_CHARGE_CURVE_ID: DEFAULT_CHARGE_CURVE_ID,
    VEHICLE_CAPACITY_MAX_KWH: VEHICLE_CAPACITY_MAX_KWH,
    VEHICLE_CAPACITY_DEFAULT_KWH: VEHICLE_CAPACITY_DEFAULT_KWH,
    getChargeCurve: getChargeCurve,
    normalizeChargeCurveId: normalizeChargeCurveId,
    maxCapacityKwh: maxCapacityKwh,
    clampCapacityKwh: clampCapacityKwh,
    curvePower: curvePower,
    defaultParams: defaultParams, defaultSessionPlan: defaultSessionPlan,
    normalizeSessionPlan: normalizeSessionPlan, normalizeOffsiteStop: normalizeOffsiteStop,
    effectiveArrivalKwh: effectiveArrivalKwh, effectiveTowingKwh: effectiveTowingKwh,
    normalizeGapAction: normalizeGapAction,
    buildSchedule: buildSchedule, chargeDelivery: chargeDelivery, siteSources: siteSources,
    siteCanCharge: siteCanCharge, effectiveGapMode: effectiveGapMode,
    simulate: simulate, GAP_ACTIONS: GAP_ACTIONS,
  };
})();

<script>
// UI_START
var UI = (function () {
  'use strict';

  function hhmmToMin(s) { var a = String(s).split(':'); return (+a[0]) * 60 + (+a[1]); }
  function minToHHMM(m) {
    var h = Math.floor(m / 60), mm = m % 60;
    return (h < 10 ? '0' : '') + h + ':' + (mm < 10 ? '0' : '') + mm;
  }

  // group, id, label, default (in display units), step, unit, kind, set(out,value)
  var num = function (key, mul) {

  // EV = vehicle model (charge curve) + usable capacity + on-track energy.

    { g:'Track', sub:'Offsite', id:'driveTimeMin', label:'One-way drive time', unit:'min', step:1, default:30, min:1, set:num('driveTimeMin') },
    { g:'Track', sub:'Offsite', id:'driveConsumptionKwh', label:'One-way cost', unit:'kWh', step:0.5, default:14, min:0, set:num('driveConsumptionKwh') },

    { g:'Site Charging', sub:'Generator', id:'genEnabled', label:'Generator', kind:'check', default:true, subEnable:true,
      set:function(o,v){ o.genEnabled = (v === true || v === 'true'); } },
    { g:'Site Charging', sub:'Generator', id:'genPowerKw', label:'Power', unit:'kW', step:0.5, default:13, min:0, set:num('genPowerKw') },
    { g:'Site Charging', sub:'Generator', id:'genFuelType', label:'Fuel', kind:'select', default:'gasoline',
      options:[{ value:'gasoline', label:'Gasoline' }, { value:'propane', label:'Propane' }],
      set:function(o,v){ o.genFuelType = (v === 'propane') ? 'propane' : 'gasoline'; } },
    { g:'Site Charging', sub:'Generator', id:'fuelBurnGalPerHr', label:'Fuel burn', unit:'gal/hr', step:0.1, default:1.3, set:num('fuelBurnGalPerHr') },

    { g:'Site Charging', sub:'Battery', id:'batteryEnabled', label:'Battery', kind:'check', default:true, subEnable:true,
      set:function(o,v){ o.batteryEnabled = (v === true || v === 'true'); } },
    { g:'Site Charging', sub:'Battery', id:'trailerCapKwh', label:'Capacity', unit:'kWh', step:1, default:50, set:num('trailerCapKwh') },
    { g:'Site Charging', sub:'Battery', id:'minTrailerSocPct', label:'Min SoC', unit:'%', step:1, default:5, min:0, max:100, set:num('minTrailerSocPct') },
    { g:'Site Charging', sub:'Battery', id:'dcPowerKw', label:'DC charge', unit:'kW', step:1, default:40, set:num('dcPowerKw') },
    { g:'Site Charging', sub:'Battery', id:'dcdcEffPct', label:'DC-DC eff', unit:'%', step:1, default:95, min:1, max:100, set:function(o,v){ o.dcdcEff = parseFloat(v)/100; } },
    // Only meaningful when generator feeds the battery DC bus (both enabled)
    { g:'Site Charging', sub:'Battery', id:'acdcEffPct', label:'AC-DC eff', unit:'%', step:1, default:94, min:1, max:100, set:function(o,v){ o.acdcEff = parseFloat(v)/100; } },

    { g:'Site Charging', sub:'Grid', id:'gridEnabled', label:'Onsite EV connector', kind:'check', default:false, subEnable:true,
      set:function(o,v){ o.gridEnabled = (v === true || v === 'true'); } },
    { g:'Site Charging', sub:'Grid', id:'gridPowerKw', label:'Power', unit:'kW', step:0.5, default:11.5, min:0, set:num('gridPowerKw') },
  ];

  function defaultSessionsForm() {
    var plan = (typeof Sim !== 'undefined' && Sim.defaultSessionPlan)
      ? Sim.defaultSessionPlan()
      : [
          { startMin: 9 * 60, after: 'onsite' }, { startMin: 10 * 60, after: 'onsite' },
          { startMin: 11 * 60, after: 'offsite' }, { startMin: 13 * 60, after: 'onsite' },
          { startMin: 14 * 60, after: 'onsite' }, { startMin: 15 * 60, after: 'onsite' },
          { startMin: 16 * 60 },
        ];
    return plan.map(function (s, i) {
      var row = { start: minToHHMM(s.startMin), enabled: s.enabled !== false };
      if (i < plan.length - 1) {
        row.after = normalizeGapForm(s.after);
        if (row.after === 'offsite') {
          attachOffsiteFields(row, s);
        }
      }
      return row;
    });
  }
  function normalizeGapForm(a) {
    a = String(a == null ? '' : a);
    if (a === 'run' || a === '') return 'onsite';
    if (a === 'nothing' || a === 'none') return 'none';
    if (a === 'offsite') return 'offsite';
    if (a === 'onsite') return 'onsite';
    return 'onsite';
  }
  function normalizeOffsiteStopForm(v) {
    v = String(v == null ? '' : v);
    if (v === 'until' || v === 'till') return 'until';
    if (v === 'for') return 'for';
    return 'next';
  }
  function attachOffsiteFields(out, src) {
    out.offsiteStop = normalizeOffsiteStopForm(src && src.offsiteStop);
    var soc = parseFloat(src && src.offsiteUntilSocPct);
    out.offsiteUntilSocPct = (isFinite(soc) && soc > 0 && soc <= 100) ? soc : 80;
    var fm = parseFloat(src && src.offsiteForMin);
    out.offsiteForMin = (isFinite(fm) && fm > 0) ? fm : 30;
    return out;
  }
  function normalizeSessionsForm(list) {
    if (!Array.isArray(list) || !list.length) return defaultSessionsForm();
    var rows = list.map(function (s) {
      var start = s.start != null ? String(s.start)
        : (s.startMin != null ? minToHHMM(+s.startMin) : '09:00');
      var enabled = !(s.enabled === false || s.enabled === 'false' || s.enabled === 0);
      return {
        start: start,
        enabled: enabled,
        after: s.after,
        before: s.before != null ? s.before : s.action,
        offsiteStop: s.offsiteStop,
        offsiteUntilSocPct: s.offsiteUntilSocPct,
        offsiteForMin: s.offsiteForMin,
      };
    });
    rows.sort(function (a, b) { return hhmmToMin(a.start) - hhmmToMin(b.start); });
    var hasAfter = rows.some(function (r) { return r.after != null && r.after !== ''; });
    if (!hasAfter) {
      // Legacy before-on-next → after-on-previous
      for (var i = 0; i < rows.length - 1; i++) {
        rows[i].after = normalizeGapForm(rows[i + 1].before);
      }
    }
    return rows.map(function (r, i) {
      var out = { start: r.start, enabled: r.enabled !== false };
      if (i < rows.length - 1 && out.enabled) {
        out.after = normalizeGapForm(r.after);
        if (out.after === 'offsite') attachOffsiteFields(out, r);
      }
      return out;
    });
  }
  function sessionsToEngine(list) {
    return normalizeSessionsForm(list).map(function (s) {
      var o = { startMin: hhmmToMin(s.start), enabled: s.enabled !== false };
      if (s.after != null && o.enabled) {
        o.after = s.after;
        if (o.after === 'offsite') {
          o.offsiteStop = s.offsiteStop;
          o.offsiteUntilSocPct = s.offsiteUntilSocPct;
          o.offsiteForMin = s.offsiteForMin;
        }
      }
      return o;
    });
  }

  function readParams(values) {
    var out = {};
    UI_FIELDS.forEach(function (f) { f.set(out, values[f.id]); });
    out.sessions = sessionsToEngine(values.sessions);
    // Grid EV connector is exclusive of portable gen/battery
    if (out.gridEnabled) {
      out.genEnabled = false;
      out.batteryEnabled = false;
    }
    return out;
  }

  function fmt(n, d) { return (Math.round(n * Math.pow(10, d)) / Math.pow(10, d)).toFixed(d); }
  function clock(min) { return min == null ? '—' : minToHHMM(Math.round(min)); }

  function formatMetrics(m) {
    var totalSessions = m.plannedSessions != null
      ? m.plannedSessions
      : (m.sessionsRun + (m.skippedSessions ? m.skippedSessions.length : 0) +
         (m.disabledSessions ? m.disabledSessions.length : 0));
    var runVal = m.sessionsRun + ' of ' + totalSessions;
    var disabledN = m.disabledSessions ? m.disabledSessions.length : 0;
    if (disabledN > 0) {
      runVal += ' (' + disabledN + ' skipped)';
    }
    var rows = [
      { label: 'Lowest at session end', value: fmt(m.minSocPct, 0) + '%  (' + fmt(m.minSocKwh, 0) + ' kWh) @ ' + clock(m.minSocAtMin) },
      { label: 'End-of-day SoC', value: fmt(m.endSocPct, 0) + '%  (' + fmt(m.endSocKwh, 0) + ' kWh)' },
      { label: 'Trailer at end', value: fmt(m.trailerEndPct, 0) + '%  (' + fmt(m.trailerEndKwh, 0) + ' kWh)' },
      { label: 'Sessions run', value: runVal },
      { label: 'Generator runtime', value: fmt(m.genRuntimeHr, 1) + ' h' },
      { label: (m.genFuelType === 'propane' ? 'Propane used' : 'Gasoline used'),
        value: fmt(m.fuelGal, 1) + ' gal' },
      { label: 'From trailer', value: fmt(m.fromTrailerKwh, 0) + ' kWh' },
      { label: 'From generator', value: fmt(m.fromGeneratorKwh, 0) + ' kWh' },
    ];
    if (m.fromGridKwh > 0.05) {
      rows.push({ label: 'From grid (EV connector)', value: fmt(m.fromGridKwh, 0) + ' kWh' });
    }
    if (m.skippedSessions && m.skippedSessions.length) {
      rows.push({ label: 'Missed', value: m.skippedSessions.map(function (s) {
        return clock(s.startMin);
      }).join(', ') });
    }
    if (m.sc) {
      var scLabel = m.sc.name ? ('Offsite (' + m.sc.name + ')') : 'Offsite charged';
      rows.push({ label: scLabel, value: fmt(m.fromSuperchargerKwh, 0) + ' kWh' +
        (m.sc.scDurationMin != null ? ' in ' + fmt(m.sc.scDurationMin, 0) + ' min' : ' (never finished)') });
      rows.push({ label: 'Back at track', value: m.sc.returnMin != null ? clock(m.sc.returnMin) : '— (never returned)' });
    }
    return rows;
  }

  function chartScale(b) {
    var iw = b.w - b.padL - b.padR, ih = b.h - b.padT - b.padB;
    return {
      X: function (x) { return b.padL + (x - b.xMin) / (b.xMax - b.xMin) * iw; },
      Y: function (y) { return b.padT + (1 - (y - b.yMin) / (b.yMax - b.yMin)) * ih; },
    };
  }

  // ---- Profile helpers (pure; used by UI and tests) ----
  var BUILTIN_CAR_ID = 'car-plaid';
  var BUILTIN_CAR_M3P_ID = 'car-m3p';
  var BUILTIN_TRACK_ID = 'track-ridge';
  var BUILTIN_SITE_ID = 'site-trailer';
  var PROFILE_META = {
    car:  { listKey: 'cars',  activeKey: 'activeCarId',  fieldIds: CAR_FIELD_IDS,
            builtinId: BUILTIN_CAR_ID,   builtinName: 'Tesla Model S Plaid', label: 'EV' },
    track:{ listKey: 'tracks',activeKey: 'activeTrackId',fieldIds: TRACK_FIELD_IDS,
            builtinId: BUILTIN_TRACK_ID, builtinName: 'Ridge Motorsports Park', label: 'Track' },
    site: { listKey: 'sites', activeKey: 'activeSiteId', fieldIds: SITE_FIELD_IDS,
            builtinId: BUILTIN_SITE_ID,  builtinName: 'Portable trailer + generator', label: 'Site Charging' },
  };

  function fieldDefaults(ids) {
    var out = {};
    ids.forEach(function (id) {
      var f = UI_FIELDS.find(function (x) { return x.id === id; });
      if (f) out[id] = f.kind === 'check' ? !!f.default : String(f.default);
    });
    return out;
  }
  function carFieldDefaults(over) {
    var out = fieldDefaults(CAR_FIELD_IDS);
    if (over) for (var k in over) out[k] = over[k];
    return out;
  }
  function trackFieldDefaults() {
    var out = fieldDefaults(TRACK_FIELD_IDS);
    out.sessions = defaultSessionsForm();
    out.siteProfileId = BUILTIN_SITE_ID;
    return out;
  }
  function builtinCarProfiles() {
    return [
      {
        id: BUILTIN_CAR_ID, name: 'Tesla Model S Plaid', builtin: true,
        values: carFieldDefaults({
          chargeCurveId: 'model-s-plaid', capacityKwh: '99.4',
          sessionEnergyKwh: '35', sessionEndReserveKwh: '20',
        }),
      },
      {
        id: BUILTIN_CAR_M3P_ID, name: 'Tesla Model 3 Performance', builtin: true,
        values: carFieldDefaults({
          chargeCurveId: 'model-3-performance', capacityKwh: '75',
          sessionEnergyKwh: '28', sessionEndReserveKwh: '15',
        }),
      },
    ];
  }
  function pickFields(values, ids) {
    var out = {};
    ids.forEach(function (id) {
      if (values[id] != null && values[id] !== '') out[id] = values[id];
    });
    return out;
  }
  function pickTrackValues(values) {
    var out = pickFields(values, TRACK_FIELD_IDS);
    out.sessions = normalizeSessionsForm(values.sessions);
    if (values.siteProfileId != null && values.siteProfileId !== '') {
      out.siteProfileId = String(values.siteProfileId);
    }
